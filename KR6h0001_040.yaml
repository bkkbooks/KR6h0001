body:
  text: 隋天竺三藏那連提耶舍譯日藏分護持品第六爾時一切諸天大王并其眷屬一切龍王一切夜叉王阿修羅王迦樓羅王緊陀羅王摩睺羅伽王薜荔多王毗舍遮王富單那王乃至迦吒富單那等一切諸王各并眷屬禮拜於佛同心合掌作如是言世尊我等從今在在處處若有比丘或比丘尼諸優婆塞及優婆夷但有信心若男若女能作如是念不淨觀寂滅三昧如前佛說善根因緣得攝心住者我等一切天諸眷屬乃至清淨信心之人或男或女常當救濟猶如導師令彼身心及其眷屬為作供養衣食床鋪臥具湯藥種種資生所須皆與如是具足令其安隱更不愁於一十五種濁惡之事設復有者我等於中常共加護何者名為十五濁心所謂或以石撩或以杖打或以刀斫或以槊貫或毒藥中或崖上擲或復惡人或復不信或四大動我為作護或以惡心送彼人所好飲食湯藥者我為作護貪瞋妬嫉兩舌惡口如是惡事欲相加者我為作護或有惡人用濁惡心以諸衣鉢床臥鋪具病患湯藥常作檀越或勸化他或自親舊為供養者彼諸惡事我為作護或復怨家或復惡鬼如是等惡我為作護或毒中護或惡天子或內國土或外國土如是賊起我為作護此十五種濁惡之事或比丘或比丘尼或優婆塞或優婆夷或餘信心男子女人或今現在或復當來乃至劫盡末法世時何者名為末法世時謂讀誦人無不依於波羅提木叉道中行若不坐禪則不能得於三摩提乃至不得第四之果乃至不得寂滅三昧是則名為末法世時若如上說初夜後夜不曾睡眠讀誦是經或坐禪定如是住者彼諸眷屬比丘比丘尼優婆塞優婆夷乃至信心或男或女一切眷屬乃至住處或復聚落都邑國城或阿蘭若處或聚落主家隨所在處有此十五濁者我盡救濟為作擁護令是諸惡一切悉除於何聚落有福德人常住之處或多人住或一人住乃至復有一日一夜修福德者乃至一日一夜所住處者或復城邑或聚落家我皆救濟為作護助不令其人經於惡事無問一切諸檀越家或復剎利或婆羅門毗舍首陀或男或女小男小女一切救濟常為守護不令入惡若有如是修福德者身心精進若有人供養禮拜恭敬種種供給或為造房或大寺舍或林或苑或作衣裳食飲所須坐臥處所或復病患湯藥針灸種種醫療如是檀越我等如是十五濁中一切悉護若有胎藏妊娠女人供養如是福德人時我等護持無時暫捨設諸惡人及以惡鬼欲加惡者回彼惡心悉令歡喜如是兒女在在處處修福德者念善根者為他愛敬或餘衆生勸助讚美或復家人稱說其名或呪結索擁護衆生或教福德或教捨惡我等於彼如是衆生十五濁中常親護持諸惡鬼神不得其便若有如是修福德者或人非人能信其語如教而行如是一切我等亦護若有惡人於彼行者修福人中或瞋或罵或欲加惡或生障礙者如是等輩諸惡衆生我等不護是惡衆生十五濁事不得護者名字云何十五濁者第一惡患第二失於自在第三散失種種資生第四身中四肢種種割截或眼或耳口鼻手足或復斫頭第五失於所愛妻子及諸眷屬第六失於官位第七失居家第八為諸怨家所侵第九心常憂愁第十瞋於剎利心常行惡第十一邦邑國城衆生濁惡第十二諸偷盜來失種種物第十三自家婦女恆相鬪諍第十四國土賊盜他國賊來第十五短命速死若惡衆生有如是十五種事我等不護富伽羅等言若復有人雖修福業不受善語恆起惡瞋欲為造福德者作諸惡事種種福中為作障礙若有如是諸惡衆生來歸於我望呪術中得種種力如是呪中種種法用雖具足有我等於彼如是衆生不加不護不與其力亦不救濟若彼衆生意欲規求望得如是如是之物我亦不與若有衆生於常修常念福德之人生瞋作惡種種障礙者如是我等亦如上說或復今世及未來中能依此法憶念修行及法欲盡常有諸天龍神乃至迦吒富單那等惡心瞋忿無有慈悲不樂當來妙好之身不畏三塗惡道果報若有如是造福德人樂阿蘭若種諸善根或住塜間或復樹下或在寺舍或尸陀林行住處所福德之人悉如上說天龍乃至迦吒富單那惡見惡心此福德之人是處住止或身心濁或奪精氣或彼行人供養檀越我諸天龍乃至迦吒富單那等離慈悲心不知恩報於當來生不怖惡道垢濁身心奪其精氣唯除過去極重惡業此惡業中非可得護若我天龍乃至迦吒富單那等應可得護而不護者現世則為欺誑一切三世諸佛於流轉中不見羅漢及辟支佛常令我身不成福器不得涅槃佛言善哉善哉善男子汝能如是發於此心亦如一切三世諸佛過去世時修行無異紹三寶種竪立法幢光照法母汝等如是則為供養一切三世十方諸佛汝善男子或男或女能作如是勤精進心於正法中好守護者如是法行富伽羅故常護常念常供給足如是衆生於流轉中常得尊貴和合眷屬常受安樂不經辛苦乃至速成阿耨多羅三藐三菩提道善男子汝等求樂不求於苦是故應當常勤精進作諸善根諸天等言善哉善哉我從今日如是修習如是發心爾時此娑婆界有於惡心諸餓鬼等常仰食噉一切衆生精氣血肉以為生活如是鬼等無量阿僧祇同白佛言世尊我等惡業罪報所招常噉於人肉血精氣以活性命今日發心入佛法住為佛弟子更不造惡不生惡念若佛弟子如佛今說不淨觀法常如是修如是習行一種無異若我不如富伽羅心所在念者令於我眼黑暗常盲一切四肢不能動轉又不具足身中五根我等亦如富伽羅護此福德人并其施主造立寺舍房室樹林園菀浴池衣鉢飲食臥具倚床湯藥一切所須如是檀越我等亦護佛言善哉善哉善男子汝好發心常當如是莫令放逸爾時牢固地天從座而起作如是言世尊若佛弟子常攝五根如佛今說不淨觀法如是繫念至心行時我等地天為此行者常出地味滋潤彼人令其身中增益壽命是地精氣充溢因緣行者身中得色得力得念得喜得精進得大智慧佛言善哉善哉汝大檀越能發是心真是佛子從佛口生從法化生與如是食益於彼身此福因緣速於大乘成就滿足爾時衆中有大德天復從座起前白佛言世尊若有如是法行比丘佛弟子等彼諸檀越或以種種金銀寶珠種種資生種種穀米具足供給若諸弟子如佛所說不淨觀法乃至寂滅三昧空門如是繫念從於初夜至中後夜坐臥行立如是念法心無外緣彼諸檀越為營寺舍或造一屋或一樹林或復衣食坐臥床鋪病患湯藥種種資生常供給之彼得如是無乏少已身得安隱無有憂愁心常歡喜得好福田成就法器如是施已當來之世得大果報深心樂法不生惡道不造惡法我如是護彼人即得修慈悲心如是種種勝妙善根增長不減佛言善哉善哉大檀越此是汝等精進之心於大乘中速能增長福德之力爾時衆中金剛力士復白佛言世尊如來說此大集經已諸大檀越并眷屬衆各各發心護持佛法利益衆生彼因緣故此娑婆界佛剎之中法母照曜增進光明爾時彌勒菩薩摩訶薩為欲利益於未來故即於衆中問金剛力士言善男子何者為虛空之法此可見不若不可見此事云何又復問言何者名為諸法和合金剛力士報彌勒言實際之岸不可見故此和合法亦不可見彌勒又問善男子何者名為真實虛空不和合法金剛力士報彌勒言彼中無異彌勒又問善男子何者名為虛空之法何者名為不和合法金剛力士報彌勒言不動不生法界入事是故不異彌勒又問善男子云何名為有為無為漏無漏法金剛力士報彌勒言如本真實如是如如性無有異漏無漏法虛空和合是故不異彌勒又問善男子何者名為真實如如漏無漏法金剛力士報彌勒言虛空合故真實如如非是漏法非無漏法彌勒又問善男子何者名為虛空和合法金剛力士報彌勒言一切諸法離於障礙和合故空非集非散何以故體性不失故而彼空中亦不可得物及空故故名空法善男子一切法中此方便故當知一切如如體性體性本來是空故空如是萬法和合故空想離想故此空非想非想亦空何以故如是一切和合法空不可說故一切諸法體性爾故此如是法非沙門造非羅漢造非辟支佛造非菩薩造非如來造如是如是真實如如漏無漏法一切皆空和合法故非相離故非異法故彌勒菩薩如是當知爾時金剛力士說是法已無量衆生曾於過去學空來者一切惡業悉皆除盡遠塵離垢於諸法中得法眼淨九十二那由他衆生於此法中發阿耨多羅三藐三菩提心無量衆生亦得住於不退轉道究竟阿耨多羅三藐三菩提大方等大集經日藏分佛現神通品第七爾時頻婆娑羅王聞佛說此不淨觀法一切大衆各欲護持踊躍歡喜即從座起前白佛言世尊如是法門福德最勝不可思議今此國土娑婆世界佛剎之中無量諸大菩薩摩訶薩所可成就光明妙色我從本來初未曾見初未曾聞世尊是菩薩光悉能遍照大千世界乃至有頂亦皆充滿我今眼中不覩餘色但見於此娑婆世界佛剎之中乃至大小諸鐵圍山悉滿光明世尊如是菩薩摩訶薩等若得近於阿耨多羅三藐三菩提者其光云何如來入於三昧所放光明相復云何如來光明我得見不緣彼光明復得見於其餘佛剎種種妙好奇特事不佛言如是如是大王若有菩薩成就無上菩提道者其光能照十方世界何以故能於如來境界之中行大福德莊嚴力故於過去世菩薩行中成就具足大福德力莊嚴法故一切菩薩修行善根多增長故具無量福生於佛家親近無上菩提道故畢竟無上菩提妙道於不可宣說如來智力奮迅遠離一切障礙佛境界中勝疾智故入佛智慧正法果故分別過去無量劫來無邊佛法境界依故此地最勝轉妙法輪一切自在所可得身如是福德無罣礙故獲得清淨真實法故所可修習到彼岸故未來世業已得盡故通達一切衆生善根永斷一切煩惱習故離於障礙住佛界中是故光明悉能遍照十方世界大王如是隨佛功德光明力故亦能覩見一切十方無量無數阿僧祇佛王言世尊我今欲見如是十方無量無數阿僧祇佛并諸菩薩摩訶薩及聲聞衆時頻婆娑羅王隨從眷屬有無量億諸衆生等異口同音復白佛言如是世尊亦願如來示現我等諸佛境界過去所行福德莊嚴離障礙事我等見已發歡喜心爾時世尊告阿若憍陳如汝等大衆在家出家聲聞弟子皆各繫念深心思惟以自善根力入於禪定我於今者亦欲入於如來三昧當于爾時此佛剎中天龍夜叉乃至一切人及非人或有見四諦者或有得順忍者或於三乘得不退者如是衆生皆結加坐亦入禪定復有衆生於三寶中得信敬心亦復如是入於禪定爾時世尊即入一切如來境界日月三昧行智廣大悉能遍覆一切虛空能令一切智慧衆生皆生歡喜如是三昧不可計量不可覩見非諸聲聞及辟支佛乃至十方恆河沙等補處菩薩之所能知唯佛如來乃能得之是名如來境界三昧如來如是入三昧已此娑婆世界三千大千百億四天下百億須彌山百億日月乃至百億諸有頂天皆悉影現入佛身中如是娑婆世界一切佛剎入佛身已其中所有一切衆生地獄餓鬼及以畜生或天或人彼諸衆生或身或心有苦受者皆得除滅一切自在悉生歡喜譬如比丘入第三禪得具足樂爾時一切諸大菩薩摩訶薩衆先在座中入三昧者皆從定起從定起已見佛光明見光明已自所有光尋滅不現如是聲聞及佛弟子乃至一切諸天人衆入禪定者各各皆起彼諸大衆身心得樂譬如比丘入第三禪爾時一切無量衆生生大歡喜踊躍無量不可思議未曾聞見又其六根一切清淨現佛身中或坐或行或住或臥復見如來一一毛孔出無量光譬如十方恆河沙等日月光明亦如一切恆河沙等大摩尼珠亦如恆河沙等十地菩薩摩訶薩衆一時普放大焰光明如是光明悉能遍照十方佛土如是如來一一毛孔所出光明處處皆滿於十方剎最為殊勝爾時十方一切諸佛於其剎中自在而住各為大衆異口同音稱讚我名說於此偈汝觀具足功德滿憐彼一切諸衆生智慧大力能拔除釋迦如來勝中最慈悲心故放此光一切佛剎皆充滿又愍是諸衆生故令其悉現於身中一一佛剎滿光明衆生見者皆歡喜發心清淨悉牢固得勝無上實菩提汝等若有得神通一切宜應急疾往恭敬接足稽首禮釋迦師子最勝尊若有未得神通者向彼低頭遙禮拜速起菩提真智念得見牟尼正覺身爾時十方一切諸佛各於其國說如是偈慈悲教化諸衆生故又以如來過去修行願力莊嚴具足滿故彼諸佛剎一一如來亦有無量恆河沙等諸大菩薩摩訶薩衆并大弟子聲聞比丘復有無量億恆河沙諸天及龍夜叉乾闥婆阿修羅迦樓羅緊陀羅摩睺羅伽等無量大衆圍繞彼佛各乘神通俱來詣此娑婆世界到此剎已向於如來頭面接足右繞三匝右繞畢已各齎持來一切所有種種寶物種種寶衣種種袈裟種種瓔珞種種幡蓋種種雜華種種熏香種種塗香種種音樂種種讚歎種種歌舞供養如來設供養已與其眷屬各還所住時諸衆生在娑婆界佛身中者皆悉見之見已歡喜復受無量無邊快樂又諸衆生得見十方一切諸佛於其剎土坐金剛座而演說法又見諸佛各各剎中於自坐處為諸衆生說此世界釋迦如來一切功德有大名稱大智慧力福德莊嚴具大精進大慈悲力教化衆生彼諸剎中無量阿僧祇恆河沙等衆生發阿耨多羅三藐三菩提心於自剎中得受記別無量衆生於緣覺乘得受記別彼諸大衆亦見此土一切衆生入於佛身亦得如是受於記別其中衆生或有受樂或有受苦一切皆現釋迦如來身內住止若空五濁佛剎衆生得見如來及見十方無量無數說法諸佛一一如來各有無量無數衆生恭敬圍繞見已起大愛敬生歡喜心彼諸衆生一切身中所有惡受悉得除捨安隱快樂若不空五濁剎者十地菩薩摩訶薩等教化衆生故隨何剎中得見於佛見已生信得信心已聽受妙法彼諸菩薩各於彼處化作佛身以一音聲滿一切剎各各異口同說偈言十方諸佛同一乘成就善根故來此離佛及餘菩薩衆更無如是大德人汝等一一諸衆生速發菩提無上道若不勇猛勤精進流轉苦海無出期汝等宜應一切來速隨於我相逐往供養人中釋師子頂禮右繞彼世尊時諸菩薩摩訶薩等化作佛身說此偈已各與無量無邊恆河沙數得神通力一切衆生俱來詣此見釋迦牟尼佛見已右繞三匝繞已各持齎來種種寶物種種寶衣種種音聲種種歌舞以用供養釋迦如來供養畢已悉發阿耨多羅三藐三菩提心或有衆生於辟支佛乘而發願者如是悉得不退轉道彼諸衆生又皆各各得種種忍種種陀羅尼種種善根得已各還本剎或有菩薩化作辟支佛身或復化作阿羅漢身或復化作梵天王身或復化作帝釋天身或復化作四天王身或復化作那羅延身或復化作摩醯首羅或復化作自在天身或復化作星宿天身或復化作阿修羅身或復化作轉輪聖王如是種種龍身鬼身隨所在處佛剎之中若有衆生樂見阿羅漢身見羅漢已歡喜受法彼諸菩薩摩訶薩等為欲教化諸衆生故即於彼中作羅漢身為彼衆生說種種法彼諸衆生見大光明及釋迦佛得見佛已心中愛敬生大歡喜具足六根滿一切願惡業皆盡悉樂受生又彼菩薩摩訶薩等於佛剎中化作如是阿羅漢身說法教化大福德聚具足成就善根力故能以一音遍一切剎作諸言辭說如是偈衆生久處流轉中愚癡不知出要道以諸種種罪業故得此生死苦惱身是故應速捨惡心邪見顛倒諸煩惱早度有流到彼岸云何汝等不覺知難見導師今已見難得人身今已得難遇善友今逢值難聞正法今得聞是故汝等應至心速發無上菩提道出離一切生死獄證佛微妙功德身若能永離兩種邪所謂斷常等二見知於一切行無我如是名入正觀門愛行取入有於生智水洗除悉令淨同共往詣娑婆國恭敬供養釋師子時諸菩薩摩訶薩等如是化作阿羅漢身說此偈已與於無量恆河沙等得神通力一切衆生俱共發引來到此剎到已頭面頂禮釋迦牟尼如來并其眷屬恭敬圍繞三匝佛已出所齎來種種寶物種種寶衣種種袈裟種種瓔珞種種傘蓋種種幢幡種種寶華種種寶香種種音樂偈讚歌舞以用供養釋迦如來供養畢已各還自剎到自剎已坐於自座各為於己衆稱楊讚說釋迦如來作如是言釋迦如來憐愍教化一切衆生能與衆生一切利益是諸菩薩各自衆中如是稱說彼衆聞已悉皆讚歎釋迦如來既讚歎已無量無數阿僧祇衆生發阿耨多羅三藐三菩提心或復有於辟支佛乘而發心者或復有於聲聞乘中而發心者各各乘中得不退道有得種種陀羅尼忍種種善根亦見此土娑婆佛剎諸衆生等入釋迦如來身中是諸衆生見此不可思議神德變已無量阿僧祗恆河沙等衆生皆發阿耨多羅三藐三菩提心其中或有發聲聞辟支佛心者各於自乘得不退轉或有作於轉輪聖王微妙之身得受記別
