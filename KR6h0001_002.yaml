body:
  text: 北涼天竺三藏曇無讖於姑臧譯陀羅尼自在王菩薩品第二之二佛復告陀羅尼自在王菩薩善男子菩薩摩訶薩有八光明以是八明能壞諸暗淨菩薩行何等為八一者念光二者意光三者行光四者法光五者智光六者實光七者神通光八者無礙智光念光有八種一者不失過去善法二者作未來善三者聞法不忘四者思惟實義五者不為六塵所壞六者憶持如守門人遮止惡法為真善法守善法城門七者不為邪法之所誑惑八者能大增長純善之法是名念光八種意光亦有八種一者義意非字意二者智慧意非識意三者法意非人意四者實意非虛意五者菩薩意非聲聞意六者上意非下意七者佛意非退意八者憐愍意非害意是名意光八種行光亦有八種一者法行二者一切行三者衆生行四者衆生心行五者十二因緣行六者廣説行七者行行八者一切佛法行是名行光八種法光亦有八種一者世法光二者出世法光三者無漏法光四者無為法光五者解脫法光六者心解脫法光七者畢竟解脫法光八者破無明慧法光是名法光八種智光亦有八種一者八正智光二者須陀洹智光三者斯陀含智光四者阿那含智光五者阿羅漢智光六者辟支佛智光七者菩薩智光八者正覺智光是名智光八種實光亦有八種一者正定行二者得須陀洹果三者斯陀含果四者阿那含果五者阿羅漢果六者辟支佛果七者菩薩八者佛菩提是名實光八種神通光亦有八種一者眼光能見正色二者耳光能聞正聲三者念光能念過去阿僧祇劫所有衆生四者性光為觀性淨衆生之心五者虛空光以大神通光遍到十方無量世界六者方便光具無漏智故七者功德莊嚴光為利益一切衆生故八者智慧莊嚴光為壞一切衆生疑心故是名神通光八種無礙智光亦有八種一者智光二者意光三者慧光四者佛光五者正見光六者淨衆生心光七者解脫光八者畢竟光是名八無礙智光爾時世尊欲重宣此義而説偈言修集於念心不忘善惡業樂聞讚誦經修集不放逸能調伏諸根安住於寂靜增長於善法修集於念光能遮止惡法猶善守門者能守護法城不令四魔入不隨逐音聲思惟真實義親近善知識喜樂如法住其意無邊上永斷諸煩惱邪法不能動惡世不生謗誠心念菩提不説小乘心常樂念上意為衆破下意不畏魔煩惱修集大慈悲不念害衆生其得大智光能壞諸疑心解了甚深義知真實方便修四無礙智樂觀十二緣衆生之所因知無作受者能修大光法能知諸佛法行世出世行能到十方土了知人天業修集無上智説三歸一乘修集八正道為壞三世法於有漏無漏如實而知之能利益人天令斷有漏法不謬為無為真實而知之寂靜光無暗不著有為相知結入出緣知衆心性淨若有大乘定即知如是法樂住無漏流了四沙門果知菩提道行故修無礙智破邪修實光入衆無所畏樂説真實義為破生死法眼耳淨無障能見聞色聲過去念不謬亦了知他心到十方無礙知法如虛空得無漏智慧為調諸衆生具功德智慧為利諸衆生於無量世中求是二莊嚴樂受持淨戒樂護於佛法修集真實光為於如法住我説無量光為令衆生得有信此經者即得此諸光爾時世尊復告陀羅尼自在王菩薩善男子菩薩摩訶薩修集大悲有十六事何等十六一者菩薩摩訶薩見諸衆生貪著我見以我見故增長諸見常為生死之所繫縛是故菩薩為此衆生修大悲心悲因緣故宣説法化為壞衆生如是妄見二者見諸衆生心懷顛倒常見無常無常見常苦見於樂樂見於苦淨見不淨不淨見淨我見無我無我見我是故菩薩為此衆生修集悲心悲因緣故宣説法要為壞衆生如是四倒三者見諸衆生心懷憍慢實無有物而生物想實無有事而生事想以是因緣起七種慢以是慢故增長惡法是故菩薩於此衆生修集悲心悲因緣故宣説法要破壞衆生如是憍慢四者見諸衆生五蓋所覆以覆蓋故心多生疑不解深義是故菩薩於此衆生修集悲心悲因緣故宣説法要為壞衆生如是五蓋五者見諸衆生沈六入海眼取色相耳取聲相鼻取香相舌取味相身取觸相意取法相是名為沈是故菩薩於此衆生修集悲心悲因緣故宣説正法為拔衆生如是沈沒六者見諸衆生有七種慢一者慢二者大慢三者慢慢四者我慢五者增上慢六者下慢七者邪慢菩薩摩訶薩於下慢者自言勝汝於慢慢者自言最勝我色勝乃至識勝於增上慢者菩薩語言汝實非聖不應便起聖人之想為邪慢者宣説正見是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生如是憍慢七者見諸衆生離於聖道樂行世道惡道是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生世道惡道八者見諸衆生造惡道行屬無明愛妻息所繫不得自在是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生如是繫縛出離惡道九者見諸衆生親近惡友遠離善友其心甘樂造作惡業是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生如是惡業遠離惡友親近善友十者見諸衆生造作慳貪於無明愛心無厭足為施智慧是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生如是慳貪無明及愛施與智慧十一者見諸衆生我見斷見為施衆生十二因緣真智慧故菩薩於此而生悲心悲因緣故宣説正法為斷衆生我見斷見施與十二因緣智故十二者見諸衆生行無明暗我見衆生見命見士夫見別異見邪見著見菩薩為施智光明故於此衆生而生悲心悲因緣故宣説正法為斷衆生如是所見十三者見諸衆生樂於生死於五聚陰而生親想是故菩薩於此衆生修集悲心悲因緣故宣説正法為斷衆生如是三有十四者見諸衆生為魔所縛是故菩薩於此衆生修集悲心悲因緣故宣説正法為壞衆生如是魔網十五者見諸衆生甘樂快樂而不能知真實樂因是故菩薩於此衆生修集悲心悲因緣故宣説正法示諸衆生真實樂因十六者見諸衆生求涅槃門不能知處是故菩薩於此衆生修集悲心悲因緣故宣説正法為此衆生開涅槃門善男子菩薩修悲悉因如是十六因緣善男子一切衆生有三十二不善之業菩薩見已修集善業為壞衆生如是惡業何等三十二一者有諸衆生無明睡眠菩薩見已修集智慧為悟衆生如是睡眠二者見諸衆生下解下欲菩薩見已修集上解上欲為以大乘而教化之三者有諸衆生樂為非法菩薩見已修集正法為令衆生於諸法中得大自在四者有諸衆生修集邪命菩薩見已修於正命為壞衆生如是邪命五者有諸衆生入於邪林菩薩見已修集正見為令衆生出邪林故六者有諸衆生樂為放逸菩薩見已修不放逸為令衆生離放逸故七者有諸衆生樂為麁獷菩薩見已修如法住為壞衆生如是麁獷八者有諸衆生慳貪吝惜菩薩見已修一切施為壞衆生慳貪心故九者有諸衆生毀犯禁戒菩薩見已修持淨戒為破衆生毀禁心故十者有諸衆生心常瞋恨菩薩見已修慈悲忍為壞衆生如是瞋恨十一者有諸衆生懶惰懈怠菩薩見已修勤精進為壞衆生如是懈怠十二者有諸衆生其心狂亂菩薩見已修集定心為壞衆生如是狂亂十三者有諸衆生邪智覆心菩薩見已修集正智為壞衆生如是邪智十四者有諸衆生説義顛倒菩薩見已思惟正義為壞衆生如是顛倒十五者有諸衆生樂造世行菩薩見已修善方便為壞衆生樂世行故十六者有諸衆生繫屬煩惱菩薩見已先自除斷為壞衆生煩惱繫縛十七者有諸衆生我見所縛菩薩見已自除我見為斷衆生如是我見十八者有諸衆生諸根不調菩薩見已自調諸根為調衆生如是不調十九者有諸衆生説言無作無有受者菩薩見已宣説有作及有受者為壞衆生如是邪説二十者有諸衆生不知恩義菩薩見已説知恩法為壞衆生如是不知恩義二十一者有諸衆生未得謂得菩薩見已修集正法為壞如是增上慢故二十二者有諸衆生惡口麁獷菩薩見已修善口語為壞衆生如是惡口二十三者有諸衆生貪無厭足菩薩見已修集知足為壞衆生不知足故二十四者有諸衆生不能恭敬父母師長菩薩見已修不放逸為令衆生供養恭敬父母師長二十五者有諸衆生貧窮困苦菩薩見已修集七財為壞衆生如是貧窮二十六者有諸衆生常為四大毒蛇所病菩薩見已修身念處為令衆生遠離如是四大毒病二十七者有諸衆生行無明暗菩薩見已修集智慧為令衆生然慧燈故二十八者有諸衆生樂三有獄菩薩見已修出離道為示衆生知出離故二十九者有諸衆生常行左道菩薩見已修集右道為令衆生捨左道故三十者有諸衆生貪著身命菩薩見已於自身命修不貪著為令衆生捨貪著故三十一者有諸衆生不能恭敬供養三寶菩薩見已修集信心為令衆生信三寶故三十二者有諸衆生實非世尊自謂世尊菩薩見已修集六念為令彼等知真實法故善男子是名衆生三十二業菩薩見已修治自業成就具足一切善法壞諸惡業勸諸衆生令行善業善男子菩薩摩訶薩有無量業何以故衆生煩惱有無量門為閉衆生煩惱門故菩薩修集無量善業善男子如恆河沙等世界衆生悉住聲聞辟支佛乘欲比菩薩初發心業百分千分不可為喻何以故二乘之人自為解脫觀於煩惱菩薩不爾常為衆生得解脫故觀諸煩惱善男子菩薩摩訶薩所作諸業於諸凡夫二乘業中最為殊勝何以故衆生之業性是顛倒二乘之業有邊際故菩薩之業無邊無量是故菩薩勝於一切聲聞緣覺爾時陀羅尼自在王菩薩聞是法已心生歡喜踊躍無量白佛言世尊甚奇甚特快説如是不可思議如來於此已説菩薩瓔珞莊嚴菩薩光明菩薩大悲菩薩善業唯願宣説云何如來觀諸衆生起於大悲云何名悲悲有何行有何相貌何因緣起云何名佛業佛業有何行有何相貌有何因緣起善哉世尊一切知見唯願廣説如來之業佛言善哉善哉善男子汝今諦聽善思念之吾當為汝分別解説善男子一切如來所有大悲不出不行何以故常不變故無量劫中修集得故是故大悲不行不轉不修不捨亦能為於一切衆生善男子一切諸佛所有大悲無量無邊其心平等從久遠來無量舌力不能宣説善男子如來世尊未嘗遠離如是大悲無上菩提及與大悲如是二法等無差別如來所得無上菩提無根無住根名我見住名四顛倒如來世尊知根知住是故菩提無根無住一切衆生皆悉無有無根無住欲施衆生無根無住起大悲心如來於此欲令知故演説正法善男子夫菩提者清淨寂靜云何為淨云何寂靜淨名為內寂靜名外內名眼空空名無我無有我所何以故性是一故乃至意亦如是何以故性是一故知眼空已不著於色不著色心是名寂靜乃至意法亦復如是一切衆生不知菩提清淨寂靜如來於此而起大悲演説正法為令知故善男子一切衆生心性本淨性本淨者煩惱諸結不能染著猶若虛空不可沾污心性空性等無有二衆生不知心性淨故為欲煩惱之所繫縛如來於此而起大悲演説正法欲令知故善男子夫菩提者不取不捨云何不取如來不見一切諸法此岸彼岸何以故一切諸法離此彼故如來世尊如實知之是名不取云何不捨一切衆生不知法界如來教令了了知故是名不捨如來於此而起大悲演説正法為令衆生知是二法善男子夫菩提者無想無緣云何無想無緣不見眼識乃至意識不見色相乃至法相於是法中不知不見故無取無著是名無緣無想無緣是名聖行云何聖行所謂不行三界之行善男子如是不行名為聖行一切聖人不行於行衆生不行如是聖行如來於此而起大悲演説正法欲令知故善男子夫菩提者非是三世非三世者名為三等過去意未來識現在貪是名三分以能了了知三分故意識及貪無有住處以是義故不念過去不求未來不愛現在若見三世悉平等者是名正見如來為令一切衆生得如是等平等正見而起大悲演説正法善男子夫菩提者無身無為非眼識界乃至非意識界是名無身不生不滅不盡不住無有三相是為無為善男子一切法性是名無性若無性者則無有二是故菩提無身無為一切衆生不知菩提無身無為如來為令了了知故而起大悲演説正法善男子夫菩提者無有分別無有句義云何分別云何句義無所住者名無分別字不攝故名無句義非有二故名無分別不入法界名無句義無動搖故名無分別不變易故名無句義不可説故名無句義空故名無分別無覺觀故名無分別無相故名無句義不發故名無分別無願故名無句義知衆生界同於虛空名無分別無衆生界名無句義不生故名無分別無宅故名無句義不滅故名無分別無為故名無句義不行故名無分別平等故名無句義知平等故名無分別寂靜故名無句義衆生不知如是等義如來為令了了知故而起大悲演説正法善男子夫菩提者不可以身得不可以心得何以故身心如幻故若能了知身心真實是名菩提為流布故名為菩提而其性相實不可説善男子夫菩提者不可説身不可説心不可説法不可説非法不可説有不可説無不可説實不可説空何以故性不可説故菩提者無有住處不可宣説猶如虛空為真實知一切諸法不可宣説字中無法法中無字為流布故故可宣説一切凡夫不知真實是故如來於此衆生而起大悲演説正法為令知故善男子夫菩提者無取無緣云何無取云何無緣知眼真實名為無取知眼無境名為無緣乃至知意真實名為無取知意無境名為無緣如來世尊以如是義知於菩提無取著故名為無取無屋宅故名為無緣眼識不住於彼色中名無屋宅乃至意識亦復如是一切衆生心無住處如來世尊如實而知心無住處無住處者有四種色受想行於是四法心無所住是名心無住處是故名為一切諸法悉無住處如來世尊如實知之一切凡夫不能知故如來於此而起大悲演説正法善男子夫菩提者名之為空而菩提中無有空相是故名空一切法空菩提亦爾如來世尊真實能知如是之空是故如來名為知空諸佛名覺一切諸法而不覺知空中之空亦能了知無上菩提空及菩提即是一如空與菩提是一非二離空菩提別有法者可得説二以無二故名之為空無名字故名之為空無相貌故名之為空無威儀故名之為空無修行故名之為空無言説故名之為空善男子第一義者謂無諸法若無諸法云何説空善男子譬如虛空無言無説無言無説故故名虛空無言説中無有言説是名為空一切諸法亦復如是無名字法説為名字如是名字亦無住處若名無住處名下之法亦復如是如來真實知如是法不生不滅以真知故名得解脫本無繫縛云何説言名得解脫是故如來無縛無解如是等法一切凡夫不能知見如來於此而起大悲演説正法為令知故善男子夫菩提者同於虛空虛空之性不平不下菩提亦爾若法無性不可説言有平有下如來世尊知一切法無平無下乃至微塵不作平下若法有性即如實智如實智者知一切法本無今有已有還無出時滅時無所繫屬從緣而出從緣而滅以是義故名之為道斷是道故名為菩提凡夫衆生不知如是真實道故如來於此而起大悲宣説正法為令知故善男子夫菩提者名真實句真實句者即是菩提色亦如是如是二句等無差別受想行識地水火風眼界色界眼識界乃至意界法界意識界亦復如是名法流布真實覺知如是陰入界法無有顛倒不顛倒者知過去法不生不滅未來之法不生不滅現在之法亦不生不滅如是知已名不顛倒名真實句真實句者如一法一切法亦如是如一切法一法亦如是是真實句凡夫不知如來於此而起大悲演説正法為令知故善男子夫菩提者非內非外云何為內云何為外非內者無所造作非外者無所覺知內者謂作外者謂相菩提之體非作非相是故名為非內非外又非內者非身口意業非外者非三業緣非內者無相解脫門非外者空解脫門如是等義凡夫不知如來於此而起大悲演説正法為令知故善男子夫菩提者無漏無取云何無漏云何無取無漏者遠離四流四流者欲流有流無明流見流無取者遠離四取四取者欲取有取見取戒取而諸衆生無明所覆行於四取以渴愛故作我我所如來了知我取根本是故我淨我淨故能淨衆生我淨者則不覺知一切諸法亦不思惟一切非法不起無明不起無明因緣故不起十二因緣有十二因緣有不起故則不生不生故入決定聚入決定聚者名為了義了義者名第一義第一義者名無衆生無衆生義者名不可説不可説義者即十二因緣義十二因緣義者即是法義法義者即是如來以是義故我經中説若有得見十二因緣則為見法見法者為見如來見如來者即無所見所見是邪夫邪見者謂想想數法如來無想亦無想數以是義故見如來者為無所見若見如來無想無作無知無覺是名真實見於如來如來亦爾覺知一切諸法平等如法界無取一切凡夫不能覺知如來於此而起大悲演説正法為令知故善男子夫菩提者清淨寂靜光明無諍云何為淨云何寂靜云何光明云何無諍不雜煩惱名之為淨空解脫門名之寂靜無相無願名為光明無生無滅名為無諍又無生者名之為淨無滅者名為寂靜無取者名光明不出者名無諍性名為淨無諸煩惱名為寂靜光明無諍法界名淨真實之性名曰寂靜光明無諍虛空之性名之曰淨無分別法界名曰寂靜光明無諍內外清淨名之為淨於內外法不取不著名為寂靜光明無諍真知五陰名之為淨真實知界名為寂靜光明遠離諸入名為無諍見過去盡名之為淨見未來不生名為寂靜見現在法住於法界無有動轉名光明無諍清淨寂靜光明無諍如是四法等入一界一法一句如是三法即是涅槃遠煩惱故名之為淨畢竟淨故名曰寂靜無暗冥故名曰光明不可説故名為無諍以是故言釋迦如來默無所説善男子夫菩提者即是虛空虛空者名之為法如法衆生亦爾如衆生福田亦爾如福田涅槃亦爾以是義故一切諸法同於涅槃如來能覺如是法界是故名佛修集具足清淨寂靜光明無諍如是四句名之為佛如來能知善方便故初得菩提默然而住無所宣説待梵王請爾時尸棄梵王與六萬八千諸梵天人來至我所頭面作禮合掌而言唯願如來為諸衆生轉正法輪而説偈曰如來法離淨寂靜大光無礙無有諍無字無聲亦無説真實覺知如法界佛為衆生無量劫苦行受持世間戒為悟無明睡衆生久行放逸迷實義又此會中無量衆於無量佛積善根能解甚深真實義唯願轉於無上輪此衆已調一切魔欲令開闡甘露門如來號為真導師示暗衆生無上道如來雖有大慈悲憐愍衆生如一子我今勸請法應爾願轉無上正法輪如往三佛轉法輪唯願如來亦復爾畢竟導師無退轉示暗衆生一真道如雨潤長諸草木令諸衆生除熱渴佛施法雨於衆生為得無上無異果如來初生發誓言我當救彼苦衆生衆生渴仰甘露味願大施主施法雨爾時世尊既受請已往波羅奈鹿野林中仙人住處轉正法輪如是法輪諸天魔梵及餘沙門婆羅門等所不能轉爾時世尊説四諦時憍陳如比丘得法眼淨其聲遍聞三千大千世界爾時世尊説優陀那甚深之義不可説第一實義無聲字憍陳比丘於諸法獲得真實之知見即是我往無量世所得菩提今已得如來轉是正法輪時無量衆生悉得調伏示現如是大悲神通衆生見已阿僧祇人發阿耨多羅三藐三菩提心善男子如來如是十六大悲悉為衆生而修起之如來以是悲因緣故為一一衆生於恆河沙劫大地獄中受諸苦惱心不悔退而其悲心亦無損減以是義故如來大悲不可思議善男子聲聞人悲猶如畫皮菩薩大悲猶如破肉如來大悲破骨徹髓聲聞之悲讚佛所知菩薩大悲勸他令行如來大悲授人阿耨多羅三藐三菩提記聲聞悲心為慈因緣菩薩大悲為調衆生如來大悲為畢竟度聲聞悲心因麁苦生菩薩大悲因離苦生如來大悲因斷一切因緣而生善男子如來修集如是大悲若為一人住經一劫百劫千劫萬劫至無量劫終不畢竟入於涅槃善男子如來大悲成就如是無量功德善男子乃往過去無量無邊阿僧祇劫時世有佛號栴檀窟界名大香劫名上香爾時世尊於三百三十二萬劫中常以正法教諸聲聞時佛身上一一毛孔所出香氣遍滿三千大千世界爾時此界無有臭穢名所有草木山河之屬悉栴檀香衆生身香亦復如是一切無有身口意惡諸佛弟子聞此香已即得四禪爾時乃有一萬諸佛次第興世皆同一號號栴檀窟是故彼劫名曰上香爾時如來作佛事已欲入涅槃觀諸衆生誰未調者我當調之爾時如來以淨天眼見有一人在非有想非無想處已於先佛種下上善根定當因佛而得度脫非因聲聞得解脫也壽過八萬四千劫已乃當下生來受五欲當得聞於大乘經典發阿耨多羅三藐三菩提心安住不退爾時世尊以大悲故起大方便告諸比丘我涅槃時到作是言已即便入於不悔三昧示諸衆生令知涅槃既知如來入涅槃已令諸大衆廣設供養正法住世滿足六十八萬四千歲當爾之時佛諸弟子乃至無有一人於正法所作邪法想爾時世尊以定力故八萬四千劫隱密此身不令衆見過是劫已彼人即下生於人中大長者家經八十年彼佛即從三昧而起詣長者家其家大小悉無見者唯是童子獨得見之爾時世尊為令彼人於五欲中心生厭離而為説法彼人聞已即得不退阿耨多羅三藐三菩提心如來知已即為授記善男子汝於來世過七萬二千阿僧祇百千劫當得成於阿耨多羅三藐三菩提號曰寶上如是音聲餘無聞者唯有一萬二千諸天同得聞之聞已悉發阿耨多羅三藐三菩提心俱作是言願彼寶上成佛之時我等當於是佛法中咨受正法而為弟子爾時如來知是事已復與授記寶上如來成作佛時汝等當作受法弟子彼佛亦當授汝阿耨多羅三藐三菩提記時栴檀窟佛授彼記已爾乃畢竟入於涅槃一切諸天大設供養善男子如來具足如是大悲非諸聲聞緣覺所知善男子爾時彼佛不斷佛種若有衆生供養三寶亦復如是佛説如是大悲功德時此會衆中有三恆沙等衆生發阿耨多羅三藐三菩提心半會大衆得成於忍半中之半得具如是十六大悲其餘半半得佛法忍爾時一切諸天世人聞法歡喜同聲讚歎善哉善哉甚奇甚特快説如是大悲法門
