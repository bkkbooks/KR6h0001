薩向十方佛長跪合掌而說呪曰那提阿三摩路卑一咩羅素摩𭒂泯二伊希那遮久遮尼三那婆久遮尼四那遮久遮尼五牟羅輸陀尼六𭒂荼呿七𭒂荼呿八修羅囉尼九那𭒂修羅囉尼十復多拘知十一波利車陀十二闍羅呿十三闍羅呿婆移十四闍羅呿那十五摩叉呿十六迦迦呿十七呵呵十八呵呵十九休休休二十撥施脾陀那婆利車陀二十一阿摩摩二十二若摩摩二十三呿摩摩二十四三牟陀陀羅二十五阿陀羅呿婆二十六散迦羅尼二十七波利車陀菩提娑廁提比摩二十八比比摩摩訶比比摩二十九復多拘知三十阿迦奢或婆娑波利車陀莎呵爾時娑婆世界十方諸佛菩薩聲聞釋梵龍王阿修羅王乾闥婆王迦樓羅王緊那羅王摩睺羅伽王等同聲唱言善哉善哉菩薩童子善能說是大陀羅尼為壞魔業及惡知識身心諸病是上慧印爾時會中有一梵王名菩提自在自變其身而為女像端嚴殊特踰於人天以妙瓔珞而自莊飾在西方佛阿彌陀前作如是言唯願世尊加我神力令我一音遍滿此間娑婆世界我今欲說陀羅尼呪護說法者及聽法者亦令釋迦如來滅後無有能於是說法者生起惡事若魔若魔父母子息眷屬親友僕使若天若龍若阿修羅若乾闥婆若伽樓羅若緊那羅若摩睺羅伽若鳩槃茶若富單那迦多富單那荔䔧多毘舍遮夜叉羅剎等父母子息眷屬僕使亦復如是於是法師不能為惡乃至不能動其一毛之分為其身心而作惡事唯願世尊加我神力令我音聲遍此世界爾時會中有一帝釋名曰高持語菩提自在梵言姊莫於如來生戲弄心何以故夫戲弄者即凡夫法如來已過凡夫事業一切有為悉是無常如來不增有為之法唯增於空斷聲字句姊如來於汝不生諍訟但觀平等一相無相猶如虛空夫虛空者無三有為無有覺觀不離有為無有障礙如來世尊亦復如是於一切法無有障礙如來於欲亦復如是一切覺觀壽命士夫陰界諸入音聲字句悉皆無礙姊今云何於如來所而生戲弄無量壽佛告帝釋言善男子當先思惟然後發言無得於後而生悔恨何以故是女人者即大丈夫已於無量諸如來所久修善本為欲莊嚴此大眾故現為女身實非女也即是菩薩摩訶薩身汝云何言稱之為姊爾時帝釋聞佛語已即前懺悔自在梵言我受汝懺令汝不得惡口等果爾時梵天白無量壽佛世尊若彼高持不懺悔者當得何等惡口果報佛言善男子彼若不懺當於八萬四千世中常受女身其形醜陋臭穢不淨是故眾生應當護口爾時無量壽佛告菩薩言我今施汝威神道力便可說之爾時梵天敬白十方無量諸佛及諸菩薩一切人天唯願善聽若有欲令如來正法久住於世擁護說法及聽法者唯願諸佛悉施我欲說是語時其音遍滿娑婆世界爾時一切梵王釋王各作是言我施仁欲并欲受持爾時梵天即說呪曰阿摩犁一比摩犁二伽那沙踟三波利戰踟四摩訶戰踟五遮彌六摩訶遮彌七素咩八哆彌九阿𭒂呵十比𭒂呵十一修伽闍尼囉呿婆十二牟羅波利車陀十三夜叉戰踟十四比舍遮戰荼十五阿婆阿多尼十六三婆邏哆尼十七娑伽羅尼十八譫婆尼十九慕呵尼二十郁遮吒尼二十一阿摩呵二十二阿多遮尼二十三呿伽舍婆二十四阿摩羅二十五阿牟羅二十六牟羅波利跋汦二十七阿娑羅呿婆二十八莎呵阿遮遮一阿𭒂呵遮遮二周尼羅叉三遮遮咤四呿遮遮五那呿伽遮遮六遮遮七遮遮遮遮八阿牟羅遮遮九呵摩摩牟羅遮遮十阿牟羅呵牟婆茶婆呵十一莎呵爾時一切諸天世人咸皆讚言善哉善哉是陀羅尼不可思議無能勝者爾時梵王復作是言若有不能調伏惡鬼聞是持已即便能調若有受持如是呪者隨所住國信心諸王一切男子女人若大若小若天若人皆於是王不能起惡若有起惡首為七分其心乾焦身被癩病有神通者即便還失暴風所吹身陷入地隨是持呪流布之處我亦當護令得遠離一切諸惡受者聽者不乏衣食臥具醫藥資生所須爾時會中有一梵天名曰正語亦現女像復作誓言我今於此娑婆世界現在佛前至心護法乃至釋迦如來滅後亦當護之隨是持呪流布之處護其國土說者聽者令離魔業一切惡事若有法師欲說法者為調眾生先當讀誦是陀羅尼即說呪曰阿婆咩一比摩咩二菴婆羅三菴婆呤四波利軍闍那荼五富沙波邏婆呵六闍留迦七摩呿羅蛇八伊利彌利九冀利彌利十冀提遮羅牟蛇離十一牟陀羅目𭇔十二莎呵若有法師先讀誦說如是持者我以天耳當往聽之聞已身往在其會中令諸會者遠離諸惡至心聽受如是持呪若我聞已而不往者則為欺誑過去未來十方現在無量諸佛亦於未來不得成就阿耨多羅三藐三菩提若我往者即令法師逮無礙辯得無所畏聽法之人遠離病苦及疑網心飢渴寒熱兵革怨敵虎狼毒獸一切諸惡唯願十方一切諸佛加我神力爾時釋迦如來白諸佛言今我當與此梵天呪為護法故即便說呪遮慕踟一慕茶波利車陀二阿牟摩三阿牟摩四呵牟摩五娑羅叉六𭒂羅究思七彌呿波利𭒂呵八遮羅摩九蛇哆𭒂十修比呿十一阿牟羅波利車題十二薩婆佛陀阿提㗭汦十三莎呵於是如來說是呪已即告梵天善男子如是持呪力能調伏一切眾生爾時梵天白佛言世尊我今所以現此女身為欲調伏一切女人若有女人欲生男者當讀是持讀是持已即得生男厭兒息者便不復生若有受持讀誦之者我當至心營衛擁護大方等大集經寶幢分中護品第七爾時會中有一菩薩名善繫意立於寶光功德佛前現身如梵或如帝釋或自在天或他化自在天像或兜率天或夜摩天或提頭賴吒天或毘樓勒迦或毘樓博叉或毘沙門或作龍王或阿修羅王或緊那羅王或伽樓羅王或夜叉王或羅剎王或畢力迦王或毘舍闍王或拘辦荼王或作剎利婆羅門毘舍首陀比丘比丘尼優婆塞優婆夷或作師子象虎毒蛇牛馬之形復作種種飛鳥之身一時之中能示八萬四千種色爾時富樓那彌多羅尼子白釋迦如來言世尊何因緣故是善男子變現如是八萬四千種種諸色佛言富樓那是善繫意菩薩摩訶薩所入三昧不可思議非是聲聞緣覺境界是善男子以如是等諸善方便調伏眾生隨眾生身意色三昧悉能住之若有眾生宗事梵天敬念梵天即現梵像為說三乘法乃至或有奉事佛者即現佛身為說三乘若有眾生宗事畜獸即現獸像為說三乘若有奉事山谷河澗樹林百卉即現其像而調伏之若有眾生貪於財利先以財施後為演說三乘之法為壞貪故若有病者隨其所須給施醫藥若悟時與若夢中與令其病者眾苦除愈為調伏故而為說法富樓那是善男子於一日夜能以三乘調伏恒河沙等眾生富樓那言是善男子發阿耨多羅三藐三菩提心已來為久近耶富樓那是善男子已於無量恒河沙等劫中發心是人得是三昧已來調伏眾生已經六萬四千億阿僧祇劫富樓那言世尊是善男子久近當得成無上道成道之時在何國土富樓那此世界中過六大劫劫名星宿於是劫中當成正覺號曰寶髻是時眾生壽四萬歲多造惡逆具足五滓成正覺已四十年中宣說三乘便入涅槃富樓那言世尊彼時眾生未調伏者復當云何富樓那彼時眾生無有一人不調伏者富樓那如是菩薩常立誓願十方各各千佛世界所有眾生乃至一人不調伏者我終不成阿耨多羅三藐三菩提若我不能了了知見如是世界所有諸佛亦復不成阿耨多羅三藐三菩提如是十方千佛世界所有眾生若有一人非我調者我亦不成阿耨多羅三藐三菩提若他世界所有惡人願生我國生我國已我當以三乘之法而調伏之富樓那如是菩薩具足如是不思議事富樓那言世尊我於今者得大利益而得見聞如是正士若有人能至心聽受是大集經是人亦得如是利益大方等大集經寶幢分中授記品第八爾時阿閦佛告大眾言今是眾中梵釋四王阿修羅王人王非人王如是等眾集會甚難汝等今日而得值遇應當至心於諸佛前隨其至樂發深重願時有魔王名莊嚴華現七寶首而為女像身佩種種微妙瓔珞作如是言今我至心於諸佛前立大誓願願於賢劫娑婆世界以此女身常施眾生香華甘果而調伏之以是因緣令其成就阿耨多羅三藐三菩提爾時一切十方諸佛同時讚言善哉善哉善男子汝有信喜而於今日大作佛事當隨汝願悉得成就魔王復言世尊隨何國土有人受持讀誦書寫思惟分別是陀羅尼處我當住中為作種種華果樹林泉源浴池穀米所須令無所乏若有眾生於是經中義說非義非義說義我當治之或令病苦狂亂錯謬國主擯之生瞋害心此言若虛則為欺誑十方大眾亦莫令我於未來世得阿耨多羅三藐三菩提若此世界及他世界佛諸弟子不得供養利安之者無有是處除過去業必應受者如我所施華果浴池泉源穀米即是我之檀波羅蜜受我施已獲得無上慈善之心即是我之尸波羅蜜受我施已勤修精進集諸善法即是我之進波羅蜜受我施已深觀諸法無常之相即是我之禪波羅蜜受我施已能忍一切身口意惡即是我之忍波羅蜜受我施已能觀諸法空無相願即是我之般若波羅蜜如是我則具足成就六波羅蜜唯願十方無量諸佛令我得之爾時十方無量諸佛默然許可爾時慧幢如來讚莊嚴華善哉善哉善男子如汝所願當令汝果汝既果已當得利益無量眾生爾時魔王即以女身說此陀羅尼遮彌呿一遮咩呿二遮咩呿三涅伏多阿提四𭒂呵五𭒂呵六𭒂呵七沫羅八沫迦九娑羅知十比婆婆比十一娑羅娑利地離十二娑羅摩希地離十三娑羅𭒂時離地離十四多波蛇沬迦十五休休休休十六阿沙伽闍脾十七多呿十八多呿十九多呿二十婆油婆醯二十一烏波那蛇二十二薩多波蛇二十三頻闍破羅二十四富逋沙陀二十五陀那陀濘那二十六遮居離廁移二十七闍羅𭒂呵尼二十八沫羅沫迦二十九三藐波羅提波那婆延三十薩多迦利三十一蛇摩咩三十二摩咩三十三摩咩三十四闍婆羅三十五莎呵世尊是陀羅尼流布之處若國土城邑聚落村屯我當住中調伏眾生悉令具足無上佛道爾時一切十方諸佛無量菩薩梵釋四王阿修羅乾闥婆迦樓羅緊那羅摩睺羅伽人非人等同聲讚言善哉善哉善男子汝能以是女人之身護持如來無上正法調伏眾生修行具足六波羅蜜演說無量諸佛功德爾時釋迦如來告諸大眾誰能與此同心護法爾時會中無量眾生咸作是言我等能與是善男子同共護法不相捨離如影隨形願是菩薩成無上道當復與我授佛道記時莊嚴華白釋迦如來言世尊如來滅後我當於此護持如來無上正法及受法者唯願如來憐愍我故授我阿耨多羅三藐三菩提記佛言善男子汝得阿耨多羅三藐三菩提時世界名法行佛名功德意時莊嚴華既聞記已即以香華供養如來爾時會中有一菩薩名曰吉意白娑婆世界十方諸佛言世尊是人已於賢劫之初迦羅鳩孫陀佛所發大誓願願以女身教化成就無量眾生亦令遠離四百四病故說四百四善方便根藥果藥散藥丸藥下藥吐藥阿伽陀藥油蘇湯藥各四百四以如是等調伏眾生復於四萬四千歲中供養恭敬迦羅鳩孫陀佛及以眾僧供養佛已即得受記彼佛告言善男子未來眾生壽命百三十年當有如來號釋迦牟尼以大願力娑婆世界當有十方無量諸佛菩薩集會是大集時汝於彼中當得受阿耨多羅三藐三菩提記迦那牟尼迦葉等佛亦復如是是人爾時白彼佛言世尊我以本願力故常以女身持種種藥給施一切病苦眾生以我是願福德力故一切樹木華果悉出甘露之味若有食者即是我之檀波羅蜜因若有食我如是所施華果穀米甘露味者捨除毀禁受持淨戒即是我之尸波羅蜜因受我食已勤行精進修集善法即是我之進波羅蜜因堪忍持戒思惟修善即是我之羼提波羅蜜因深觀諸法無常之相即是我之禪波羅蜜因觀法苦空無常無我即是我之般若波羅蜜因如此世界女身教化調伏眾生令離病苦十方世界亦復如是世尊我說是事令莊嚴華增長成就精進力勢如來滅後我當與彼共護佛法唯願世尊於此大眾與我授記爾時一切十方諸佛讚言善哉善哉釋迦如來當授汝記爾時世尊告吉意言善男子汝於當來蓮華世界得成為佛號曰善見如吉意女地天水天火天風天虛空天種子天華天果天山天樹天草天坻天㵎天寶天四天下天乃至六萬七千神天亦復如是皆是菩薩現受女像為調伏眾生是等女天悉得授記當成阿耨多羅三藐三菩提所以現為女像教化為令眾生轉女身故若轉男身得女身易若轉女身為男則難是故以此女身教化是等六萬七千諸女得授記已百億龍王百千億夜叉百萬億阿修羅七萬億天九萬九千億魔王恒河沙等人所謂剎利婆羅門毘舍首陀不可數拘辦茶等發阿耨多羅三藐三菩提心無數眾生得不退轉菩提之心不可數眾生得菩薩三昧不可數眾生得無生忍不可數眾生得陀羅尼不可數眾生得菩薩地不可計眾生成就忍辱不可計眾生得沙門果不可計眾生得盡諸漏不可計眾生於聲聞心無有退轉不可計眾生於緣覺心無有退轉不可計眾生得不退心大方等大集經寶幢分中悲品第九爾時釋迦如來白諸佛言世尊憐愍我故悉來集此娑婆世界時莊嚴華吉意菩薩為護法故發深重願如願即得時十方佛為二正士大誓願故即說呪曰樹提婆婆一持律提婆婆二牟尼婆婆三薩多婆婆四富若棱伽婆婆五𫪛那婆婆六摩訶迦留那婆婆七摩訶伏律多婆婆八阿慕呵婆婆九流提婆婆十廁提婆婆十一娑利羅婆婆十二却伽婆婆十三婆由婆婆十四跋多婆婆十五阿提單那婆十六阿摩婆婆十七阿頗那婆婆十八多咃多婆婆十九復多拘置婆婆二十尼提提婆婆二十一梨究舍羅婆婆二十二梨養那婆婆二十三梨陀兜婆婆二十四梨比目叉婆婆二十五梨道居羅婆婆二十六賴吒提那婆婆二十七婆婆二十八婆婆二十九婆婆三十三摩多三十一阿那若三摩多三十二咤咤咤咤咤咤咤咤咤三十三娑咤思提三十四薩婆佛陀究舍羅牟羅阿提啅那三十五莎呵說是呪已復告二人善男子汝等若欲教化眾生應當受持如是等呪時莊嚴華菩薩與諸菩薩其數十萬作如是言十方諸佛為眾生故所說神呪我等要當受持在心若我今於十方佛前立大願已聽是神呪不能受持則為欺誑諸佛世尊亦莫令我得阿耨多羅三藐三菩提若有人天持是呪者設有於其起惡心者我若不護令我不得成無上道若比丘比丘尼優婆塞優婆夷受持是呪亦無有能於是四眾起惡心者時十方佛同聲讚言善哉善哉善男子汝能受持無上法雨爾時釋迦如來告魔波旬汝於佛法當生信心以汝因緣當令無量無數眾生得解脫果汝今失離一切伴侶誰當與汝復共為惡我憐愍故慇懃告教汝可速發阿耨多羅三藐三菩提心魔波旬言世尊我今乃至無一念心發阿耨多羅三藐三菩提心瞿曇今者未能永斷欲界眾生云何令我失離伴侶我終不能歸依三寶大方等大集經寶幢分中護法品第十是時會中有佛名曰曼陀羅華微妙香語釋迦牟尼佛如過去世十方諸佛以憐愍故亦悉集會五滓世界為護法故壞魔怨故憐愍眾生故施大智炬故為說正道故十方現在無量諸佛亦復如是今日十方無量諸佛悉來集會娑婆世界誰可付囑釋迦佛法釋迦如來言我之正法可以付囑頻婆娑羅等諸大國王四王帝釋梵天王等如是等眾能護我法若有能發菩提心者當知是人則能護法爾時一切大眾所有天王梵王龍王異口同聲作如是言世尊我等要當至心護法何以故如來正法難得難值一佛界中無量佛會亦復難遇十方諸佛尚為眾生而來集會我等云何不護正法爾時十方諸佛同聲讚言善哉善哉善男子若有剎利能護法者所有國土衰惡之事四百四病皆令除滅及其國土所有樹木華果穀米滋茂豐登護其人民親戚眷屬令離諸惡若有比丘比丘尼優婆塞優婆夷亦當護之何以故過去菩薩得成阿耨多羅三藐三菩提者皆由擁護正法因緣未來現在亦復如是若能護是受者聽者當知佛法久住不滅是故娑婆世界天王人王當守護法為久住世不斷絕故善男子若有善男子善女人欲令佛法久住於世不滅盡者應當供養是大集經受者說者何以故是大集經即是十方諸佛印封若能供養如是大集即是供養十方諸佛釋迦如來滅度之後隨有是經流布之處若有聽受持讀誦說書寫經卷乃至一偈一句一字而其國主一切惡事即得消滅所有樹木穀米藥草四大天王降施甘露而以益之國土王法悉得增長鄰國惡王勤求和同各各自生喜心慈心一切諸天佛弟子者悉來擁護如是國土王子夫人及諸大臣各各生於慈愍之心穀米豐熟食之無病亦無鬪訟兵革不起無諸惡獸及惡風雨遠離一切過去惡業若諸眾生有女業者現受生受及以後受即能令滅除五逆罪謗方等經及以聖人犯四重禁一闡提輩其餘惡業如須彌山悉能遠離增長善法具足諸根身口意善遠離惡見破壞煩惱修集正道供養諸佛具足善法及內外事令諸眾生壽命增長念慧成就爾時彌勒菩薩等九萬七千億菩薩得無生忍者作如是言我等亦能佛滅度後護持正法為憐愍故當於都邑城村聚落廣說是經爾時娑婆世界無量諸佛同聲讚言善哉善哉善男子娑婆世界一切人天復作是言我等亦能於佛滅度後護持正法及四部眾中受持說者時十方佛復讚歎言善哉善哉汝等真能護持正法善男子汝等若能護持正法應當供養如是諸佛世尊我等要當擁護是經流布之處都邑聚落人民眷屬及受持者并令土地穀米豐熟藥木滋茂何以故隨有是經流布之處我於是中有大力勢以力勢故我能護之令離一切衰禍之事亦令是國所有眾生遠離惡業生於慚愧是時十方諸佛讚言善哉善哉汝今真能護持正法亦能供養十方諸佛護持法者聽受法者大方等大集經寶幢分中四天王護法品第十一爾時釋迦牟尼佛告諸梵天帝釋四王善男子我為如是惡眾生故本願力故大憐愍故於此惡處成就阿耨多羅三藐三菩提為欲利益無明闇冥渴法眾生常樂增長煩惱眾生破壞魔眾建立法幢施其法雨令諸眾生離煩惱苦令不可計無量眾生發阿耨多羅三藐三菩提心無量諸佛及諸菩薩悉來在此世界集會為壞眾生無量惡業紹三寶種我涅槃後所有正法當付汝等汝等便當深心守護若有菩薩福德成就如是等輩亦能擁護我之正法若有眾生已於諸佛種諸善根者是人於後法欲滅時餘五十年守護正法信敬受持讀誦書寫解說其義如是法師若於都邑城村聚落欲多饒益無量眾生當淨澡浴著新好衣莊嚴香華於一案上安置種種諸甘味漿置高座前汝等爾時若不來集為護法師遮諸惡事聽受正法自利利他汝則欺誑十方諸佛爾時梵天白佛言世尊隨是經典流布之處都邑聚落我當至心而擁護之若比丘比丘尼優婆塞優婆夷欲說是經當淨洗浴著新淨衣聚集香華乃至甘漿置高座前我與眷屬定往其所若我不往則為欺誑十方諸佛世尊此世界中隨有是經流布之處當令其地無諸兵革及諸惡事我今至誠十方佛前立深重誓即說呪曰安仇呵一登伽二富羅那呵三蛇咩呿四呿呿五婆呿六𭒂呿𭒂七居離那呿𭒂八莎呵爾時釋提桓因即說呪曰呿𭒂密一摩奢密奢二那羅呿三阿牟若四阿牟𭒂呵五阿呿吒六阿呿七阿伽呿時那休律𭇔八莎呵爾時東方天王提頭賴吒即說呪曰頻頭闍那一呿婆闍那二羅牟呿三叉娑羅四富那呵五阿末伽婆咤六莎呵爾時南方天王毘留勒叉即說呪曰郁呿那婆闍荼一三牟陀斯若二多哆周多三婆邏那𭒂四婆邏闍五莎呵爾時西方天王毘留博叉即說呪曰闍路伽一阿郁伽二阿摩慕伽三阿摩摩娑邏闍四婆脾也牟闍五莎呵爾時北方天王毘沙門即說呪曰𩘌地離一𩘌𩘌𩘌地離二呿𩘌地離三阿尼𩘌地離四希力多𩘌地離五娑竭邏希力多六𩘌地離散究娑𩘌地離七陀摩叉地𩘌地離八莎呵爾時十方諸佛讚梵釋四王等言善哉善哉汝等今真能護持正法時梵釋四天王等白佛言世尊我等隨是經典流布之處要當至心護持十方諸佛及諸菩薩同共讚言善哉善哉毘沙門等汝能真實護持正法爾時娑婆世界有萬二千大鬼將軍護此世界復有四萬四千小將成就大力及大功德同音而言世尊我等亦當於未來世隨有是經流布之處我則隨護若說法時我亦當往有聽法者當為壞其種種魔業護說法者令得增長一切善法當勸諸王大臣長者施其衣食種種資生所須之物亦令其土無有兵革寇難之事及惡風雨若我虛妄則誑十方無量諸佛爾時娑婆世界有一菩薩名曰疑心白釋迦牟尼佛言世尊此娑婆世界有百億魔不如其有者悉來集不佛言一切都集世尊若都集者有信心不佛言善男子皆有信心唯除波旬眷屬千人當於未來破壞我法常求過罪是魔波旬及其眷屬破壞三寶何以故皆是過去惡因緣故過去不種善根因緣善男子我法滅時是魔波旬及與眷屬於如是法乃得信心種菩提子修菩薩道乃至得阿耨多羅三藐三菩提爾時會中有一魔天名曰太白已於無量諸如來所成就功德所有信根無能傾動奉敬三寶已於諸佛得受阿耨多羅三藐三菩提記現仙人像從坐而起長跪合掌以大音聲遍諸佛土而白佛言世尊釋迦如來本願因緣生憐愍故於此具足五滓世界謗法眾中得成阿耨多羅三藐三菩提以憐愍故說三乘法脫三惡道復為無量無邊菩薩說無生忍不斷十方諸佛種性是故我當於未來世至心擁護令釋迦法久住不滅令諸魔眾不得其便我終不壞如來正法若無持者佛法則滅若諸四眾無說聽者法則衰滅若未來世善男子善女人修立三業紹三寶性為壞三界諸惡煩惱修行正道能壞眾生三惡道苦一切魔眾無能為也唯願十方無量諸佛施我功德智慧二力我欲誦呪為壞一切惡魔眷屬時十方佛同共讚言善哉善哉時太白魔即說呪曰阿摩犁一阿漢呿咩二阿闍婆𭒂三阿闍婆婆四阿闍婆婆五牟羅娑犁六脾也呿娑𭇔七闍摩娑犁八呵呵九呵呵十呵呵十一伽羅娑吒十二闍囊却伽十三若蛇却伽十四比若蛇娑呿伽十五阿牟叉邏十六叉叉十七叉叉十八叉叉十九牟邏婆呵呿迦二十莎呿若二十一莎波利婆多二十二牟邏二十三阿若若二十四戰陀修利蛇若若二十五婆提若若二十六那婆呵若若二十七呿邏叉若若二十八那波邏若若二十九復多拘知若若三十多哆多若若三十一薩菩婆比若若三十二邏提悉多若若三十三遮居邏摩頻婆多叉婆三十四叉摩摩三十五叉波若三十六差比多三十七摩羅比沙蛇三十八莎呵說是呪時地六種動一切魔眾心生怖畏一切天人乃至迦羅富單那皆離怖畏得不退轉菩提之心爾時魔王問堅意言善男子是太白魔王從何處來有何等力而能破壞一切魔眾及諸黑業增長瞿曇斷滅之法我今覩見心欲變吐四方皆闇身心苦痛而彼見之甘樂愛著唯願憐愍為我說之堅意菩薩言波旬皆是一切諸佛威神令是太白有如是力以是力故壞諸魔眾增長如來無上正法是太白菩薩所有德力乃至人天無能壞者波旬汝於三寶宜應生信發菩提心遠離一切身口意惡波旬言大士我今方欲造成種種身口意惡實不能發菩提之心大方等大集經寶幢分中曠野鬼品第十二爾時曠野菩薩即現鬼身散脂菩薩即現鹿身慧炬菩薩現獼猴身離愛菩薩現羖羊身盡漏菩薩現鵝王身如是五百諸菩薩等各各現受種種諸身其身悉出大香光明一一菩薩手執燈明為欲供養十方諸佛爾時疑心菩薩至心觀察是五百人即知悉是菩薩大士語曠野鬼言善男子汝等何故現如是身供養諸佛曠野鬼言善男子往古過去九十一劫有佛世尊號毘婆尸如來應正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊我於爾時與如是等同一父母共為兄弟受持五戒勤修精進聰明智慧心樂善法種種供具供養彼佛既供養已皆發阿耨多羅三藐三菩提心為欲調伏一切眾生尸棄毘舍浮鳩留孫佛亦復如是皆供養已散脂大士於彼佛前立大誓願願我來世以鬼神身教化眾生若有弊惡惡鬼眾生我當演說三乘之法而調伏之乃至無量恒河沙等惡鬼惡獸悉令調伏然後乃當成就阿耨多羅三藐三菩提亦有一萬二千大鬼於此世界發大誓願調伏眾生爾時我復發大誓願若有惡鬼欲壞如來如是正法我當治之是故我受如是鬼身若有惡鬼能殺眾生令其心亂惡心殺害深著邪見能令剎利婆羅門毘舍首陀亂心作惡於國土中移轉日月錯易年歲使國荒亂寒暑失所變改時節降惡風雨穀米不登及壞一切樹木果子願我悉能調伏教化令住三乘我亦不害奪其命根同其受身與共軟語言談戲笑以三乘法而教化之令離惡道若有眾生遠離善法行身口意不善之業捨是身已生三惡道或有雜作善惡諸業是人捨命則受鬼身是故爾時惡鬼滋多善鬼尠少是故我欲調伏惡鬼現受是身亦令剎利婆羅門毘舍首陀遠離惡心善男子有金剛槌呪以是呪力一切惡鬼於彼四姓不能為惡善男子若有都邑城村聚落有是呪處一切惡鬼無能為也是處眾生皆修慈心遠離一切不善之事惡病惡雨亢旱鬪諍乃至鳥獸皆生善心遠離一切諸惡怖畏我今於此十方佛前發大誓願欲說是呪爾時釋迦如來告曠野鬼善男子十方諸佛今已施汝神通之力便可說之時曠野鬼即起合掌而說呪曰豆摩一豆摩二陀摩三陀摩四豆摩五豆摩六那那羅七尼羅八尼羅九究吒尼十究吒尼十一摩訶究吒尼十二吒吒吒株十三摩訶吒吒吒十四阿娑婆十五阿比十六利尼十七利尼十八摩訶利尼利尼十九利彌二十利彌二十一利彌二十二陀利蓰二十三摩訶利蓰二十四首流首流二十五摩訶首流首流二十六首流多二十七摩訶首流首流二十八郁究摩二十九仇摩三十仇摩三十一仇摩那三十二利彌三十三利彌三十四希利三十五希利三十六希利三十七希利三十八希利三十九希利四十希利四十一希利四十二希利四十三希利四十四希利四十五希利四十六尼彌四十七尼彌四十八希尼四十九希尼五十牟尼五十一牟尼五十二牟提尼五十三娑邏娑邏娑邏吒五十四路迦那利也五十五祇儜五十六祇儜五十七時儜力沙婆五十八時那五十九時那六十時那邏沙婆六十一莎呵世尊隨有國土誦此呪處彼諸惡鬼雖聞是呪於諸眾生猶懷惡心兇暴難伏不受法教不起慈心者我為是等諸惡鬼故更說此呪以調伏之阿車一阿車二牟尼三牟尼四尼休休五牟尼六牟尼七摩那邏沙婆八休休九阿尼羅那荼十阿多但荼十一阿多阿提十二流咤十三希尼十四希尼十五希利十六希利十七希利十八希利十九希利二十希利二十一希利二十二希利二十三郁仇摩二十四仇摩二十五仇摩二十六仇摩二十七希梨二十八希梨二十九希梨三十尼利三十一尼利三十二摩訶尼梨三十三三牟陀呼呿三十四阿吒三十五阿吒三十六阿吒三十七陀羅咩呿三十八叉𭒂呿三十九叉𭒂呿四十卑利癡比四十一阿波四十二泯闍四十三婆由四十四阿迦奢四十五啅啅啅四十六究脾四十七婆窮脾四十八阿叉窮脾四十九視鞾窮脾五十薩多伽窮脾五十一邏闍窮脾五十二薩多兜窮脾五十三莎呵大方等大集經寶幢分中還本品第十三於是十方無量諸佛各各欲還本佛世界其地即時六種震動上虛空中雨種種華微妙伎樂不鼓自鳴種種諸香而以供養一切大眾悉共合掌禮敬諸佛爾時梵天白月香佛言世尊是誰神力成幾福德於未來世能信受持讀誦書寫如是經典梵天皆是十方現在諸佛本願力故破壞魔眾除國霜雹暴風惡雨護持正法為調眾生宣示正道亦是諸佛本願力故來世眾生成就十法能於未來護持正法是人亦為諸天所護梵天若有人能具足念心善意方便是人則能擁護正法不貪五欲常修習空忍辱如地得深大忍以四攝法攝取眾生此彼無礙修行清淨菩提道行寶幢三昧如是之人於未來世能護正法書寫受持讀誦解說是人捨身得見十方現在諸佛及比丘僧諸菩薩等亦聞諸佛所說妙法聞已即得聖人喜樂滅除一切不善之法得生清淨諸佛國土常聞演說大乘經典終不生於五滓世界常得親近娑婆世界如是諸佛是人於後餘五十年以佛力故則能護持如來正法爾時釋迦牟尼佛告梵天言隨是經典流布之處其土則無一切惡事惡雨疾病受者聽者身無患苦衣食無乏爾時華幢佛告諸大眾若以滿此娑婆世界微妙七寶施十方佛不如有人於佛滅後餘五十年受持讀誦書寫是經所得福多先福德佛復告大眾假使有人以恒河沙等上妙七寶施十方佛不如有人於佛滅後餘五十年受持讀誦書寫是經所得福多佛說是已諸天世人聞已歡喜信受奉行安伽邏一安伽邏二半伽邏三婆婆伽邏四婆邏𭒂伽邏五婆蛇比呵六曼囉婆毘七阿㖉八阿呿婆泠九題咩十度慕泯十一翹婆知十二翹由離十三三摩婆阿尼十四三摩多婆提泠十五阿彌十六阿移十七陀摩翹闍十八彌囉㝹破梨