body:
  text: 北涼天竺三藏曇無讖譯寶幢分第九中陀羅尼品第六爾時東方有樂世界佛名阿閦與諸無量神通菩薩發彼世界一念來至娑婆世界釋迦如來大集之處到已坐於化蓮華上無量菩薩亦復如是各各皆坐化蓮華上如是東方無量諸佛無量菩薩各各來詣娑婆世界到已皆坐化蓮華座南北二方亦復如是爾時西方安樂世界無量壽佛亦與無量神通菩薩發彼世界一念來至娑婆世界釋迦如來大集之處到已坐於化蓮華上無量菩薩亦復如是各各皆坐化蓮華上各各以己神通福力作供養具或作金沙和微妙香以散佛上或作種種微妙香華或起右遶娑婆世界或有長跪說偈讚歎或有繫心善思惟者或雨金華乃至優鉢羅華或以妙眼瞻覩佛身時有童子名須菩提以己神力及佛神力出大音聲而說偈言諸佛無量大寶幢能壞一切疑網心我初未曾得見聞如是無量大會眾滿此世界無量佛具足福德諸菩薩此地即是大寶塔皆得供養十方佛無量諸佛何因緣悉來集是惡世界今此國土惡眾生亦復不能信佛事為壞一切大魔業為欲具足大功德為欲示現大神通是故諸佛集會此此會若有諸眾生至心生於信喜心若以此心聽受法是人即能破魔業若欲通達無上乘及欲修行八正道若欲永斷諸煩惱應當至心聽正法諸十方佛及菩薩皆來至此坐化華釋迦如來欲說法為護正法住無量如是音聲充遍大會無量菩薩得無量忍異口同聲作如是言我今坐已唯願如來宣說正法攝一切法無畏微妙能壞魔業過於魔道摧伏魔幢建立勝幡壞諸煩惱調伏怨敵裂諸疑網入種智門過諸怖畏護眾菩薩亦令菩薩一切受樂得諸菩薩慧方便門及以一切安樂之處一切三昧忍辱光明慧方便門三十七品心陀羅尼唯願如來廣分別說為令眾生受諸安樂獲得上色上力上樂上觸上辯上念上意為聞法已不忘失故為壞國土惡瑞應故受持戒故修集道故不失無上菩提心故唯願如來為如是事頒宣廣說是陀羅尼為護法故不斷一切三寶種故示諸菩薩菩提道故為不分別虛空法性空相等故顯示明闇有相無相觀平等相此彼法故為不分別眾生壽命士夫等法不生不滅斷一切相一切變易等相無物虛空實性故唯願釋迦牟尼如來及與諸佛廣宣分別大陀羅尼為令無量無邊眾生真實覩見三寶性故為令無量無邊眾生發阿耨多羅三藐三菩提心故爾時一切無量諸佛默然許之許已即入諸佛上妙境界誓願功德三昧爾時此間娑婆世界所有地獄畜生餓鬼諸苦即滅得見諸佛有諸眾生疑網無信即得淨信一切眾生悉見無有貪欲瞋恚愚癡憍慢惡見疑網狂亂等病身心寂靜各各皆作如是念言唯我一人獨坐佛前聽受正法如來世尊唯為我說獨調伏我斷諸煩惱如我所請而為我說爾時世界一切眾生異口同音作如是言願佛說法我當頂受爾時釋迦如來勸此世界所有眾生令供養佛爾時眾生既聞勸已即各供養一切諸佛香華幡蓋伎樂讚歎爾時世尊即作是言十方諸佛諦聽諦聽我以往昔本願力故在此世界具足五滓惡眾生中成阿耨多羅三藐三菩提是諸眾生迷失正道無明所覆失於正念增長煩惱安處三趣樂作十惡遠離善根捨功德業喜造五逆耽著非法誹謗正典毀呰聖人瞋恚熾盛不樂修慈招提僧物隨意而用於業果報不能深信不樂供養師長和上有德之人為如是等弊惡人故修集如是大慈悲心以是因緣於是世界而得成道既成道已常樂修集勤精進法忍於飢渴寒熱等苦遊諸國土城邑聚落為諸眾生宣說正法或有眾生貧窮病苦受身醜陋為憐愍故受其所施臭穢之食為欲增長施主福德皆悉食之亦受眾生麁澁臭穢弊壞衣服山間河澗空曠林野所有住處悉亦受之若草若葉若石若塼為眾生故隨施受之而臥其上以勤精進修善方便為剎利故演說王事為婆羅門說四毘陀星宿祀天為諸大臣說治化事為諸醫師演說四大增減等病為諸農夫商賈之人說護財穀為諸女人說護瓔珞勤修諸善得不共夫為出家者說於忍辱為調伏故說如是法未得善利勸之令得未得證者勸令得證未解脫者勸令解脫為調眾生受諸苦惱我為眾生修集慈悲然諸眾生猶於我所生不善心或打或罵或生嫉妬或有說言沙門瞿曇即是幻士雖讚持戒自畜妻婦雖讚慈心而害眾生讚捨富貴自往王家瞿曇沙門善知方術雖畜妻婦不生子息瞿曇沙門能治女身故令末利生愛重心瞿曇沙門善知呪術故令須達生宗敬想瞿曇沙門善知藥法是故其身常有光明得如是等無量惡名或有以石土木刀毒遙見打擲為欲殺我為殺我故故放惡象毒蛇於我住處放大猛火糞穢不淨造作種種諸惡方便欲壞我法為滅我法為摧法幢為破法船為壞法性為破法藏十方諸佛唯願觀察過去諸佛有於如是五滓世界成得佛道無有不說如是大集金剛法心因緣自在陀羅尼者為壞一切諸魔力故為三寶種不斷絕故為諸眾生增善法故為壞一切佛法怨故為令眾生遠離苦故滅身口意諸惡業故為令人天性調柔故為諸國土受安樂故為破世間諸惡相故為令眾生悉得具足六波羅蜜故為發無上菩提心故為教菩薩善方便故為令菩薩次第住故以如是等諸因緣故過去諸佛為如是等五滓眾生說是大集金剛法心因緣自在陀羅尼也今此世界十方諸佛悉來集會唯願諸佛各說如是陀羅尼呪為憐愍故為當流布大乘經故為此世界法久住故令諸惡魔不得便故爾時諸佛即皆同聲說此陀羅尼句安伽邏一安伽邏二半伽邏三婆𭒂伽邏四婆邏𭒂伽邏五婆蛇比呵六曼囉婆毘七阿𭇔八阿佉婆呤九題咩十度慕汦十一翹婆知十二翹由離十三三摩婆阿尼十四三摩多婆提呤十五陀彌十六陀移十七陀摩翹闍十八彌囉㝹破犁十九破羅婆