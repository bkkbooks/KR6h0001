body:
  text: 隋天竺三藏那連提耶舍譯日藏分陀羅尼品第二之一爾時世尊共頻婆娑羅王說是法時東方過無量無邊恒河沙等諸佛國土有佛世界名無盡德佛號瞻波迦華色如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊於今現在常說妙法教化眾生彼有菩薩名日行藏仰觀虛空見有無量無邊阿僧祇菩薩摩訶薩眾從東方來往趣西方復見西方有大光明是等菩薩尋光而去爾時日行藏菩薩見此事已即從坐起頂禮佛足恭敬合掌白佛言世尊我見空中無量無邊恒河沙等諸菩薩眾從東方來往向西方復見西方有大光明以何因緣有此大光諸菩薩等尋光而去爾時瞻波迦花色佛告日行藏菩薩言善男子西方過無量無邊恒河沙等諸佛世界彼有世界名娑婆具足五濁其國有佛名釋迦牟尼如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊於彼世界召集大眾以方便力廣說三乘論議法門教化眾生為令法母久住故為令三寶不斷絕故為令法行常住故為令魔王失勢力故為建立法幢故為令正法久住故以是因緣諸菩薩等集彼世界十方諸佛已於彼處說寶幢陀羅尼竟各還本土今釋迦牟尼佛復於彼界為諸菩薩摩訶薩大阿羅漢一切大眾演說三乘四無礙智四梵天行及四攝法娑婆世界地及虛空大眾充滿咸皆渴仰樂聞佛說何以故彼佛如來所說妙法猶如甘露一切聽者心無厭足又以彼佛本願因緣十方佛剎諸菩薩眾皆集其土彼諸菩薩或有百劫修行者乃至一生補處者有於十八不共法中自能修習不由他悟者有得自在無礙智慧方便具足者是諸菩薩既集彼已一切皆坐以自善根方便力故入於三昧入三昧已身放光明有菩薩光如一燈者有如山上烽火者有如一日十日百日千日光者有如無量千萬日光明者以彼菩薩力故於大集所遍覆三千大千世界為欲令彼娑婆世界福德莊嚴四大滋味地轉增勝眾生受用增益身力得四念處得大精進遠離慳貪能行布施如淨佛剎諸眾生等以是因緣諸菩薩眾各各端坐以自善根力入諸三昧放大光明復有十方諸佛剎中菩薩摩訶薩未來集者從禪定起見大光明亦欲往詣娑婆世界見釋迦牟尼佛及大集眾恭敬禮拜聽受妙法欲聞日藏法行壞龍境界焰品一切眾生惡業盡陀羅尼故諸菩薩等欲集彼處以自善根力入種種三昧汝今亦可從禪定起詣彼世界善男子彼佛世界諸眾生等有種種惡多諸渴愛為諸煩惱之所繫縛猶如廁猪樂處不淨諸女人等身體醜陋自謂端正猶如醉人不自覺知種種臭穢自言清淨兩舌惡口遠離實語常樂婬欲行非梵行實大愚癡現智慧相心大慳貪現能施相心懷諂曲虛幻不實現質直相於他善事心生妬忌口言讚美心懷瞋嫉現慈忍相常樂破壞現和合相邪見偏多現正見相彼土眾生有得禪定獲身通者或有具足得五通者或有久修四禪定者如是智慧丈夫為諸女人之所惑亂心隨染著為欲所使猶如僮僕於一念頃退失是等諸妙功德當墮惡道以諸女人惡因緣故得如是罪善男子彼佛世界有如是等種種諸惡汝今頗能往彼國不我欲與欲善男子彼釋迦牟尼佛說日藏法行壞龍境界焰品盡一切眾生惡業陀羅尼我今說欲所謂四諦順忍陀羅尼汝可持去此陀羅尼有大勢力有大利益能除一切欲貪色無色貪能除我慢大慢增上慢能除一切不淨資生能除一切惡貪種種戲笑及諸歌舞無利益事能盡一切我見一切邊見一切疑一切戒取一切常見一切斷見一切眾生見一切障礙見一切逋沙見一切富伽羅見一切作者見一切受者見一切色見一切聲見一切香味觸見一切四大見一切生見一切滅見一切法見此四諦順忍能如實知色陰乃至識陰能知十二入十八界知已能捨此陀羅尼能照諸法悉能現見諸涅槃道何以故彼界眾生甚大愚癡如生盲人此四諦順忍一切法常住藏不可思議法門能斷一切惡見能得一切自在能破魔王境界及魔伴黨能破魔事及他境界悉能降伏一切外道能怖一切諸惡毒龍能令一切諸天歡喜能令善夜叉皆得安隱能怖諸惡阿修羅迦樓羅能令緊那羅心生歡喜能令摩睺羅伽生大怖畏能令剎利生大信心能攝婆羅門令住佛法能令毘舍生大信心能令首陀羅生歡喜心能斷一切婦人貪欲令多聞人生大歡喜令坐禪人心得安隱能却一切種種惡事及諸鬪諍能除飢饉及夭橫死能除外賊惡風惡雨惡獸瀑水非時寒熱枯澁苦辛惡草等物能令法母常住不斷能建三寶佛法欲滅生大怖畏能令不滅怖畏眾生能施無畏能生盡智覺無生智能破一切無明闇障能除一切生死苦擔爾時世尊即說呪曰𡃂絰咃一婆裔婆野波履婆隷二婆醯婆訶波履婆隷三必利洟他地反仳必利洟他地反鼻波履婆隷四阿捭阿跛波履婆隷五低誓低𥝟波履波隷六末隷末邏波履婆隸七却偈其隸反却伽其箇反波履婆隷八阿盧翅阿盧迦其可反波履波隷九薩他迷芒閉反薩他麼波履婆隷十曷羅誓曷羅釐可反𥝟波履婆隷十一徙隷徙邏波履婆隷十二伽迷伽麼波履婆隷十三阿蒱婆阿蒱婆波履波隷十四羅麼羅羅麼十五羅謎芒閉反羅麼十六曷羅勒可反曷羅邏十七何囉羅何囉羅麼十八䏶踏𭒂蒱麼反攘娜復䫂登我反十九伽邏彌復䫂登我反二十揭邏磨波履婆隷二十一斫蒭揭邏醯斫芻揭邏訶波履婆隷二十二輸嚧呾囉揭邏醯輸嚧呾囉揭邏訶波履婆隷二十三伽羅娜揭邏醯伽羅娜揭邏訶波履婆隷二十四什婆揭邏醯什婆揭邏訶波履婆隷二十五迦居佉反耶揭邏醯迦耶揭邏訶波履婆隷二十六麼娜揭羅醯麼那揭邏訶波履婆隷二十七馺跛曷利捨揭邏醯馺跛曷利捨揭邏訶波履婆隷二十八鞞䫂娜揭邏醯鞞䫂娜揭邏訶波履婆隷二十九怛履瑟那揭邏醯怛履瑟那揭邏訶波履婆隷三十憂波陀那揭邏醯憂波陀那揭邏訶波履婆隷三十一婆𭒂揭邏醯婆𭒂揭邏訶波履婆隷三十二闍帝揭邏醯闍帝揭邏訶波履婆隷三十三𥝟囉摩囉娜揭邏醯𥝟囉摩囉娜揭邏訶波履婆隷三十四獨佉珊多跛揭邏醯獨佉珊多跛揭邏訶波履婆隷三十五阿囉波邏蹹陛𥝟揭邏醯阿囉波囉蹹陛𥝟揭邏訶波履婆隷三十六阿跋䫂鞞婆䫂寫三十七阿跋囉摸跛麼娑卸思夜反鞞也三十八毘尼跋阿利三十九彌也曷囉捨四十薩鞞伽羯帝莎波訶四十一善男子此日藏法行壞龍境界焰品盡一切眾生惡業陀羅尼欲四諦順忍汝可持往娑婆世界問訊釋迦牟尼佛作如是言東方過無量恒河沙佛剎彼有世界名無盡德佛號瞻波迦華色多陀阿伽度阿羅訶三藐三佛陀今現在說法彼佛如來令我送欲并問訊釋迦牟尼佛少病少惱氣力安樂及諸弟子悉安隱不聞佛說法如教行不彼釋迦牟尼佛已能破壞一切魔王境界一切龍王境界獨超眾聖轉妙法輪但彼五濁諸惡眾生障礙未盡為是等故我今說此日藏法行壞龍境界焰品一切眾生惡業盡陀羅尼欲此四諦順忍陀羅尼有大威德若有人能受持讀誦得大勢力爾時日行藏菩薩摩訶薩作如是言我已受持此陀羅尼得大勢力能向彼國具足宣說但彼世界有諸惡事我甚怖畏何以故我向親聞佛口所說彼土眾生多諸貪欲如生盲人諸女人等多諸姦諂誑惑於人實不端正自言端正實大愚痴現智慧相能令眾生迷沒貪著乃至久修禪定得五神通諸智慧人於一念頃為諸女人之所惑亂退失是等神通智慧一切善根墮大地獄彼諸眾生有如是事故我怖畏時瞻波迦花色佛聞此語已告日行藏菩薩言善男子汝今不為自身得力自身安樂當為利益一切眾生故往彼宣說爾時瞻波迦花色佛告日行藏菩薩言善男子彼娑婆世界釋迦牟尼佛大集眾中有一優婆塞名毘摩羅詰是汝身不時日行藏菩薩默然不答爾時世尊復更問言善男子何故默然如是三問然後乃答作如是言如是如是我於彼剎為欲教化諸眾生故名毘摩羅詰彼諸眾生皆謂我是優婆塞毘摩羅詰世尊我於無量阿僧祇諸佛剎中為化眾生作種種身或於餘剎作梵王身或作帝釋或作炎摩兜率化樂他化自在天王等身復於餘剎或作龍王阿修羅王迦樓羅王緊那羅王摩睺羅王如是等身復於餘剎或作聲聞辟支佛身或作人王剎利等身婆羅門身長者身女人身童男身童女身復於餘剎或作畜生身餓鬼身地獄身世尊於此剎中有八十百千諸菩薩等同修禪定行住坐臥未曾捨離是等菩薩見我欲往娑婆世界皆樂隨從欲見釋迦牟尼佛及大集眾禮拜供養并欲聽法而諸菩薩有初行者其心未定而彼世界多諸惡事是等菩薩或生貪染恐於彼處近惡知識心生顛倒我甚怖畏爾時瞻波迦華色佛告日行藏菩薩言善男子勿怖勿畏今為汝等一切菩薩說離受不共行法無相處行調伏地行解脫之行到有海岸行三寶性久住不盡行大慈大悲行一切智解脫行壞四種魔降外道行盡智無生智行盡一切作業一切壽命陰行善男子今為汝說日眼蓮華陀羅尼此陀羅尼能令眾生厭離生死三有牢獄得無相三昧解脫門蘇息處得無相三摩跋提捨最後一念身智而入涅槃善男子若有人能一心聽受此日眼蓮華陀羅尼是人所有一切貪欲及諸煩惱皆悉微薄捨身之後七返生天得宿命智不為欲染而得聖道一切諸天皆樂供養天上壽盡復得七返生於人中雖處欲界不為欲染即於人中得成聖果常為一切禮拜供養善男子若有得聞此陀羅尼乃至七遍一心善聽者此人命終七返生天獲得五通為諸天師一切諸天皆悉禮拜恭敬供養天上壽盡七返生人得五神通為人中聖師一切天龍夜叉乾闥婆阿修羅等皆悉供養善男子若有人能於天眾中七遍宣說此蓮華陀羅尼一切諸天及天女等能一心聽皆離五欲樂修禪定若有人能於國王所或剎利婆羅門毘舍首陀等眾中七遍宣說此陀羅尼如是等眾能善聽者即得出家若有女人得聞此呪一心善聽七日七夜不念餘事專心誦持捨此身已得轉女身隨所生處能薄貪等一切煩惱於阿耨多羅三藐三菩提無有退轉乃至得證大般涅槃終不更受女人之身除化眾生自願受身善男子若有誦此蓮華陀羅尼七遍呪諸藥草用塗鼓貝若打若吹隨其音聲所至之處一切呪咀一切厭蠱一切毒藥一切符書一切諂縛婬欲煩惱不能為害善男子我今說此大力日眼蓮華陀羅尼即說呪曰多絰他一徙陀麼帝二毘盧迦基我反麼帝三隸四羈居離反䫂丁可反矣利師五漚制六蘇樓漚制七佛地徒紙反毘佛地徒紙反八摩訶佛地九欝奴摩提十欝奴摩爹徒娜反十一鉢底篩踈皆反達膩十二阿羅伽摩蘆婆十三阿囉伽度蘆婆十四鉢底篩達膩十五頻豆頻豆麼底十六質吒質吒鉢底篩達膩十七頞勒羈居離反十八旃陀羅提十九呵呵虎我反質𢰗竹几反二十訶䫂膩弭二十一訶䫂迦基我反麼鞞祇基犁反二十二訶䫂富娜曷囉婆𭒂二十三曷囉栘社奚反二十四訶䫂斫三芻二十五摩帝二十六訶䫂毘麼䫂佛地徒紙反二十七訶䫂夜奇離二十八訶䫂毘三麼揭離二十九訶䫂三姥爹囉社裨三十訶䫂鞞麼䫂曷囉誓三十一訶䫂咥呼旨反㖑呼計反三十二訶䫂者者帝嘲隸反三十三訶䫂達麼曷囉誓三十四訶䫂蒱呼曷囉誓三十五訶䫂跛社麼帝三十六訶䫂嚧伽曷囉捨彌三十七訶䫂達麼徙蜜帝三十八訶䫂薩婆優波陀娜三十九若如者反茹若如者反四十毘社樹竪四十一毘者社若若如者反四十二娑羅末伽其我反若若如者反四十三沙案䫂四十四娑囉伽其我反四十五獨𭣿莎波訶四十六善男子此日眼蓮華陀羅尼能乾一切欲河能出一切苦海到於彼岸汝當至心持此陀羅尼往彼世界如從我聞至彼說之何以故彼佛世界有百千萬種種魔事呪藥蠱道能壞眾生所有善法汝等若誦此陀羅尼一切魔王內外眷屬所作種種無量惡事及上妙五欲不能侵惱何況餘人鄙陋穢欲而能為害爾時日行藏菩薩與無量千萬億那由他諸菩薩等及無量百千那由他諸天及人白佛言世尊如來功德智慧辯才不可思議大不可思議最大不可思議我等昔來未曾得聞如是壞欲大陀羅尼說此語時眾中八萬四千天女至心聽受生大信心恭敬供養即轉女身得男子身於阿耨多羅三藐三菩提得不退轉爾時瞻波迦華色佛捉瞻波迦花鬘告日行藏菩薩摩訶薩言善男子持此華鬘并日眼陀羅尼四諦順忍陀羅尼往彼世界供養釋迦牟尼佛此陀羅尼有大勢力猶如電光速能破壞一切欲事能大利益能盡一切欲貪乃至能除一切苦擔汝可持去問訊釋迦牟尼佛時日行藏菩薩於彼佛所默然受之爾時眾中八萬菩薩俱白佛言世尊我等皆往彼娑婆世界見釋迦牟尼佛及大集眾禮拜供養聽受妙法佛言善男子隨汝意去咸可一心作梵天像形色長短威儀服飾往彼世界爾時日行藏菩薩及無量百千那由他諸菩薩等皆作大梵天像形色長短威儀服飾等無有異作此化已頂禮佛足右遶三匝遶已復禮禮已於彼界沒如一念頃即至娑婆世界初入娑婆世界即以瞻波迦華散釋迦牟尼佛積至于膝如是漸行往詣佛所到佛所已頂禮佛足却一面立當爾之時釋迦如來猶為頻婆娑羅王宣說法行爾時南方去此娑婆世界譬如有城方一由旬沙滿其中復有一人具大神力擔負而行盡一世界乃下一沙過是數已有佛世界名袈裟幢具足五濁佛號山帝釋王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊今現在說法於彼眾中有菩薩摩訶薩名曰香象仰觀虛空見無量無邊阿僧祇菩薩摩訶薩眾從南方來往詣北方又見北方有大光明見此事已問山帝釋王佛言以何因緣諸菩薩等從南方來往詣北方爾時山帝釋王佛告香象菩薩言善男子北方過一由旬城沙滿其中從是北行一沙為一世界過是數已有佛剎土名曰娑婆具足五濁有佛號釋迦牟尼於今現在為無量大眾以方便力廣說三乘論議法門為教化眾生故為令法母常住故三寶性不斷絕故增長法行故壞魔境界故建立法幢故十方諸佛已於彼剎說寶幢陀羅尼竟各還本土今釋迦牟尼佛復為諸菩薩摩訶薩大聲聞眾宣說妙法娑婆世界地及虛空大眾充滿間無空處樂聞佛說何以故彼佛如來所說法要言辭美妙猶如甘露一切聽者心無疲厭善男子汝能往彼娑婆世界聽受法不我今亦欲與彼佛欲并說隨順空忍陀羅尼此陀羅尼有大勢力能大利益能盡一切欲貪一切色貪一切無色貪能盡一切我慢大慢增上慢能生盡智能覺無生智能裂一切無明闇障能捨一切苦擔爾時世尊而說呪曰哆絰他一頭摩帝頭摩帝二惡踦𨈬宜反頭摩帝三鉢囉娑婆頭摩帝四薩婆迦頭摩帝五阿鞞却伽其我反六培鞞娜却伽七碎蘇骨反朱却伽八阿𭒂摸訶却伽九阿娜涅也却伽十毘耶佛履帝却伽十一僧迃嘍者却伽十二阿泥麼却佉十三盧者那却伽十四尸棄却伽十五毘底都履反寐囉却伽十六郁芻麼却伽十七塢囉却伽十八惡攲却伽十九耶婆麼那却伽二十尤嘍跛却伽二十一耶婆毘娘那却伽二十二斫芻陀妬却伽二十三耶婆麼娜毘娘那陀妬却伽二十四必利洟陛蒱比反陀妬却伽二十五耶婆毘娘娜陀妬却伽二十六靼埵都和反履悉蜜駐跛薩他娜却伽二十七耶婆阿虱吒達奢阿鞞尼迦佛陀達摩却伽二十八獨佉却伽二十九耶婆磨勒伽却伽三十毘婆哪毘𭒂三十一阿那娜娜三十二阿陛蒱比反娜娜三十三三姥陀娜娜三十四薩婆迦囉娜娜囉三十五薩婆僧薩他娜毘瞿跛娜娜三十六阿緊吉因反若女我反柘娜娜三十七叉初詐反婆叉初詐反𭒂三十八伊犁伊儸三十九伊犁伊羅四十寐利莎波訶四十一善男子是名順空陀羅尼汝可持往娑婆世界教化眾生問訊釋迦牟尼佛爾時香象菩薩作如是言我已受持此陀羅尼得大勢力得大利益今欲往彼唯有一事心生怖畏何以故我親從佛聞彼土眾生多諸惡貪乃至女人諂詐弊惡令久修禪得五神通智慧之人於一念頃退失神通及諸功德墮大地獄故我今生怖爾時山帝釋王佛告香象菩薩言善男子譬如雪山以十三因緣令虛空中有清涼風以冷風故熱惱皆除一切河水悉皆清涼善男子如是久學無生忍智慧菩薩以十三因緣防護身心不生煩惱六根無熱不為無明河之所漂流智慧之人能為愚人說無眾生等法令離癡縛除五陰重擔善男子汝以十三種因緣久學無生忍何故而言我今怖畏汝於餘界或作梵天身教化眾生復於餘剎或作摩醯首羅身教化眾生復於餘剎或作帝釋身教化眾生復於餘剎或作那羅延身教化眾生復於餘剎或作天身教化眾生復於餘剎作夜叉身教化眾生復於餘剎或作龍王身教化眾生復於餘剎或作阿修羅王身教化眾生復於餘剎或作轉輪聖王身教化眾生復於餘剎或作大醫王身教化眾生復於餘剎或作剎利身教化眾生復於餘剎或作婆羅門身教化眾生復於餘剎或現聲聞身教化眾生復於餘剎作大臣身教化眾生復於餘剎作辟支佛身教化眾生如是無量剎中以種種色身現化眾生而作佛事云何方言我今怖畏善男子勿生怖畏今為汝說無盡根大受記持心法行一切智智壞四魔行三寶久住行壞一切毒龍境界行盡一切眾生惡業行大慈教化眾生行大悲淳至入三惡道救拔眾生行於一切眾生作歡喜心行斷一切眾生惡見惡愛惡願惡乘行解脫一切眾生地獄行斷一切女身得丈夫身行說一切法陰無有盡行斷一切眾生慳嫉行得一切三昧神通無盡行攝一切眾生安置菩提道行捨聲聞辟支佛乘行乃至說得無上最勝涅槃行善男子若有眾生聞此無盡根授記法行生信樂者彼人所有無量生死恒沙業障眾生障法障煩惱障能障一切善根未受未盡未吐者如是等業皆悉滅盡不受罪報不生惡處唯除三事何者為三一五無間二謗正法三謗聖人此三種罪必定受報善男子若有眾生乃至一念聞此無盡根受記陀羅尼能至心聽信受憶念生尊重者彼人所有恒沙罪業不受果報常樂修行一切善根若行檀波羅蜜時十方諸佛一切菩薩辟支佛大阿羅漢皆以神力加護是人得聖加故多饒財寶以用布施不可窮盡乃至能捨頭目髓腦遠離嫉妬得平等心於一切田心無優劣亦復不見我能行施彼為受者作是施時一切天龍鬼神阿修羅夜叉乾闥婆等不能為障唯除三種所謂五逆誹謗正法毀呰聖人此三種罪一切聖人神力不加故有障礙若行尸波羅蜜時常勤精進住忍辱中得歡喜心得隨順心憐愍眾生猶如一子亦如己身常為一切聖人之所讚歎常為諸天釋梵四王龍神夜叉人非人等剎利婆羅門毘舍首陀禮拜供養得聖力加心不自高亦不毀他亦復不樂多積衣食趣得支身心無憂惱於一日夜六時自省臥覺安隱無多惱患衣食豐饒於一切眾生慈悲不捨隨心所念皆悉不空臨命終時得見諸佛一切諸佛皆讚歎言善哉善哉大丈夫善能持戒清淨不破善來將汝往詣清淨佛剎令汝得住十地位中彼人見佛得清淨心得歡喜心心歡喜故捨身則得往生淨國速得十地不久即得阿耨多羅三藐三菩提乃至一念聞此無盡根受記陀羅尼得如是利是菩薩若學行羼提波羅蜜時一切聖人神通力加令得法忍不見眾生不見彼不見此若有人來截其手足割其耳鼻乃至不起一念瞋心離瞋心已一切天王一切人王禮拜供養乃至速得阿耨多羅三藐三菩提是菩薩若學行毘梨耶波羅蜜時得無患身成就大力壯健智慧精進勇猛能行四攝布施愛語利益同事教化眾生具四攝已一切天王龍王夜叉王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人王合掌燒香恭敬禮拜是人名聞流布常為一切人天之所愛念樂欲見之常欲擁護乃至速得阿耨多羅三藐三菩提是菩薩若學禪波羅蜜時聖人加故得四禪四空三摩跋提乃至千萬三摩提門陀羅尼門忍門常為一切諸佛所念常為一切天王人王擁護愛念恭敬禮拜乃至速得阿耨多羅三藐三菩提彼菩薩若學般若波羅蜜時常為諸佛菩薩阿羅漢辟支佛之所擁護心得安隱遠離憒閙得勝法念心心數成就得聖人智慧根具足入一切法中所作已辦度疑網河於一切法不生疑礙一切天人阿修羅所不能壞常為天人八部供養恭敬愛念守護聞名見形皆生歡喜樂欲親近若自供養若教人供養此人臨終見十方佛一切諸佛皆悉授手讚言善哉善哉大丈夫善來將汝往向我清淨佛剎令汝得住十地位中是人聞已得歡喜心心歡喜故命終即得生佛淨土生已速得住於十地不久即證阿耨多羅三藐三菩提善男子此無盡根大授記陀羅尼有如是大力如是大利益汝當受行往彼世界不應怖畏善男子釋迦牟尼佛本所誓願若有眾生造作五逆謗方等經毀呰聖人犯波羅夷如是之人清淨佛剎所不容者皆生我國我當教化以是因緣諸惡眾生悉集其國善男子若彼世界諸惡眾生聞此無盡根大授記陀羅尼能於七年常行慈心不動心憐愍心平等心遠離兩舌不惡口不妄語不綺語如是晝夜常念諸佛當淨洗浴晝三夜三整衣服右膝著地合十指掌對十方佛前念無盡根大授記陀羅尼一心誦者彼人經七年已所有諸難極重罪業皆滅無餘若有女人欲求自在能於七月晝三夜三如前念此無盡根大受記陀羅尼一心誦者如是女人隨所生處得大自在於流轉中更不復受女人之身乃至得阿耨多羅三藐三菩提唯除自願若有女人求好夫主求好種姓求大自在求不用男女或願多有男女者應當澡浴清淨著淨潔衣獨處閑靜晝三夜三右膝著地合掌向佛一心誦念此無盡根大授記陀羅尼者隨心願樂皆得稱意所求男女多少皆得端正聰明無有疑難善男子此無盡根大授記陀羅尼如是大力如是大利益汝從生死已來未曾得聞爾時世尊即說呪曰哆姪他一捨囉娜毘夜也二式叉毘夜也三徙寐履帝毘夜也四鉢囉河娜奴下反毘夜也五矣履地毘夜也六因地利夜毘夜也七𭒂毘夜也八蒱滕伽毘夜也九三摩地毘夜也十陀羅尼毘夜也十一羼帝都利反毘夜也十二毘梨耶毘夜也十三闍娜毘夜也十四鉢邏若女我反阿霤驢㖃反必也毘夜也十五阿紉奴隣反社毘夜也十六摩伽毘摩也十七遏鼻娘毘夜也十八鉢囉帝都利反三陛蒲履反爹毘夜也十九步寐莫履反毘夜也二十坒父一反絰㖿余歌反毘夜也二十一摩訶梅怛利毘夜也二十二摩訶迦霤驢㖃反那毘夜也二十三摩訶牟帝多毘夜也二十四摩呼卑叉毘夜也二十五必利洟鼻毘夜也二十六薩埵毘夜也二十七達摩毘夜也二十八答摸毘夜也二十九阿盧迦毘夜也三十鉢囉帝都利反婆娜毘夜也三十一鉢囉帝都利反輸盧得迦毘夜也三十二伽伽那毘夜也三十三摩霤䫂毘夜也三十四鉢囉帝都利反多三姥波爹毘夜也三十五輸娜奴下反多毘夜也三十六阿尼蜜多毘夜也三十七揜烏合反鉢囉尼系毘夜也三十八侯嘍䫂毘夜也三十九瞿沙毘夜也四十緊吉因反柘那毘夜也四十一阿鼻三摩夜毘夜也四十二阿怒娜四十三阿怒娜四十四揜𭒂呵者者四十五者遮囉四十六者遮囉毘姥四十七柘陛蒱履反斫芻者遮囉毘姥四十八毘夜也毘姥四十九察夜毘姥五十阿麼毘夜也毘姥五十一阿三姥陀遮囉毘姥五十二摀眵陀毘姥五十三阿迦舍毘姥五十四驃鉢舍麼毘姥五十五阿那婆娑毘姥五十六呵呵呵毘姥五十七阿囉波囉毘姥五十八優波舍麼毘姥五十九薩利羅毘姥六十莎波呵六十一善男子此無盡根大授記陀羅尼有大威德有大勢力能大利益一切眾生攝護眾生憐愍眾生洗除眾生令得寂滅善男子持此陀羅尼往詣娑婆世界如我所言問訊釋迦牟尼佛爾時山帝釋王佛說此陀羅尼已一切大眾皆大歡喜讚言不可思議大不可思議得見離障第一智慧說此大授記陀羅尼一切眾生所有小罪中罪大罪最大罪輕重業障牢固難捨能與善根作障礙者此陀羅尼速能除盡得無漏道爾時香象菩薩生大歡喜而說偈言此無盡根陀羅尼最勝第一無過者能盡眾生諸惡業亦斷一切罪駃河生死流轉自所作悉能遠離無有餘以福德力因緣故於一切苦得解脫能竭生死三有海速生清淨有佛國於流轉中大怖畏現見無量大障礙悉能傾動諸煩惱疾證無上勝菩提一切眾生不能壞若有聞此陀羅尼速能受持常憶念具足如是諸功德爾時香象菩薩白山帝釋王佛言我已持此無盡根授記陀羅尼竟今欲往彼娑婆世界是時眾中有無量阿僧祇菩薩摩訶薩從無垢三昧起異口同音白佛言世尊我等今者渴仰欲見釋迦牟尼佛及大集眾禮拜供養我從昔來未曾得聞日藏法門惟願聽我往彼世界爾時世尊告諸菩薩言善男子隨汝意去咸可一心作帝釋像身色形貌長短威儀勢力自在往彼世界爾時香象菩薩及無量阿僧祇菩薩咸共一心悉皆化作帝釋王身形貌色像長短威儀勢力自在皆無有異作此化已三禮山帝釋王佛右遶三匝遶已從彼界沒如一念頃即到娑婆世界入此剎已放諸香雲雨種種末香所謂牛頭栴檀香龍身牢固香多摩羅葉香沈水香多伽羅香隨六時變異香為供養釋迦牟尼佛故放香雲已次第漸向釋迦牟尼佛所到佛所已以帝釋身頂禮佛足右遶三匝却一面立當爾之時釋迦如來猶共頻婆娑羅王宣說法行
