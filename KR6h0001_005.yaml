body:
  text: 高齊天竺三藏那連提耶舍譯諸惡鬼神得敬信品第八上爾時護世四大天王見於無量阿僧祇衆天龍夜叉乃至迦吒富單那等種種色種種形種種欲種種行種種性彼等衆生性無慈愍於諸衆生常起瞋恚惱害之心不觀後世可怖畏事無所繫屬無所護持是等恆常觸惱剎利乃至畜生奪其精氣食其血肉是四天王見諸鬼神俱來集已歡喜踊躍各自問其所領大將毗沙門天王問於散脂夜叉大將言此四天下一切所有夜叉羅剎若卵生胎生濕生化生或依城邑聚落舍宅塔寺園林山谷河井泉池陂濼冢間樹下曠野田中間林空舍及大海內衆妙寶洲彼諸鬼神若在地行水行空行一切無餘今悉來集世尊所不散脂大將言大王如王所言此四天下所有夜叉乃至大海寶洲若地行水行空行一切無餘今悉來集在世尊所提頭賴吒天王問於樂欲乾闥婆大將言此四天下一切所有乾闥婆衆餘如上説毗樓勒叉天王問於檀帝鳩槃茶大將言此四天下一切所有鳩槃茶衆餘如上説毗樓博叉天王問於善現龍王言此四天下所有龍衆摩睺羅伽迦樓羅諸餓鬼等若卵生胎生濕生化生或依城邑聚落舍宅乃至海內衆妙寶洲若在地上水中空中所遊行者一切無餘今悉來集世尊所不善現龍王言大王如王所言此四天下所有諸龍乃至餓鬼一切無餘今悉來集在世尊所爾時四大天王釋提桓因大梵天王正辨梵天合掌向佛而作是言大德世尊此四天下所有天龍乾闥婆緊那羅夜叉羅剎鳩槃荼毗舍遮摩睺羅伽迦樓羅諸餓鬼等若卵生胎生濕生化生所有地行水行空行一切無餘今悉來集在世尊所我等大衆皆同勸請唯願如來哀愍我等慈悲一切諸衆生故令惡衆生得敬信故令正法眼得久住故紹三寶種不斷絶故彼地精氣衆生精氣正法勝味甘露精氣令得久住利益增長故又令善道及涅槃道常不滅壞利益增長故大德世尊此閻浮提一切城邑聚落舍宅乃至寶洲一切無餘天龍夜叉乃至迦吒富單那等今悉來集天王龍王乃至毗舍遮王悉將眷屬亦皆來集唯願世尊付囑此王同行其法憶念攝受令彼天龍夜叉羅剎乃至迦吒富單那等各有所屬隨於己分養育護持恆常不捨莫令惱他見惱他者令其遮護常不捨離使得安隱若彼各各於其己分勸發勇力平等護持彼等則得喜樂名聞多受福報爾時世尊受其勸請慈悲憐愍彼一切故遍觀大衆觀大衆已舉其右臂而作是言汝等賢首一切大衆各各諦聽我當解説佛出世難如優曇華離八難難如順時香樹聞正法難如雨閻浮檀金遇戒定僧得供養難如入大海詣妙寶洲信敬三寶難如求如意珠布施三寶難如求功德天賢瓶受持戒難如牛頭栴檀國難可得到於衆生所起慈悲難如值勇健怨賊執金剛杵難得脫免謹慎知足難如善作馬祀梵語阿濕婆迷陀耶若此云馬寶柱祀為此祀者唯閻浮王之所能也諸仁者有十種平等若諸衆生具十平等於生死中恆受勝報速能得入無畏大城何等為十一者衆生平等二者法平等三者清淨平等四者布施平等五者戒平等六者忍平等七者精進平等八者禪平等九者智平等十者一切法清淨平等諸仁者於彼何者是衆生平等若有衆生為求身命受樂離苦應作是見若受者作業若身口意若善不善自作教他彼受現報及後世報是故汝等若欲離苦求二世樂應當造作身口意善莫起諸惡若求二世自益益他自樂樂他自好好他勿作諸惡此是衆生平等諸仁者於彼何者是法平等若有衆生求樂離苦欣生畏死恩愛不離怨憎不會如此之人心海所溺何以故若有衆生計著我者生死流轉不見清淨解脫道故是故於法平等思惟觀察衆生不離法法不離衆生若衆生體性即是我體性若我體性即是一切法體性若一切法體性即是佛法體性若如是觀諸法平等是人得無所有不見衆生亦無衆生去來合散亦不見有衆生可得非法非非法是人如是得住無相此是法平等諸仁者於彼何者是清淨平等謂得人身具滿十德何等為十一者離下賤家二者不鈍三者不啞四者諸根不缺五者得男子身六者顏容端正得好眷屬七者不貧八者不為他欺九者發言有中十者多人樂見何以故言得於人身清淨平等如得人身得三律儀離三惡道能求三乘以此則得三種菩提不以餘法云何清淨平等能到菩提是人令心不依諸法令心不依內外境界不依如如見一切法無和合相不取內心不取外心於二境界極得寂定如是清淨正見理時不見有我內有衆生外有命者壽者生者人者衆數養育作者使作者起者使起者受者使受者知者見者此十六名皆出妄想是人如是於諸衆生得見無我清淨平等以是義故離欲清淨不起邊見如是得入衆生清淨平等及諸法空無行智印無相無願如是得入衆生清淨平等復以彼法成熟衆生而不自壞亦不壞財若知衆生體性平等則知一切法體性平等若一切法體性平等即是佛法體性平等是故一切諸法名為佛法此是清淨平等諸仁者於彼何者是布施清淨平等謂四種心清淨布施以布施故衆生於流轉時恆受勝報速能得入無畏大城何等為四一者於一切衆生起憐愍心二者平等心三者大慈心四者大悲心憐愍心清淨平等者若有衆生求樂離苦恩愛不離怨憎不會長壽利益名譽流轉富貴五欲悉稱心者應如是學如我喜樂愛欲自己身命以一切方便無上護持無有價量如是於一切衆生一一衆生乃至蟲蟻亦皆喜樂愛欲自己身命一切方便無上護持無有價量我若惱害衆生若復奪他活命之具及斷命根我於億百千世生死流轉還被惱害失活命具及斷命根受無量苦我從今日於諸衆生起父母想及男女想乃至蟲蟻亦作父母及男女想是故更不惱害衆生亦不奪彼活命之具及斷命根亦不教他奪人精氣及斷命根如是我當億那由他百千萬劫生死流轉無能惱害亦不被奪活命之具及斷命根何以故一切衆生無一衆生非我父母兄弟男女如是我於一切衆生無一衆生非是父母兄弟男女以是義故我曾與彼一切衆生無非是親一切衆生亦曾與我無非是親若於父母乃至男女作惱害者是義不然諸仁者於彼何者是不觸惱若諸衆生求樂離苦應如是學我若於剎利觸惱其心令彼剎利於己境界國土人民本所欲者不生喜樂及婆羅門乃至畜生觸惱其心本所欲者不生喜樂以是因緣遞相征伐鬪亂諍訟䏣佞妄語互相支解及斷命根以是因緣我從今日於諸衆生休息惱害及斷命根以此清淨平等布施業因緣故我當久遠生死流轉無能觸惱共我鬪亂諍訟及斷命根以是義故名不觸惱諸仁者於彼何者是不害命若諸衆生求命不害應如是學一切衆生無非我親我若暴雨或非時雨若雨灰塵令多暗𪾼或久亢旱枯涸流泉令諸華果藥草五穀衆味損減以是因緣令我親知飢饉困苦動其四大發種種病乃至命終若加此害是義不然以是義故我於衆生遠離害命以不令彼地味精氣有損減故使我親知無飢饉苦不動四大種種病生及不橫死以是清淨平等布施乃至久遠生死流轉不受飢饉病死等苦以是義故名不害命諸仁者於彼何者非是奪他活命之具若諸衆生求身命者應如是學一切衆生無非我親我若奪其花果藥草五穀精氣活命之具彼諸衆生若以食彼無好精氣花果藥草五穀味故其身損瘦無有勢力失念惡性輕躁麁獷萎黃少色生種種病若加此苦是義不然是故我應受彼先聖諸天教敕於彼衆味唯應得取第六十四一分精氣以活身命六十三分地味精氣留活衆生令受安樂我以知足業因緣故乃至久遠生死流轉不復更噉無好滋味無精氣食以其食故具威德力能強記念心性柔軟顏容端正無諸病苦是名不奪活命之具諸仁者於彼何者是命不別離若求命者應如是學一切衆生無非我親若惡心眼視及以氣噓令其失心於身支節奪其精氣使我親知身心受苦是義不然以是因緣我當久遠生死流轉無有非人氣噓眼視散亂其心奪其精氣以是故名命不別離諸仁者於彼何者是不壞命若諸衆生愛己身命求樂離苦名聞富貴乃至解脫應如是學一切衆生無非我親我若為飲食故奪親精氣若節節支解若山頂樹上高閣深河推令墮落及與毒藥若遣起尸惡鬼相害若作厭蠱若斷飲食若以刀劍斬其身首隨其方便斷彼命根若加此苦是義不然以是因緣我於久遠生死流轉不被衆生奪其精氣無能支解及斷命根以是義故名不壞命此是布施清淨平等復次布施清淨平等者憐愍一切諸衆生故為之積集功德智慧除諸幻見精進堅固求一切善如説能行不為活命而起惡心於諸衆生不起害意所持禁戒與衆生同見衆生樂深生歡喜於己樂緣自能知足所愛之事皆悉能捨於諸勝法無吝惜心常怖三界忍力自在信無常相如説修行於己失機能自觀察見他失機則生悲愍修善無厭有罪勤懺無邊回向樂求正理常於衆生作福田想勤為衆生令息惡道於一切法心無所住此是世諦布施清淨平等我今當説第一義諦布施清淨平等爾時世尊而説呪曰多地也他夜咩夜咩鉢囉佉夜咩憂鉢囉佉夜咩夜寐耶夜咩佉夜夜咩蘇婆訶説此法門時八百六十萬緊那羅乾闥婆等遠塵離垢得法眼淨爾時世尊復説呪曰多地也他瞿竭𠼝瞿竭𠼝夜婆瞿竭𠼝憂婆夜婆瞿竭𠼝蘇婆訶爾時世尊復説呪曰多地也他陀陀羅陀羅陀憂跛陀羅陀羅蘇婆訶説此法門時九百四十萬夜叉遠塵離垢得法眼淨爾時世尊復説呪曰多地也他阿闍泥叉叉阿闍泥伽叉叉阿闍泥毛羅阿闍泥叉差蘇婆訶説此法門時七千萬龍於遠塵離垢法得勝三昧爾時世尊復説呪曰多地也他訶訶訶訶訶訶系打婆訶訶訶若若若訶訶訶蘇婆訶説此法門時三十那由他百千阿修羅得不忘菩提心三昧爾時世尊復説呪曰多地也他阿奴那阿奴那阿婆那奴那阿婆夜𠼝阿婆那奴那蘇婆訶説此法門時八萬四千頻婆羅鳩槃荼得喜樂三昧爾時世尊復説呪曰多地也他陀伽陀闍阿婆陀伽陀闍阿婆陀伽陀闍闍犍陀犍陀闍蘇婆訶説此法門時七那由他百千餓鬼毗舍遮富單那迦吒富單那得電王三昧過諸數量天龍夜叉乃至迦吒富單那等昔未曾發無上真實菩提心者皆悉發心此是第一義諦布施清淨平等諸仁者於彼何者是戒清淨平等若一切世間及出世間所有善道及涅槃樂戒為根本以是因緣得住聲聞辟支佛地及阿耨多羅三藐三菩提果所謂十善業道遠離殺生偷盜邪淫妄語兩舌惡口綺語貪瞋邪見諸仁者於彼遠離殺生因緣獲十種功德何等為十一者於一切衆生得大無畏二者於諸衆生得大慈心三者得斷習氣四者無諸病惱五者得壽命長六者非人護持七者寤寐安隱無諸惡夢八者無有怨家九者不畏惡道十者得生善道以是遠離殺生善根回向阿耨多羅三藐三菩提是人不久證無上智得菩提已於彼佛土離諸害殺長壽衆生來生其國諸仁者於彼遠離偷盜因緣獲十種功德何等為十一者具大財報二者不共他有三者不共五家四者衆人愛敬常不厭捨五者遠遊十方無有疑慮六者行處無畏七者常樂布施八者不求財寶自然速得九者得財即施十者得生善道以是遠離偷盜善根回向阿耨多羅三藐三菩提得菩提已彼佛國土具足種種花果樹林衣服瓔珞莊嚴之具珍奇寶物無不充滿諸仁者於彼遠離邪淫因緣獲十種功德何等為十一者得攝諸根律儀二者得住離欲清淨三者不惱於他四者衆人稱譽五者衆人樂觀六者能發精進七者見生死過八者常樂捨施九者常樂求法十者得生善道以是遠離邪淫善根回向阿耨多羅三藐三菩提得菩提已彼佛國土無有腥臭亦無女人不行淫欲皆悉化生諸仁者於彼遠離妄語因緣獲十種功德何等為十一者衆人信語二者於一切處乃至諸天發言得中三者口出香氣如優鉢羅花四者於人天衆獨作證明五者衆人愛敬離諸疑惑六者常出實語七者心意清淨八者常無諂語言不失機九者常多歡喜十者得生善道以是遠離妄語善根回向阿耨多羅三藐三菩提得菩提已彼佛國土無有腥臭種種妙香芬馨遍滿諸仁者於彼遠離兩舌因緣獲十種功德何等為十一者得身不壞二者得眷屬不壞三者得交友不壞四者得信不壞五者得法不壞六者得律儀不壞七者得奢摩他不壞八者得三昧不壞九者得忍不壞十者得生善道以是遠離兩舌善根回向阿耨多羅三藐三菩提得菩提已彼佛國土衆生眷屬不為諸魔他人所壞諸仁者於彼遠離惡口因緣獲十種功德何等為十一者言音柔軟二者語辭流利三者言音潤澤四者得和合語五者言必得中六者得質直語七者得無畏語八者得不諂語九者得如法語十者得生善道以是遠離惡口善根回向阿耨多羅三藐三菩提得菩提已彼佛國土法音充滿遠離一切鄙惡言辭諸仁者於彼遠離綺語因緣獲十種功德何等為十一者天人愛敬二者天人隨喜讚歎三者常樂實語四者常與明人共住不離五者聞言悉領六者得智慧人愛敬尊重七者常得愛樂阿蘭若處八者愛樂賢聖默然九者遠離惡人親近賢聖十者得生善道以是遠離綺語善根回向阿耨多羅三藐三菩提得菩提已於彼佛土顏容端正強記不忘樂遠離者來生其國諸仁者於彼遠離貪欲因緣獲十種功德何等為十一者身根不缺二者口業清淨三者心不散亂四者得勝果報五者得大富貴六者衆人樂觀七者得不壞眷屬及不壞財八者常與明人相會九者不離法聲十者得生善道以是遠離貪欲善根回向阿耨多羅三藐三菩提得菩提已彼佛國土離彼魔怨及諸外道諸仁者於彼遠離瞋恚因緣獲十種功德何等為十一者得離瞋恚二者不樂積財三者隨順賢聖四者常與賢聖相會五者得利益事六者面部端嚴七者見衆生樂則生歡喜八者常得三昧九者三業調柔十者得生善道以是遠離瞋恚善根回向阿耨多羅三藐三菩提得菩提已彼佛國土所有衆生悉得三昧心極清淨諸仁者於彼遠離邪見因緣獲十種功德何等為十一者心性柔善伴侶賢良二者信有業報乃至奪命不起諸惡三者歸敬三寶不信天神四者得於正見不擇歲次日月吉凶五者常生人天離諸惡道六者得賢善心明人讚譽七者棄於世俗常求聖道八者離斷常見信因緣法九者常與正信正行正發心人共相會遇十者得生善道以是遠離邪見善根回向阿耨多羅三藐三菩提是人速滿六波羅蜜於善淨佛土而成正覺得菩提已於彼佛土功德智慧一切善根莊嚴衆生來生其國不信天神離惡道畏於彼命終還生善道諸仁者於彼布施清淨平等行時於戒遠離殺生平等行以是因緣具大果報離諸怖畏諸仁者於彼布施清淨平等行時於戒遠離偷盜平等行以是因緣具大果報不共他有修一切善無有留難諸仁者於彼布施清淨平等行時於戒遠離邪淫平等行以是因緣具大果報修習善根無有留難無邪淫念觀自他婦諸仁者於彼布施清淨平等行時於戒遠離妄語平等行以是因緣具大果報若被毀謗人不信受如説修行發意所為莫不堅固於天人衆獨作證明口出香氣如優鉢羅花諸仁者於彼布施清淨平等行時於戒遠離兩舌平等行以是因緣具大果報得不壞眷屬丈夫眷屬敬信眷屬諸仁者於彼布施清淨平等行時於戒遠離惡口平等行以是因緣具大果報離麁獷語得微妙音具足清淨離弊惡聲諸仁者於彼布施清淨平等行時於戒遠離綺語平等行以是因緣具大果報發言得中斷大衆疑衆人樂見諸仁者於彼布施清淨平等行時於戒遠離貪欲平等行以是因緣具大果報正受其報還能捨施具受勝報備大威力諸仁者於彼布施清淨平等行時於戒遠離瞋恚平等行以是因緣具大果報端正豐美衆人愛敬一切無礙諸根不缺諸仁者於彼布施清淨平等行時於戒遠離邪見平等行以是因緣具大果報正見國土正見家生常值諸佛及諸菩薩聲聞緣覺見佛聞法供養衆僧修菩薩行常不捨離清淨平等諸仁者此是戒行清淨平等以是戒行自莊嚴者是人不久具足相好成佛功德音聲清淨降伏魔怨禪念慧行清淨大智大慈大悲乃至能成一切佛法清淨平等此是世間起發戒行清淨平等諸仁者於彼何者是出世間起發戒行清淨平等若戒清淨及三摩提起信解行者不依色事而持禁戒不依受想行識事而持禁戒不依眼事而持禁戒不依色眼識眼觸眼觸因緣生受愛取有生事而持禁戒乃至不依意事而持禁戒不依法意識意觸意觸因緣生受愛取有生事而持禁戒不依地界水火風界事而持禁戒不依無邊虛空處無邊識處無所有處非想非非想處事而持禁戒不依欲界色無色界事而持禁戒不依現在及未來事而持禁戒不依聲聞及辟支佛無上大乘一切智事而持禁戒不依聞事禪事智事而持禁戒不依聞力三昧力陀羅尼力忍辱力事而持禁戒不依有漏無漏力有為無為事善不善力明暗力事而持禁戒此是出世間起發戒行清淨平等梵路聖道入無畏城彼諸賢聖所依戒行清淨平等第一義諦入清淨智諸仁者所言戒者是何句義譬如金剛鐵圍山間熱惱之風以山障故不令得去至四天下如是聖戒清淨平等修四念處力能障彼愛熱之風不令得起以是義故名之為戒譬如鐵圍山間臭穢之風以山障故不令得去至四天下如是聖戒清淨平等修四無畏力能障彼邪臭之氣不令得起以是義故名之為戒譬如鐵圍山間甚大黑暗以山障故不令得曀此四天下如是聖戒清淨平等修七覺分力能障彼無明有為有漏之相不令得起以是義故名之為戒諸仁者離欲義是戒義解脫義是戒義休息義是戒義盡義是戒義滅義是戒義此諸句義名為戒義諸仁者此是有為無為戒行清淨平等若有沙門及婆羅門修此有為及無為戒平等住者彼人應受世間供養若世間人於彼沙門及婆羅門敬信尊重護持養育衣服飲食床褥臥具病患因緣施其湯藥活命之具彼人流轉於生死中恆受勝報速能得入無畏大城諸仁者於彼何者是忍清淨平等忍有二種一者捨忍二者息怒忍捨忍清淨平等者若欲得一切樂捨一切苦是名捨忍清淨平等若有衆生求樂離苦觀彼三界一切苦道及煩惱火之所逼熱唯除聖人是人為已生大怖畏作是見時三界衆生皆為煩惱熾然逼熱一一衆生種種苦害驅馳流轉不能自救如是我共一切衆生為苦所惱以何方便而能自救即作是念不以餘事唯應修忍脫一切苦具一切樂便能喜樂修平等忍能捨種種資身之具所謂飲食騎乘衣服臥具屋宅床榻隨其所須皆悉給與以忍布施為滅諸苦是人數數修忍住時能行捨施於正發心人正修行人應到其所而修供養數供養故從彼人聞生死過患涅槃功德是人如是若聲聞乘及緣覺乘無上大乘發心求證為彼樂故重復樂忍養育衆生此是捨忍清淨平等乃至若捨身外資財能自忍苦令他得樂亦名捨忍清淨平等若彼種種形色種種威儀種種音聲種種瞋怒罵辱欺凌麁獷非實不喜之言乞士來求諸如是等是人心未柔軟瞋恚未淨不得住忍是人生念誰能勝我是故被辱未能行忍復作是念彼食血肉夜叉羅剎鳩槃茶餓鬼毗舍遮富單那迦吒富單那等何故未聞生死大苦涅槃至樂不觀後世可怖畏事衆苦所惱未能解脫應知彼等離善知識及不聞法是故生死為苦所溺我已近善知識數數得聞生死苦惱涅槃安樂觀後世畏常勤修習斷一切苦當得度彼生死沈淪何故起瞋而不行忍是故我應作是分別罵辱音聲及諸違事皆悉如風我當棄捨不應起瞋如是應捨諸衆生想作是念時罵辱音聲及諸違事悉如風過離衆生想修行忍辱清淨平等是人若數於彼衆生捨種種想罵辱聲音及諸違事離分別想修行忍辱清淨平等是人住忍心喜得淨如是則能修無礙智謂法無礙及義無礙如是則能悉捨內財所謂皮肉筋骨眼耳鼻舌手足及頭所愛之命如是菩薩摩訶薩修無分別非無分別忍清淨平等是名捨忍清淨平等諸仁者於彼何者是息怒忍清淨平等若菩薩摩訶薩能於一切言語音聲文字捨分別想及於一切色身形想舉動威儀去來戲笑捨分別想亦捨愛取不求果報離於苦樂無分別想乃至於己身命無分別想得住第一義忍清淨平等譬如虛空遇暗不瞋得明不喜不作如是分別之心如是菩薩摩訶薩住第一義忍清淨平等於彼一切有為諸法語言形色及苦樂受離於分別不作分別不瞋不喜於諸衆生離分別想得住第一義忍清淨平等譬如虛空不動不止遍動不震不止遍震如是菩薩摩訶薩於一切業有為諸行身心不動不止遍動亦復不震不止遍震譬如虛空清淨離垢如是菩薩摩訶薩住第一義忍清淨平等於彼一切有為身心善得清淨譬如虛空長養衆生如是菩薩摩訶薩住第一義忍清淨平等養育衆生譬如虛空非劫盡火所能燒壞非劫盡水及劫盡風所能毀壞如是菩薩摩訶薩住第一義忍清淨平等乃至未到無上菩提不為貪欲瞋恚愚癡三毒熾火燒壞其心譬如清淨虛空十五日夜極圓滿月普放冷光熱惱衆生身心涼樂如是菩薩摩訶薩住第一義忍清淨平等皆息己身威儀憂惱亦息衆生諸煩惱熱譬如清淨虛空十五日夜極圓滿月衆星圍繞照四天下如是菩薩摩訶薩住第一義忍清淨平等隨所住處為諸天龍乃至迦吒富單那等之所圍繞暉顯照曜譬如清淨虛空十五日夜極圓滿月照海島上月愛摩尼從彼珠中流出大水能滿大海如是菩薩摩訶薩住第一義忍清淨平等以第一義忍清淨平等放勝光明照曜一切諸天及龍夜叉羅剎乃至迦吒富單那等令彼悉得善心清淨於諸衆生起大慈悲心深利益心休息苦惱心令住一切樂心觀後世畏心離一切惡心於一切善起勤進心彼諸鬼神以得如是諸勝善心次第漸離一切不善一切善水悉皆充足故能流滿涅槃大海諸仁者應當觀此菩薩善根雖未能至究竟處所以住第一義忍清淨平等故已得超過一切聲聞及辟支佛能以善法成熟衆生如我昔作忍辱仙人常在林中食諸甘果時有國王名曰迦利支解我身而為八段我於彼時以能善修第一義忍故從所割處流出白乳以是忍辱苦行因緣成熟無量億那由他百千天龍夜叉羅剎乾闥婆阿修羅緊那羅摩睺羅伽迦樓羅餓鬼毗舍遮富單那迦吒富單那等彼時無量億那由他百千天龍乃至人非人等悉發阿耨多羅三藐三菩提心諸仁者我昔人身生非難處作此苦行不足為難如我往昔生於難處受彼兔身為使仙人得肉食故即自踊身投大火聚以能善修第一義忍清淨平等令大火聚變作蓮池時彼兔身臥花臺上以苦行因緣令此三千大千世界六種震動彼時帝釋護世四王天龍夜叉乃至迦吒富單那等及諸仙人人非人等種種供養而語我言汝若得成阿耨多羅三藐三菩提當於彼時我等必於阿耨多羅三藐三菩提而得授記諸仁者我昔兔身以能善修第一義忍清淨平等故已得不共聲聞緣覺所有供養是故彼時梵釋天王護世四王天龍夜叉乃至人非人等悉以種種勝上香花塗香末香音樂衆寶幢幡等事讚歎尊重希有供養今阿羅漢之所無也諸仁者菩薩如是善能修住第一義忍清淨平等此四句義今當解釋第一義者能到彼岸以是義故名第一義忍者見三界陰為究竟空及見界入為究竟空以是義故名之為忍清淨者謂以聖慧除淨三界諸煩惱道業道苦道以是義故名為清淨平等者謂以聖慧於三界行一切法理真如實際得如實知無煩惱道業道苦道以是義故名為平等此是菩薩摩訶薩第一義忍清淨平等諸仁者於彼何者是精進清淨平等以此精進能與布施清淨平等作因乃至能與般若波羅蜜清淨平等作因以是則能捨一切見以此精進能與四念處清淨平等作因超過一切聲聞緣覺以此精進能與四正勤四如意足作因以是則能捨諸煩惱以此精進能與四攝事四無礙辨四梵住四無色定五根五力七覺支八聖道分九次第定斷十二有支得如來十力十八不共法大慈大悲般若波羅蜜清淨平等而作因緣以此精進能與成熟衆生清淨平等作因以此精進為得無量佛勝法故集諸善根以此精進能習無量巧方便智無量願智轉轉殊勝修習無量大功德聚以此精進隨願受生教化利益以精進故居兜率天宮觀其時節捨彼宮殿正知了了而入母胎以精進故於藍毗尼林從母右脅安隱而出以精進故行七步已震動大地及諸山海以精進故受彼難陀及婆難陀龍王兄弟淋水洗浴以精進故童子遊戲示現一切工巧奇能以精進故處在宮中五欲不染以精進故夜半踰城向間林下以精進故詣優陀迦迦羅荼迦羅摩諸仙人所而修供養以精進故六年修彼難行苦行以精進故得阿耨多羅三藐三菩提以精進故轉大法輪無量人天得證聖道是名精進清淨平等諸仁者我以是精進今於佉羅帝山牟尼諸仙所依住處作此大集十方所有菩薩摩訶薩有如佛土微塵數衆悉令集此有如佛土微塵等數諸天及龍夜叉羅剎乾闥婆阿修羅摩睺羅伽迦樓羅緊那羅鳩槃茶餓鬼毗舍遮富單那迦吒富單那等悉來大集為聞法故是名精進清淨平等諸仁者以四大海水分為滴數如彼滴數具修精進清淨平等能令菩薩摩訶薩等滿足毗離耶波羅蜜是名精進清淨平等
