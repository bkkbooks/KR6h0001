body:
  text: 高齊天竺三藏那連提耶舍譯月藏分第十二呪輪護持品第十五爾時世尊復告四天王言我今與汝大力雄猛不可害輪大明呪句如是呪句過去億百千萬諸佛之所演説汝若持此大力雄猛不可害輪大明呪句一切諸魔及魔眷屬尚不敢近何能觸嬈爾時世尊作是語已即説呪曰哆絰夜他一阿婆夜陀提二毗嘍陀毗羯囉咩三阿那毗𠼝四阿那羅移五阿毗勤泥六阿拘毗移七阿呪帝八輸婆提市九提闍婆底十摩訶提帝十一憂簸舍咩十二迷哆囉伽帝十三阿婆嘍𠯋十四迷達涕十五頞他悉地十六舒婆謨遮十七婆蒱娑婆帝十八娑摩竭囉舒祇十九阿䨲哆𠼝二十達摩毗訶𠼝二十一哆他多娑摩底二十二佛陀地虱他泥二十三尸囉毗首地二十四阿䨲竭囉咩二十五阿僧訶唎移二十六復多具致二十七阿毗市聶帝二十八蘇婆呵二十九諸仁者此是汝等四大天王大力雄猛不可害輪大明呪句如是呪句過去億百千萬諸佛之所演説汝若持此大力雄猛不可害輪大明呪句一切諸魔及魔眷屬尚不敢近何能觸嬈爾時所有一切諸魔及魔眷屬皆悉驚怖無有勢力各各羞慚向佛合掌爾時世尊復告毗沙門天王言我今與汝北方大力雄猛不可害輪大明呪句汝以持此大力雄猛不可害輪大明呪故於己眷屬及他眷屬天龍夜叉羅剎阿修羅乾闥婆鳩槃茶餓鬼毗舍遮富單那迦吒富單那尚不敢近何能觸嬈汝於一切惡鬼神所當得大力雄猛不可害輪爾時世尊作是語已即説呪曰哆絰夜他一勿檀泥二鉢羅勿檀泥三勿達那跋帝四渠唎乾陀利五朱唎六旃茶唎七頞唎毗闍耶末提八驅驅勿檀泥九跋羅十吠羅十一勿檀泥十二蘇婆呵十三汝以此呪北方當得大力雄猛不可害輪於己眷屬及他眷屬尚不敢近何能觸嬈爾時世尊復告提頭賴吒天王言我今與汝東方大力雄猛大明呪句乃至當得不可害輪爾時世尊作是語已即説呪曰哆絰夜他一丘嘍闍帝二勿嘍闍帝三鉢羅帝虱蠆四摩訶薩五崎囉跋帝六鬱那婆帝七伽樓婆帝八求嘍鞞九勿嘍鞞十求嘍勿嘍鞞十一求嘍求嘍十二勿嘍乾提十三勿嘍闍帝十四阿羅娑婆帝十五摩羅娑婆帝十六黟泥迷泥十七多豆婆南十八多豆婆南十九蘇婆呵二十汝以此呪東方當得大力雄猛不可害輪於己眷屬及他眷屬尚不敢近何能觸嬈爾時世尊復告毗樓勒叉天王言我今與汝南方大力雄猛大明呪句乃至當得不可害輪爾時世尊作是語已即説呪曰哆絰夜他一耆唎耆唎二耆盧那跋帝三𠯋泥四呵膩泥五阿泥那跋帝六群籌群籌七蘇婆呵八汝以此呪南方當得大力雄猛不可害輪於己眷屬及他眷屬尚不敢近何能觸嬈爾時世尊復告毗樓博叉天王言我當與汝西方大力雄猛不可害輪大明呪句汝以持此大力雄猛不可害輪大明呪故於己眷屬及他眷屬諸龍夜叉羅剎阿修羅乾闥婆鳩槃茶餓鬼毗舍遮富單那迦吒富單那等尚不敢近何能觸嬈爾時世尊作是語已即説呪曰哆絰夜他一阿毗婆嘍泥二婆嘍拏跋帝三勿囉竭囉跋帝四婆嘍泥五婆嘍拏耶世六憂受婆羅七鉢囉受娑八膩受婆隸九摩呵受婆隸十受婆邏十一摩身達囉舍十二娑闍鞞十三薩婆哆囉毗唎帝十四訖利多耶世失蠆丑芥反十五蘇婆呵十六汝以此呪西方當得大力雄猛不可害輪於己眷屬及他眷屬尚不敢近何能觸嬈爾時世尊復告四大天王而説偈言諸山有稱譽自在者化作極兩雞羅娑香仙佉羅擔風火及雪山日月所居處北方常護持世尊真妙法般支般遮羅訖尼伽羅度彼等常護持四維佛正法地神大地神黑色大黑色羅睺毗摩質須質波羅陀婆稚睒婆利及牟真鄰陀共護於下方世尊真妙法大集經月藏分第十二忍辱品第十六之一爾時有一阿修羅王名曰火味在彼會中從座而起舉手而指羅睺羅阿修羅王向四百億阿修羅王作如是言此羅睺羅阿修羅王是我等輩尊重師長能以福慧益諸衆生自在勇猛諸阿修羅中最勝第一羅睺羅王及與我等皆為瞿曇之所欺𣣋為令佛法得熾然故付囑餘衆而不見與故令我等受大恥辱次復有一阿修羅王名鎮星毗摩作如是言我等昔來各各於己四天下中與釋提桓因共相齊等今如野干逐師子後我等寧可捨此凡下還於本國城邑宮殿又我寧死何能忍受如是𣣋辱此是大怨令我等輩生大憂苦時羅睺羅阿修羅王作如是言衆生寧可最勝人邊受其罵辱不於凡下而得讚歎何以故令多好人所輕賤故此天人師於三界中最勝自在住於彼岸善知時宜隨其所應故如是也爾時月藏菩薩摩訶薩合掌向佛一心敬禮而作是言導師當觀此羅睺羅阿修羅王具有如是堅慧勝慧安住堅信樂善樂忍持戒清淨深信三寶不久速成無上導師唯願世尊熾然法故應當與此羅睺羅分爾時世尊告四百億阿修羅王而説偈言汝先具諸德各已住淨信如是昔諸佛囑法與汝等我今以此法悉亦付囑汝當以諸方便護持我法眼汝等作是福增滿大智海各於自境界守護我正法住法常樂忍護持定根者汝等若如是咸供三世佛常詣於善趣命智果具足於世流轉時得離諸惡道諸求勝報者當熾我法眼各於己國土遮障惡衆生爾時諸阿修羅悉起合掌咸作是言我等阿修羅各各於己國休息一切惡熾然世尊法習行法施者於惡作護持增長三精氣離惡住善道爾時諸來一切大衆諸天及人乾闥婆等咸皆歎諸阿修羅言善哉善哉爾時世尊亦復歎彼四百億阿修羅王及諸眷屬作如是言善哉善哉妙丈夫輩汝能如是是名供養三世諸佛當勤護持養育我法佛之法眼而得熾然令三寶種久不斷絶是故我今將於汝等及諸眷屬付囑十方一切諸佛現在住世未涅槃者及付賢劫一切菩薩摩訶薩汝等常與彼諸阿修羅生生相值汝當於此賢劫之中得成正覺出於世時當與汝等作上施主護持正法持戒第一得禪三昧具足忍力如此賢劫最後如來名曰盧遮應正遍知出現於世爾時盧遮當授彼等阿耨多羅三藐三菩提記便得速滿六波羅蜜不久當為無上法王得入無畏涅槃大城如是若復有諸衆生若現在世及未來世於我法中出家修道三業相應若復放人出家修道若復有能勤加護持養育供給我諸聲聞比丘比丘尼優婆塞優婆夷令三寶種得不斷絶若有能修檀波羅蜜乃至般若波羅蜜若有營造塔廟形像及以修故種種捨施供養供給四方衆僧置立寺舍及以修故又復於彼四方僧寺捨施種種衣服臥具器物所須及施田宅財寶園林僮僕給使乃至畜生若復見他捨施諸物還追奪者以力遮護若復施我聲聞弟子衣服飲食臥具湯藥一切所須我之所有聲聞弟子或有因緣遭遇苦惱若以自力若假他力方便令脫我以如是諸衆生等悉皆付囑十方現在一切諸佛及付賢劫所有菩薩摩訶薩等令其攝受生得相值若彼賢劫諸佛出世是諸衆生於彼佛所作大施主守護正法持戒第一得禪三昧具足忍力如此賢劫最後如來出現於世于時彼佛當授彼等阿耨多羅三藐三菩提記便得速滿六波羅蜜不久當為無上法王得入無畏涅槃大城爾時復有無量億百千衆生悲淚滿目瞻仰如來作如是言我今觀諸大悲世尊所有解脫出於三界一切諸道生死牢獄捨於渴愛離世八法及我我所憍慢煩惱離於一切十二有支知一切法猶如虛空住不顛倒常於衆生起大悲心然諸如來為衆生故令此法眼及三寶種於此娑婆久住不滅故加護持如來今復以諸天龍夜叉羅剎乾闥婆緊那羅迦樓羅摩睺羅伽鳩槃茶餓鬼毗舍遮富單那迦吒富單那人非人等寄付諸佛及諸菩薩彼諸衆生現在未來若布施若持戒若修定慧於此佛法精勤相應寄付諸佛及諸菩薩摩訶薩等為滿六波羅蜜令得阿耨多羅三藐三菩提故若有衆生厭苦求樂無不於現在世及未來世方便精勤護持養育熾然法眼紹三寶種而能得之佛言如是如是如汝所言若有愛已厭苦求樂應當護持諸佛正法從此當得無量福報若有衆生為我出家剃除鬚髮被服袈裟設不持戒彼等悉已為涅槃印之所印也若復出家不持戒者有以非法而作惱亂罵辱毀呰以手刀杖打縛斫截若奪衣鉢及奪種種資生具者是人則壞三世諸佛真實報身則挑一切天人眼目是人為欲隱沒諸佛所有正法三寶種故令諸天人不得利益墮地獄故為三惡道增長盈滿故何以故我昔為於一切衆生修菩薩行為此法眼於諸衆生起大悲心捨己身血猶如大海與諸乞者捨頭猶如毗福羅山眼耳亦爾捨鼻猶如百千突盧那捨舌猶如十突盧那捨手捨腳各皆亦如毗福羅山捨皮可覆一閻浮提亦捨無量象馬車牛奴婢妻子及以王位與諸乞者亦復捨於無量國土城邑宮殿村落舍宅寺廟園林衣服臥具山澤林藪與諸乞者於諸佛所受持禁戒而無缺犯一一佛所無量供養一一佛所稟受無量那由他百千法門受持讀誦護持戒行善修三昧陀羅尼忍又我亦曾供養恭敬無量無邊菩薩摩訶薩供養恭敬無量緣覺供養無量佛聲聞衆供養無量到果聲聞供養無量外道仙人供養無量父母師長供養無量病苦之者亦於無量苦逼衆生無救護者為作救護無歸依者為作歸依無趣向者為作趣向令其安住及以供養我已無量長遠劫數修諸苦行持戒威儀梵行具足諸仁者我已如是於彼三大阿僧祇劫悲愍一切苦衆生故發大堅固勇猛之心久修無上菩提之行我今於此盲冥世間無大導師儉法之時極惡增長白法盡時五無間業誹謗正法毀呰賢聖與不善根相應衆生瞋惡獷澀離諸羞恥無有慈愍不觀後世可怖畏事於如是等諸衆生中發心願成阿耨多羅三藐三菩提復於一切淨佛國土所棄衆生中降大法雨復願與彼諸衆生等除如金剛堅固煩惱彼等衆生隨其所欲於三乘菩提令不退轉復願救度三惡衆生安置善道及涅槃樂與彼衆生作正法眼加護令得久住於世長夜熾然彼諸衆生於我法中出家剃髮被服袈裟不持禁戒若有供養彼等人者如是衆生亦得大果何況為我出家持戒住法相應供養是者則得無量阿僧祇大福德聚何況復能種種供養我諸聲聞聖弟子衆而當不得無量不可説阿僧祇大福德聚是故我今於如是等諸衆生中於阿耨多羅三藐三菩提而成正覺一切世間天人中最以大悲故建立一切諸聲聞衆為上福田所謂得向八大丈夫以是緣故所有衆生於現在世及未來世應當深信佛法衆僧彼諸衆生於人天中當得受於勝妙果報不久當得入無畏城如是乃至供養一人為我出家及有依我剃除鬚髮著袈裟片不受戒者供養是人亦得乃至入無畏城以是緣故我如是説若復有人為我出家不持禁戒剃除鬚髮著袈裟片有以非法惱害此者乃至破壞三世諸佛法身報身乃至盈滿三惡道故是故我上如是告汝若有愛己求樂離苦應當精勤護持養育熾然法眼紹隆三寶令不斷絶以是因緣從此當得無量福報爾時月藏菩薩摩訶薩復與八千億那由他百千菩薩摩訶薩俱從座起合掌向佛一心敬禮作如是言如是如是大德婆伽婆於我住處月勝世界大師如來日月光時時稱揚娑婆世界釋迦牟尼佛昔菩薩時大勇猛力極苦精勤而修諸行如是菩薩以大慈悲大願力故今者於彼五濁惡世無間罪業誹謗正法毀呰賢聖不善相應諸衆生中於阿耨多羅三藐三菩提而成正覺是佛於彼計斷計常瞋惡麁𢤁無有慈愍歸依邪道求種種師不觀後世可怖畏事諸衆生中為之説法然諸衆生勤作方便欲害釋迦牟尼如來或以毒藥和食而奉或以刀杖惡象師子惡牛惡狗方便欲害或有謗言而無梵行或言非男或言是賊或言殺生作如是等種種誹謗或復有以塵土污坌或有於大衆中麁獷罵詈種種毀呰或有於佛住處以諸臭穢不淨之物污令盈滿或有見者啼泣不喜或有見者合眼掩面或有見者背走遠逝有不欲見閉戶塞窗而彼釋迦牟尼如來於此一切惡衆生中而能忍受如是無量衆惡苦事亦復於彼諸惡衆生不瞋不惱然復不捨晝夜常於彼諸衆生起大悲心一切時處隨逐化之如少牸牛初生犢子而未長大忽然失之其母爾時求覓而走如是釋迦牟尼如來亦復如是於諸衆生其心平等以大悲故隨逐而走於三惡道而拔濟之置於善道及涅槃樂如是大悲相應具足今此釋迦牟尼如來娑婆世界而作佛事爾時於彼一切大衆聞此事已皆生希奇未曾有心歡喜踊躍於彼佛前作如是言大德婆伽婆我等亦爾當以精勤大勇猛力經於無量阿僧祇劫修菩提行行檀波羅蜜乃至行般若波羅蜜如是善巧方便成熟諸衆生故而修諸行猶如釋迦牟尼如來作菩薩時久修菩提行願於五濁不淨世界惡衆生中於阿耨多羅三藐三菩提而成正覺乃至安置一切衆生於諸善道及涅槃樂我亦如是願於五濁不淨佛土於阿耨多羅三藐三菩提而成正覺如是成熟五無間業乃至與彼諸不善根相應衆生安置善道及涅槃樂彼諸衆生即時於日月光佛所如上所願得授記者爾時會中復有無量恆河沙等菩薩摩訶薩是於十方為見釋迦牟尼佛故為供養故見大集故而來此者彼諸菩薩咸同一音作如是言大德婆伽婆我等亦各於己佛土從彼如來各聞如是稱揚世尊如月藏菩薩之所説也於彼各有那由他諸菩薩等悉皆如是發大誓願為欲成熟諸衆生故而作佛事亦如月藏菩薩摩訶薩之所説也爾時復有於彼諸來一切天龍乃至一切迦吒富單那人非人等皆悉合掌作如是言我等謝過大悲釋迦牟尼如來應正遍知我等於佛若身口意所作罪過若於法僧及於世尊一聲聞弟子所作罪過今於佛前誠心懺悔願更莫造堅持禁戒我等無知猶如小兒不善所行唯願世尊大悲深愍受我懺悔我等受寄護持養育世尊法眼以諸方便令得熾然護持三寶久住不滅亦能增長三種精氣遮障諸惡於佛一切聲聞弟子乃至若復不持禁戒剃除鬚髮著袈裟片者作師長想護持養育與諸所須令無乏少若復有諸剎利國王作諸非法惱亂世尊聲聞弟子若以毀罵刀杖打斫及奪衣鉢種種資具若他給施作留難者我等令彼自然卒起他方怨敵及自國土亦令兵起病疫飢饉非時風雨鬪諍言訟誹謗譏調又令其王不久復當亡失己國如是若復諸婆羅門毗舍首陀男夫婦女童男童女若餘天龍乃至迦吒富單那等於佛所有聲聞弟子作其惱亂若奪精氣氣噓其身乃至惡心以眼視之我等悉共令彼天龍乃至迦吒富單那等所有諸根缺減醜陋不依處所我以誓力悉令如是我等遊止及常居處令彼不復得與我等共住共食亦復不得同處戲笑如是擯罰若有惱亂乃至剃髮被服袈裟不持戒者亦復如是若復世尊聲聞弟子乃至無所積聚有慈愍心三業相應如是時來我等能護令世尊法眼熾然不滅爾時世尊而讚歎言善哉善哉諸妙丈夫汝若如是則於一切所作事中無諸過失汝等以是受我付囑護持養育熾然法故便為供養三世諸佛若汝勤加護持養育熾然我法紹三寶種令不斷絶若有為我已出家者及與未來諸出家者汝等亦應護持養育此是汝等阿耨多羅三藐三菩提因爾時羅睺羅阿修羅王與無量百千阿修羅等俱從座起合掌向佛一心敬禮作如是言大德婆伽婆我等亦為勤護養育熾然佛法令三寶種不斷絶故為降伏他故休息遮障一切諸惡故令三精氣得增長故復為護持攝受養育世尊所有聲聞弟子及正法故復為利益諸衆生故遮諸罪過摧諸惡人降伏諸怨并除一切邪鬼魍魎息諸鬪諍成就一切諸禾苗稼令諸惡人得作善友悉攝一切散亂者故又令所欲皆得稱意故説大陀羅尼名曰電光噤縮作是語已即説呪曰多地夜他囉婆系囉婆系囉婆系曼讎囉系阿婆讎囉系跋囉摩囉系珊都囉系闍婆勤那囉系阿婆蜜唎也囉系伽那底囉囉系伽婆叉收達囉囉系首收達囉首收達囉首收達囉囉系牟尼婆遮那囉系底唎囉且那羽舍羅系失勤那底唎嗚闍牟尼囉系質囉迦羅底唎牟尼囉系旃達囉䨲那頭婆囉系邏蘇婆呵大德婆伽婆此電光噤縮大陀羅尼悉能饒益一切衆生乃至令諸所欲稱意若有比丘比丘尼優婆塞優婆夷若餘清信善男子善女人等能與禪法相應而住若復營事若行蘭若若在樹下若在露地如是人等若能受持讀誦念此電光噤縮大陀羅尼若有阿修羅阿修羅婦阿修羅父阿修羅母及與兒女若阿修羅左右眷屬男夫婦女及阿修羅給使之人欲來惱害伺其便者皆悉不能得彼少分是阿修羅不復還能入己城邑令其頭破以為七分如阿梨樹枝爾時諸來一切大衆咸皆歎言善哉善哉爾時毗摩質多羅阿修羅王復與百千阿修羅等俱從座起合掌向佛一心敬禮作如是言大德婆伽婆我等亦為護持養育世尊所説正法眼故乃至增長三種精氣故復為護持攝受養育世尊所有聲聞弟子故又為降伏一切怨家令諸惡人皆生歸仰休息一切所有疾病伏諸剛強攝諸惡人令作善友具好眷屬令諸種子得生不壞成熟一切果實苗稼故説大陀羅尼名師子遊步作是語已即説呪曰多地夜他涑娑樓反唎夜跋囉企佉帝反跋囉企跋囉企阿牟尼阿牟佉牟尼闍耶毗闍易阿婆囉題耶闍夷泥婆呵薩囉叉佉𠼝阿那佉𠼝毗耶寐失囉佉𠼝牟那迦囉娑佉阿蜜多受沙佉阿婆咩娑斯那嘙系常伽囉奢咩頗邏囉娑勿達設闍嘍奢摩那仚博憩僧伽奢咩憂波扇多呵唎蘇婆呵大德婆伽婆此師子遊步大陀羅尼能伏諸怨乃至成熟一切苗稼若有比丘乃至清信善女人等與禪相應乃至露地受持讀誦流布如是師子遊步大陀羅尼若有阿修羅乃至給使欲來惱害伺其便者終不能得彼之少分是等亦復不能還入阿修羅城令其頭破而作七分如阿梨樹枝爾時諸來一切大衆亦皆歎言善哉善哉爾時牟真鄰陀阿修羅王與無量百千阿修羅等俱從座起合掌向佛一心敬禮作如是言大德婆伽婆我等亦為護持養育世尊所説正法眼故乃至增長三種精氣故復為護持攝受養育世尊所有聲聞弟子故説大陀羅尼名伏諸龍作是語已即説呪曰多地夜他毗𠼝沙叉毗唎沙叉毗唎沙叉枲須凌反呵毗唎矢至迦毗唎沙佉那摸囉曷多呵呵紂呵紂呵紂伽伽紂渠竭渠竭三牟達囉渠竭薩婆闥邏渠竭悉那婆渠竭薩婆浮闍伽渠竭𠼝呵呵渠竭𠼝悉多婆閦多渠竭𠼝娑緊柘那渠竭𠼝阿婆多阿膩夜娑斫閦毗夜阿膩夜軍他閦婆遮羅鬪牟邏阿佉闍呵膩夜鬪婆羅鬪毗彌奢阿膩夜鬪阿衫浮呵膩夜蘇婆呵大德婆伽婆此伏諸龍大陀羅尼悉能休息一切疾病亦能捲縮打縛一切惡鬼不令為害能止非時惡風暴雨諸惡毒氣亦能降伏眼視殺人衆惡龍等斷諸欲著於諸龍身能作熱惱及能熱惱其所住處熱惱其心熱惱其業熱惱所有資生之具大德婆伽婆若有比丘乃至清信善女人等與禪相應乃至露地受持讀誦流布如是降伏諸龍大陀羅尼若有龍若龍婦若龍父若龍母若龍兒女若龍左右男夫婦女若龍給使欲來惱害伺其便者乃至不能得彼少分令其反得熱惱之病頭破七分如阿梨樹枝爾時四天下所有諸龍來在會者皆悉瞋怒怖彼所來阿修羅城諸阿修羅令使驚怖不能自安爾時復有娑伽羅龍王從座而起向諸大龍合掌作禮而説偈言若有見大聖是人則除瞋離瞋即為聖應當止恚惱忍辱世第一忍得世間樂忍辱離諸怨忍趣安隱城無量阿修羅恆與我等怨但當自容忍佛常如是説由瞋趣惡道瞋還增長瞋以瞋捨朋友瞋不得解脫我等畜生道惡戒瞋恚故若能除瞋慢得生於人中既得人身已歸佛而出家修習解脫行當為大導師爾時娑伽羅龍王如是説已一切諸龍皆得忍辱面色熙怡各坐本處爾時跋持毗盧遮那阿修羅王復與無量百千阿修羅等俱從座起合掌向佛一心敬禮作如是言大德婆伽婆我等亦為護持養育世尊正法令三寶種不斷絶故勤降伏他一切惡事及諸惡人皆悉休息令三精氣而得增長故復為救護攝受養育世尊一切聲聞弟子故説大陀羅尼名休息衆病作是語已即説呪曰多地夜他摸楞伽摩摩朋伽摩阿毗朋伽摩闍邏朋伽摩悉多婆毗𡃳呵朋反伽摩跋尸夜毗𡃳伽摩餘尼毗𡃳伽摩阿舍尼毗𡃳伽摩婆呵毗𡃳伽摩差叉梨反囉毗囉婆梨珊底囉毗恆伽摩娑伽囉闍邏丘肘闍邏丘肘毗鞞舍丘肘薩婆盧伽因地利耶丘肘悉蜜唎底毗朋楞舍丘肘蘇婆呵大德婆伽婆此休息衆病大陀羅尼能除所有一切病苦息諸毒害一切惡雹亦能降伏一切惡龍令與世尊聲聞弟子奉給所須猶如奴僕爾時諸來一切龍衆諸大龍王皆悉瞋忿於虛空中即起大雲在阿修羅上欲聲大鼓欲降大石雨鐵羂索𥎞鉾刀杖刀面鐵口利齒口竹口瓶口如是等形為欲害諸阿修羅而不能得
