body:
  text: 爾時阿若憍陳如白佛言世尊云何名為蓮華陀羅尼如日密菩薩之所宣説智者受持讀誦書寫得大利益不樂三界得無相解脫門者皆能斷諸煩惱七返常受人天之身雖在欲界不為欲污諸天世人常所恭敬佛言憍陳如所問蓮華陀羅尼者非諸聲聞緣覺所知是陀羅尼乃是十八不共法行憍陳如假使我於無量劫中宣説是持終不可盡亦令聞者生迷悶心是陀羅尼唯佛能説唯佛能聽何以故是陀羅尼難知難解餘三亦爾世尊唯願如來當説如空空行陀羅尼憍陳如至心諦聽當為汝説憍陳如若有衆生放逸因緣生觸欲心是人不知解脫之處流轉生死無量世中在三惡道受大苦惱菩薩摩訶薩見諸衆生受如是等無量苦惱生憐愍心勤行不息遍修諸道作是行已得阿耨多羅三藐三菩提得菩提已説苦解脫衆生聞已即得脫苦苦解脫者即是初果乃至阿羅漢果憍陳如云何觸欲言觸欲者二身共合因身合故則生於觸因觸生樂因樂生苦苦因緣故生死苦惱從是而生憍陳如如四毒蛇以四因緣能害衆生見噓齧觸欲亦如是有見因緣有聞因緣有念因緣有觸因緣因是四緣令諸衆生遠離一切諸善根本於生死中受大苦惱憍陳如云何名為觸欲解脫若有比丘能觀白骨作是思惟色者即是四大所造四大所造即是無常性無堅牢離散之法皮毛肉血智者云何於是身中生淨好相作是觀已悉於一切十方淨色即時獲得不可樂相是比丘復作是念我於是相樂修集者則得斷除一切煩惱生老病死是名舍摩他若觀足骨乃至頭骨是名毗婆舍那既得如是毗婆舍那舍摩他已觀息出入見息出時即作是念如是風者從何處來去至何處如是觀時遠離身相生於空相不見內法是名內空不見我所及外色相是名外空觀內外色空復作是念我今修集入息相已作大利益能壞一切內外諸色我壞如是內外色相皆是入息觀因緣也以是因緣令我不見內外諸色我無色相即是空力我今定知一切諸法無有去處無有來處作是觀已所有覺觀一切永斷復觀是識知是一切覺觀因緣我當遠離心意識行何以故若有生者當知定滅作是觀時得須陀洹果乃至阿羅漢果或有獲得如法忍者或得菩提若觀覺觀是滅相者即得滅定是名不共凡夫如空陀羅尼是持成就無量功德永斷無量諸大苦惱説是法時九萬二千衆生得須陀洹果六萬衆生得阿羅漢果九萬九千衆生得如空陀羅尼八萬衆生得辟支佛果八千億衆生發阿耨多羅三藐三菩提心無量衆生得不退心爾時阿若憍陳如白佛言世尊高貴德王佛所持來欲隨無願陀羅尼唯願如來分別解説憍陳如我今當説至心諦聽憍陳如有諸衆生觸欲繫縛不知解脫是人應觀無願解脫作如是念欲欲色欲及無色欲觸欲解欲知是諸欲因覺觀生諸行因緣如是諸行無有作者無有受者因風而生我身口行亦復如是因風而生因是風故身得增長因是風故口得增長如我觀風即入出息諦觀一切身諸毛孔從風因緣復觀一切不淨之物復觀是身命終之時是尸更無風息入出復作是念我身口行因緣於風若無風者無身口行因緣是故爾時得空三昧修集增長因修集故能斷欲貪乃至觸欲作是觀已得須陀洹果乃至阿羅漢果或有發阿耨多羅三藐三菩提心爾時善意覺觀菩薩摩訶薩白佛言世尊若聲聞人修不淨相得成相已有何等相善男子若為破壞欲貪之結修不淨相繫心眉間自觀身骨是名一相若觀自身及以他身是名二相又觀一切悉是不淨是名三相是人能觀苦集盡淨名舍摩他得暖法相是人如是觀白骨時見智如燈觀身四行乃至微塵是名頂法觀四真諦是名聲聞不淨觀成就獲得舍摩他定是名白骨觀相觀是相時得八正道因八正道得須陀洹果乃至阿羅漢果善男子光明佛土聲聞之人觀如是法即得道果説是法時無量衆生得如法忍無量衆生得如實忍爾時世尊復告憍陳如若四真諦可一念證者如來應為一切衆生演説一行一法一事若一人證時一切衆生亦應同證何以故煩惱同故亦不應有八萬法聚差別之異憍陳如是故衆生應以種種因緣調伏不以一緣憍陳如一切衆生非實一乘一行一貪一念一欲一解一信是故如來宣説種種句偈名字種種法門以是義故如來具足十種神力憍陳如一切衆生具有種種顛倒之相是故如來為淨顛倒説無常相苦相無我相脹相爛相青相壞相離散等相世尊云何名為一切世間不可樂想云何復名食不淨想佛言憍陳如汝今不應問如是事何以故彼界得道此界得道其相各異憍陳如我若具説衆生聞者或生迷悶世尊唯願憐愍為諸菩薩能信解者分別宣説世尊是諸衆生若聞宣説如是二相能種善子增長善根能破無明世尊一切衆生癡愛因緣樂於生死是故生死無始無終世尊一切衆生以食因緣增長貪欲世尊一切衆生初未得聞如是二相是故流轉生死五道受大苦惱如來世尊大慈大悲無量世中常念衆生唯願如來憐愍故説不可樂想食不淨想若佛宣説不可樂想食不淨想衆生聞者不生欲貪不生食貪世尊若有衆生能苦呵責欲心食心當知是人速到彼岸佛言憍陳如至心諦聽我今當説一切世間不可樂想食不淨想憍陳如世有二種一衆生世二者器世衆生世者所謂五道衆生器世者欲界之中有二十處色界十六無色四處云何欲界有二十處八大地獄一一地獄有十六圍繞一者等活二者黑繩三者衆合四者呌喚五者大喚六者熱七者大熱八者阿鼻地獄若有衆生身口意惡悉生如是大地獄中受大苦惱是諸衆生雖見妙色不生樂想以是因緣復生大苦聲香味觸亦復如是有智之人觀是事已生不樂想憍陳如若觀畜生其身細小猶如微塵十分之一有如微塵乃至如棗有一由旬乃至百千萬由旬等是諸衆生或有壽命如一念頃至七念頃或有一劫至千萬劫頃是諸衆生無有法行智慧慚愧憐愍之心當受苦惱生大怖畏各各常生相害之心遠離一切諸善之法常行黑暗常行邪道是故智者修不可樂想憍陳如智者復觀餓鬼之身或長一尺或如人等或百由旬或如雪山常患飢渴裸形無衣被髮纏身無有慚愧羸瘦骨立身無血肉各生惡心心無憐愍濕冷諸氣永無復有或食鐵漿鐵鐵丸熱糞熱膿熱血熱風熱草熱果然不能得恆不供足壽千萬劫常受苦惱行於黑暗智者觀已修集世間不可樂想憍陳如有智之人次觀人身一切皆有生苦老苦病苦死苦愛別離苦怨憎會苦求不得苦飢渴困苦欲苦瞋苦嫉妬等苦兩舌惡口寒熱等苦諸惡獸苦惡王等苦是人身中受如是苦智者云何而不修集不可樂想憍陳如智者云何觀於欲天不可樂想智者觀初欲界六處是中衆生欲愛所焦所受果報不等故苦無常故苦取苦盡苦愛別離苦智者云何於中不修不可樂想次觀色界十六住處是中諸天修世禪定有漏故苦無寂靜苦所欲故苦有勝定苦善法藏苦未解脫苦不知彼岸不盡地獄餓鬼畜生人因緣苦觀是苦已智者即修不可樂想復次色界衆生或有修集無漏禪定是等不能具足八正道苦欲具八正道方便時苦得無學地不自在苦不得緣覺三昧故苦不得如來三昧故苦不能觀察一切衆生境界故苦如是衆生於色界中若入涅槃受如是苦智者云何於色界中不修世間不可樂想次復觀察於無色界不可樂想彼中衆生修有漏三昧苦學地不得自在苦又不得聽聞正法故苦不能畢竟斷受故苦捨命退時生邪見苦不能永斷三惡道苦捨命墮苦知如是時修集世間不可樂想復次憍陳如世間者即是行行有三種身行口行意行身行者謂入出息口行者所謂覺觀意行者所謂想受是三種行其相是一智者云何能分別知智者觀息出入數時深觀息之冷暖乃至一切毛孔入出是人觀息諦知是息本無今有若本無今有是無常相無決定相如電畫水如是觀時得身行相觀如是相從何因緣即知是相因於覺觀覺觀之性本無今有是故無常是可斷法是可解脫是覺觀相因心而生心亦本無今有本無今有是無常相可破壞相無歸依相無有物相無有我相作是觀時於諸行中心則生悔能修世間不可樂想汝等比丘若能深觀如是三行則能永斷一切煩惱能淨正見斷生死法成平直道正聚所攝得須陀洹果乃至阿羅漢果憍陳如智者於諸行中修不可樂想憍陳如云何比丘觀所著衣作不樂想若有比丘裁衣縫衣見衣觸衣著衣脫衣觀如是時如血塗皮爛臭可惡蟲所住處無可樂處如是觀時於衣貪心即時除滅憍陳如云何修集食不樂想若有比丘執持鉢時如血塗髑髏爛臭可惡蟲所住處若得食時應觀是食如死尸蟲若見時如末骨想得飯漿時作糞汁想得諸餅時作人皮想所執錫杖作人骨想得乳酪時作膿血污想若得菜茹作髮毛想得種種漿作生血想憍陳如若有比丘作如是觀是名於食不可樂想憍陳如云何於房舍生不可樂想比丘若入房舍之時應生是念如入地獄受諸苦惱如是房舍即是和合所有材木即是人骨土是人肉乃至一切床榻被褥亦復如是作是觀時是名世間不可樂想若能觀察如是想者是人即得如實法忍隨空無相無願等忍是人樂修空相因修空相見一切法悉是生滅苦空無我觀陰入界十二因緣一切法性苦空無我如是見已即得須陀洹果乃至阿羅漢果憍陳如修集世間不可樂想能斷欲貪色無色貪一切憍慢疑恌無明乃至得無學地是名具足隨無願陀羅尼憍陳如是陀羅尼能破一切惡魔乃至能令三寶增長説是法時無量衆生得法眼淨無量億衆諸漏永盡八那由他衆隨無願陀羅尼無量衆生發阿耨多羅三藐三菩提心五萬八千衆生得不退菩提心無量衆生得如法忍爾時無量衆生白佛言世尊一切衆生若聞是法云何不發阿耨多羅三藐三菩提心我今護持聽受是法佛言善哉善哉諸大檀越汝等今者欲護大法因護法故未來之世當得無量福德果報爾時舍利弗白佛言世尊德華密佛遣虛空密菩薩摩訶薩所持來欲淨陀羅尼唯願説之佛告舍利弗諦聽諦聽善思念之當為汝説德華密佛所遣來欲淨陀羅尼為壞此土衆生四倒舍利弗此土衆生實無有我顛倒心故橫生我想智者深觀知無有我作是觀已則破顛倒舍利弗云何智者觀於無我所謂觀身諦知無我何以故以和合故復次觀眼亦無有我何以故四大合故若眼轉瞬即是風力如是風者因於虛空去來回轉而虛空性性無所有亦不可説若無所有不可説者即是無我是故虛空實無有我是空中風亦復無物不可宣説是故無我如觀風地亦如是地亦無物不可宣説是故無我水火亦爾是故當知眼之四大亦復無物不可宣説是故無我若復有言眼色因緣故有我相者是義不然何以故眼中無我色亦如是而和合中亦復無我和合因緣生於眼識而是識中亦復無我因識生色名為名色名色因緣生於六入六入因緣觸觸因緣受受因緣愛愛因緣取取因緣有有因緣生老病死等如是等法因眼識生而是眼識亦復不從十方而來所因之念生眼識者是念亦滅眼識不住於二念中亦不語念汝住我滅而是滅法亦無處所是故諸法緣合故生緣離故滅若因緣故生無緣則滅是故當知實無有我而是因緣亦無作受無有作者是故無我若無我者我所亦無是故眼性無我我所無合無散即是生滅一切諸法亦復如是一切法性無取無捨非諸聲聞緣覺諸佛之所造作如眼識空一切法空亦復如是作是觀時得空三昧門或得須陀洹果乃至阿羅漢果觀眼既然耳鼻舌身亦復如是觀身無我髮亦無我皮毛血肉筋骨膿髓腸唾暖氣上下諸風壽命名字皆無有我直以衆緣和合故名為身身觸因緣故生身識識因緣名色名色因緣六入六入因緣觸觸因緣受受因緣愛愛因緣取取因緣有有因緣生老病死等如是等法因生身識而是身識亦復不從十方而來所因之念生身識者是念亦滅身識不住於二念中亦不語念汝住我滅而是滅法亦無處所是故諸法緣合故生緣散故滅有緣故生無緣故滅是故當知實無有我而是因緣亦無作受無有作者是故無我若無我者我所亦無是故身性無我我所無合無散即是生滅一切諸法亦復如是一切法性無取無捨非諸聲聞緣覺諸佛之所造作如身識空一切法空亦復如是作是觀時得空三昧門或得須陀洹果乃至阿羅漢果舍利弗若有比丘能如是觀眼身無我當知是人得三昧門為諸天世人之所供養説是法時無量衆生過去惡業悉得除滅無量衆生得法眼淨無量衆生得須陀洹果乃至阿羅漢果九萬四千衆生獲得如是淨陀羅尼無量衆生發阿耨多羅三藐三菩提心無量衆生於菩提中心不退轉無量衆生得如法忍無量衆生得破欲貪色無色貪無量衆生得隨空無相願陀羅尼無量衆生成就不淨觀無量衆生成阿那波那或得舍摩他或得毗婆舍那或得性地或得聲聞辟支佛法或得菩薩法一切女人聞已悉得轉於女身欲界衆生悉受快樂如三禪地爾時一切天人八部供養於佛歡喜而住爾時頻婆娑羅王白佛言世尊此世界中無量菩薩所可成就光明妙色我從本來初未曾見初未曾聞世尊是菩薩光能照一切娑婆世界若是菩薩近於阿耨多羅三藐三菩提者其光云何大王若有菩薩成就無上菩提道者其光能照十方世界何以故善法莊嚴諸功德故成就具足莊嚴法故一切善根多增長故以近無上菩提道故畢竟無上菩提道故受於如來正法果故分別演説無邊法故所可得身無罣礙故獲得清淨真實法故所可修集到彼岸故未來世業已得盡故成就無量佛正法故能轉無上妙法輪故於一切法得自在故通達一切衆生根故永斷一切煩惱習故是故光明悉能遍照十方世界大王隨佛功德大勢力故亦能覩見十方諸佛王言世尊我今欲見十方諸佛菩薩聲聞爾時世尊告阿若憍陳如若我弟子聲聞之人在家出家是人各各深自思惟所有善法我亦欲入如來三昧若有人天得如實忍若有不退於三乘者如是衆生亦入於定復有衆生於三寶所得信敬心亦復如是入於禪定爾時世尊即入三昧其三昧名一切佛境界行智廣如虛空一切智者喜日月光明如是三昧聲聞緣覺及諸菩薩所不能知不能計量是名佛境界三昧如來入是三昧已娑婆世界百億四天下百億須彌山百億日月乃至百億有頂如是等土悉入佛身娑婆世界地獄餓鬼畜生天人有受苦者皆得除滅一切歡喜譬如比丘入第三禪所有一切菩薩摩訶薩悉從定起見佛光明見光明已自所有光尋滅不現一切聲聞所受快樂譬如比丘入第三禪爾時一切無量衆生悉皆自覩如來毛孔一一毛孔出無量光如恆河沙等日月光明亦如恆河沙十住菩薩所有光明如是光明悉能遍照十方佛土爾時十方諸佛世尊各告大衆諸善男子汝等頗見釋迦如來大光明不如是光明成就無量無邊功德是光因於大慈大悲為於憐愍諸衆生故是故今者示諸衆生大神變相一切衆生見是光已皆發阿耨多羅三藐三菩提心他方世界有諸衆生得神通者皆集至此娑婆世界其不得者遙禮供養爾時一切諸佛菩薩及聲聞衆皆悉來詣娑婆世界一切菩薩悉以七珍種種華香伎樂幢蓋供養恭敬尊重讚歎有諸衆生處佛身者皆悉見之見已復受無量快樂爾時娑婆世界一切衆生同共發聲作如是言我等以是善因緣故願後共生一國土中令得覩見十方諸佛三惡業道已得消滅若有衆生見佛神變不發阿耨多羅三藐三菩提心者當知是人常行黑暗諸菩薩等為衆生故受種種苦或化作佛或作辟支佛或作聲聞梵天帝釋四大天王那羅延像自在天像龍像鬼像阿修羅像轉輪王像若有佛界應以聲聞得調伏者現聲聞像如是等化自非十住不能為也是故無上菩提之心成就無量無邊功德爾時一切諸佛身內所有衆生以偈頌曰以諸惡心因緣故流轉生老病死者以不親近善知識是故不能到彼岸若能遠離諸惡心諸惡邪見惡因緣能斷三有生死者是則能到於彼岸衆生難得於人身得已值遇善友難篤信之心復難得得已難得聽正法若有能發菩提心是人能斷諸煩惱亦能教化無量衆現大神變如今佛若能永斷二法者所謂常斷二見等若見一切行無我是人名為善思惟若能修集苦集諦是人能斷諸煩惱若能發起菩提心是人則勝諸世間説是偈已無量衆生發阿耨多羅三藐三菩提心復有衆生發緣覺心復有衆生發聲聞心或有衆生得無量陀羅尼復有衆生得如法忍不退忍如實忍或有獲得須陀洹果乃至阿羅漢果爾時波旬悉見娑婆世界在佛身內見已悲泣涕淚橫流心生愁惱若坐若起若行若立進止出入以手拍頭亦受苦惱乃至一切魔之眷屬亦復如是時魔波旬有一大臣名曰空樹見魔愁惱而説偈言何故愁惱而獨行其心迷亂如狂人所至之處心不樂唯願天王説因緣時魔波旬復以偈答我見瞿曇大神力是故生惱而狂行內心躁動無安所愁熱逼切及眷屬覩見如來無邊身悉受一切娑婆界令我境界悉空虛是故我今生愁惱十方所有諸聖人悉來集會此世界大設供養供養佛是故令我生愁惱瞻覩如來大神力及見眷屬歸依佛我今獨行無伴侶是故令我生愁惱爾時大臣復説偈言我今多有諸眷屬其心弊惡具器甲力能破壞如來身及能毀壞大神力時魔波旬復説偈言我今眷屬深畏佛云何能壞神通力若欲生心毀壞時則自見身被五縛是時大臣復説偈言如其怨敵勢力大當詐現親則可壞若知瞿曇有大力先當詐現親厚心時魔波旬復説偈言我若詐現親厚心為欲毀壞瞿曇身即現頸下繫死尸為一切人所呵責是時大臣復説偈言一切欲有是魔界所有人天屬如來願王切敕惡龍王是能破壞瞿曇身時魔波旬復説偈言若汝審知龍有力我已失心汝自約若實能壞瞿曇者我還得土及本心爾時大臣即便宣告諸惡龍王汝當為我壞瞿曇身時諸惡龍將欲飛空而不能動即語大臣敬奉來命欲往毀壞適生此心便不得去爾時大臣即生怖畏作如是念我若今者現魔大力令諸惡龍心生瞋恚以瞋恚故則能毀壞瞿曇之身爾時龍宮有化死尸充滿側塞諸龍見已自於宮室心不甘樂作是念言是誰化作此死尸耶雖復思惟莫知誰為爾時一切四天下中諸大龍王及其男女大小眷屬即出宮室至佉羅坻山其山平坦廣縱正等四萬由旬皆是先聖所遊居處七寶具成乃至難陀婆難陀王亦捨住處至此山中四大海中所有龍王及其眷屬無量無邊伊羅跋龍王善住龍王龜龍王阿那婆達多龍王目真鄰陀龍王德海龍王水德龍王舍德龍王樂德龍王阿波那羅龍王山德龍王牛德龍王伊羅跋多龍王長臂龍王長髮龍王淨龍王迦羯羅龍王水漂龍王黑髮龍王金色龍王舍拘龍王念彌龍王象龍王利牙龍王有行龍王疑網龍王長面龍王赤眼龍王樂見龍王如是等閻浮提土所有龍王其數八萬并其眷屬乃至四萬四千國土所有龍王皆至佉羅坻山北鬱單越有二龍王一名無遍二名金身是二龍王與無量衆及四萬四千國土龍王亦至此山東弗婆提有二龍王一名為月二名婆私吒是二龍王與無量衆生及四萬四千國土龍王至此山中西瞿耶尼有二龍王一名寶髮二名光髮及四萬四千國土龍王至此山中及四天下四生龍王并其眷屬亦至此山是諸龍王其身皆如四寸藥根以瞋恚故身如須彌時魔波旬見如是等諸龍王已告其眷屬諦聽諦聽以我力故令如是龍從宮室出至彼大山悉失勢力不能毀壞瞿曇沙門爾時復有大臣名曰戒梯即白魔言大王如是龍王為欲破壞釋迦身故集會一處各作是念我今當以何等方便壞瞿曇身波旬答言我有是事若審汝當往看爾時大臣與百千萬衆生欲往彼山爾時如來從禪定起坐於一面示現常身大臣既見如來常身在摩伽陀國見已即作是念瞿曇沙門退失神通將不於我生怖畏耶欲於我所生大惡乎我應先至彼瞿曇所與共談論爾時大臣即與大衆往至佛所而説偈言汝身未度生死海云何當能度衆生瞿曇勿誑諸衆生説言當得大涅槃爾時如來復以偈答我已得度生死海亦得永脫一切有我以慈悲因緣故説言衆生當涅槃汝已於昔無量世發起無上菩提心已曾供養無量數百千巨億諸世尊汝今定當得佛道云何言我誑衆生我今施汝大念力便可至心觀本身爾時大臣聞是偈已即自觀察過去本身了了明見發菩提心供養無量無邊諸佛見已即時心大慚愧於如來前頭面著地懺悔作禮白佛言世尊我今已憶無量世中發菩提心已曾供養無量億佛於諸佛所聽受妙法已得修行六波羅蜜世尊迦葉佛時有一比丘説聲聞乘我不思惟便言是語非是佛語魔之所説是人已發菩提之心行菩薩道以是因緣迦葉如來不授我記我因是事生於魔界受是身來已經五萬七千億歲世尊我寧以是過去等身受地獄苦終不退於菩提之心佛言大臣善哉善哉若人以金如須彌山并七寶物於無量世供養於佛其福不如發菩提心何以故發是心者乃是供養十方諸佛爾時戒梯菩薩即於座上得如法忍從坐而起頭面作禮繞佛三匝以身上衣供養於佛乃至四萬四千大衆亦復如是時魔波旬見其大臣及其眷屬已歸依佛心生苦惱牢閉門戶却坐一面爾時世尊即為大衆説三種慈所謂生緣法緣無緣如虛空目中之所宣説爾時一切諸天龍王悉皆集會佉羅坻山先聖住處欲動不能欲行亦然欲現大身而復不能尋向難陀婆難陀王而作是言大王先者所作臭穢死尸皆是波旬之所為也是故令我悉來至此受是小身若能歸依魔波旬者可得解脫爾時伊羅跋羅龍王言魔王今者喪失本心及其神足云何當能救濟汝等爾時龍王或有歸依四天王者或有歸依忉利天或焰摩天或兜術天或化樂天或他化自在天或梵天等爾時海龍王即作是言汝等不見釋迦如來一切賢聖人天雜類大設供養而歸依耶爾時或有龍王歸依那茶仙人或馬藏仙人或歸廣仙人或光味仙人或跋伽婆仙人歸依如是等五種仙人是五仙人悉得五通住於雪山悉在光味大仙人所聽受正法光味菩薩亦以種種無量讚歎讚歎如來爾時仙人悉聞一切龍王音聲聞已即白光味仙人頗聞諸龍哭聲不耶答言已聞大士唯願往彼救濟其苦光味答言汝等可往我不得去所以者何今有大天欲得聞受無緣慈故時四仙人禮拜光味往佉羅坻山而救濟之諸龍見已即各舉聲求哀求救仙人答言我不能救彼雪山中有一菩薩名曰光味彼能救拔吾等不能汝當一心求哀作禮時諸龍王各自同聲向彼作禮爾時光味聞是聲已與無量諸天大衆至佉羅坻山龍王見已頭面作禮唯願大士救我等苦爾時光味菩薩知時已到欲説星宿爾時大海龍王白光味菩薩言大士是星宿者誰之所説誰作大星誰作小星誰作日月何日之中何星在先云何滿月云何為時如是星宿繫屬何天性是何等何輕何重何善何惡何食何施誰造此晝誰作此夜影有幾步名曰為轉云何南轉云何北轉大士汝於諸仙最為第一唯願具足分別解説爾時光味菩薩告諸龍王大王先過去世賢劫之初旃陀延城其城有王名無量淨正法治國不貪欲樂常樂寂靜才智聰達王有夫人欲心發動與王遊行在一林中貪心視王即便妊身是時夫人時滿即生其兒頭耳項眼脣口悉皆似驢餘分似人其母見已即生怖畏擲之廁中身未至地是時驢鬼於空接取往雪山之中瞻看哺養猶如生子時雪山之中有甘美藥驢鬼採取以食是兒是兒食已身則轉異有大光明福相具足智慧慈悲以是因緣諸天禮拜供養讚歎為是兒故於雪山中有諸種種藥草果蓏餘相悉轉唯脣似驢是故名為驢脣仙人於六萬年受持禁戒常翹一足一切梵天魔天帝釋大設供養而供養之皆悉合掌白驢脣仙人欲求何願唯願語之若我力能我當施汝仙人答言我今欲得了知星宿為衆人故心生憐愍一切天言若為憐愍一切衆生欲得知者願當説之仙人言梵天我實不解最初宿説是星時諸大龍王於光味菩薩心生歡喜爾時光味菩薩為諸龍王出微妙音讚歎三寶又作是言我今真實不能救拔汝等苦惱唯有如來釋迦之尊乃能救之釋迦如來為欲調伏諸衆生故於無量世能捨所珍修習慈悲為救苦惱爾時一切龍王男女大小至心念佛讚歎歸依南無世尊於衆生中最為殊勝一切法中心得自在於諸法海已到彼岸能救一切衆生苦惱施其安樂平等無二憐愍一切能示正道惠施正眼一切天龍之所供養能受一切十方世界所有人天微妙供具世尊我今多受無量苦惱唯願慈悲少垂救拔是諸龍王心念佛已尋自見身如先無異時光味菩薩語諸龍王如來功德不可思議為衆生故於無量世修行具足六波羅蜜説三慈悲調伏衆生説一切法無我無作説陰入界四大煩惱説煩惱性及衆生性説一切法無性無相無礙無作無垢無淨無明無暗無取無捨無行無住無一無二陰入界等及以四大亦復如是名第一義空是故如來能調衆生為無上尊是故如來能拔汝等無量苦惱日密分中救龍品第六爾時世尊告光味菩薩善男子汝今欲聞諸龍業不光味菩薩白佛言世尊今正是時唯願演説佛言善哉善哉善男子至心諦聽當為汝説爾時一切天人以好香華妓樂幡蓋供養於佛爾時世尊與欲色界一切諸天無量聲聞及菩薩衆從摩伽陀國趣須彌山爾時梵天設七寶座以待如來復有造作七寶街道是時梵王作如是言唯願如來經涉此路坐我座上爾時他化自在天復以閻浮檀那寶造床及道亦言如來願行此路坐我座上爾時化樂諸天復以天金造床及道亦言如來願行此道坐我金床爾時刪兜術陀天復以天銀造床及道亦言如來願行此道坐我銀床時夜摩天復以琉璃造床及道亦言如來願行此道坐琉璃床時忉利天復以真珠造床及道亦言如來願行此道坐真珠座時四天王復以瑪瑙造床及道亦言如來願行此道坐瑪瑙床時四阿修羅復以栴檀造床及道亦言如來願行此道坐栴檀座爾時世尊心憐愍故化作佛像遍行六道遍坐六座以如來真身處在梵王所設道座一一化像皆有無量聲聞菩薩以為眷屬一一化像所有光明猶如無量日月光明是諸龍王見化像已心生恭敬各作是言今須彌山乃至如是千日月耶難陀婆難陀言如來世尊與無量梵天趣須彌山是其光明非日月也汝等若欲得解脫者應當至心專念如來如來世尊已壞無明是故今有如是光明阿那婆達多龍王言是光明者是魔所有非佛光也何以故一切欲界屬魔波旬故是魔波旬能作是惡波旬今者憐愍故能救如是諸龍王苦或有説言如此乃是化自在天化樂天兜率陀天夜摩天忉利天四天王等以憐愍故能救如是諸龍王苦善住龍王言是光明者即是光味菩薩光明以憐愍故救諸龍王苦寶髻龍王言是光明者乃是出家剃除鬚髮大德人光以憐愍故救諸龍王苦海龍王言是光明者是如來光何以故以憐愍故如來世尊於諸衆生修一子想能救衆生一切苦惱於無量世修行具足六波羅蜜唯為救濟一切衆生無量苦惱是故一切欲色界天設大供具而供養之爾時世尊告帝釋言憍尸迦如我遊此娑婆世界為化衆生如汝在於三十三天為度諸天憍尸迦言世尊我今未有無邊之智云何説我能化諸天世尊是須彌山有無量天無量梵天無量鬼神無量乾闥婆無量緊那羅無量迦樓羅無量阿修羅無量摩睺羅伽無量諸龍無量大仙無量聖人唯願如來以憐愍心化度如是無量衆生爾時世尊熙怡微笑無量色光從其口出青黃赤白玻璃雜色遍照十方幽冥之處勝無量億梵天光明無量億數釋天日月能壞一切諸惡魔業爾時世尊告帝釋言憍尸迦娑婆世界所有諸山須彌為最我亦如是於諸衆生最為第一爾時一切龍王聞是語已各白佛言世尊唯願憐愍救我等苦佛言諸善男子汝等先當至心念佛我當救之爾時世尊告憍陳如其音遍聞十方世界憍陳如一切諸法悉皆無常一切諸法生住無常何以故生因緣故一切因緣生法即是苦也若法生時即是苦即是癰瘡即是有支即是生老即是生滅憍陳如眼即無常若眼生者即是苦即是癰瘡即是有支即是生老即是生滅乃至意亦如是憍陳如若眼滅者即是生老病死等滅即是一切有支滅乃至意亦如是衆生不知眼之生滅是故流轉在五道中如來為斷眼生滅故而演説法亦為説苦斷苦行法是故如來是梵中大梵天中大天象中大象是沙門中大沙門婆羅門中大婆羅門慈中大慈悲中大悲無上之尊為大丈夫已到生死大海彼岸最大福田無勝施主其心平等為大法王持大禁戒無上精進善修梵行了知正道為大導師通達餘業憍陳如善知眼之生滅因緣故名如來不了知故名為凡夫云何不知名為凡夫憍陳如一切衆生皆説有我是故不見眼生滅相輪轉五道憍陳如有諸外道説言見者名之為我乃至知者是我眼者即是我之因緣乃至意者亦復如是憍陳如諸外道説眼喻於向我者喻見若如是者是名顛倒何以故所言見者即是和合於和合中而生我想是故顛倒若言向喻於眼見喻我者是義不然何以故向中見者亦見亦聞亦識亦觸眼不如是是故見者不得名我向雖久故見猶明了眼若久故不得如是我者名常若我見聞我則無常若無常者云何説我憍陳如衆生以是顛倒因緣不見四諦如來了是顛倒相故名為正智我者即是如來若有能知如來我者是人則能壞顛倒相若壞顛倒則破魔業若破魔業是人則能救拔諸龍憍陳如是故我今能救諸龍
