body:
  text: 隋天竺三藏那連提耶舍譯日藏分菩薩使品第三爾時頻婆娑羅王見未曾見無量阿僧祇梵天帝釋天那羅延天四天下轉輪聖王見已心大歡喜從坐而起在一面立爾時四使菩薩摩訶薩及其眷屬合掌向釋迦牟尼佛時日行藏菩薩以瞻波迦華鬘散釋迦牟尼佛上而讚歎曰於諸足中最殊勝施諸惡見大光明能說出世平等行行正道者施法印摧滅毒龍及四魔解世煩惱佛為勝竪堅法幢施解脫以大法炬滅衆暗親近善友修集定愍衆生故說福田佛法僧寶甚難得人身信心亦復難雖得人身善友難得善友者壞煩惱衆生惡智煩惱覆速能為滅煩惱網衆生沒於煩惱河佛如大船能拔濟我等諸佛使說欲隨喜如來佛法藏爾時日行藏菩薩白釋迦牟尼佛言世尊東方過無量恆河沙佛剎彼有世界名無盡德佛號瞻波迦華色如來應供正遍知現在說法彼佛如來使我送欲并問訊釋迦牟尼佛少病少惱無多患不弟子眷屬身力樂不常安隱不樂聽法不聞佛所說如教行不樂阿蘭若不世尊於此破壞衆魔獨超衆聖轉於無礙微妙法輪但此五濁諸惡衆生障礙未盡於佛法輪不信受者為是等故彼瞻波迦華色佛說此日藏法行壞龍境界炎品一切衆生惡業盡陀羅尼欲名四諦順忍陀羅尼此陀羅尼有大勢力有大利益能盡一切欲貪色無色貪一切慢增上慢我慢等如上所說此四諦順忍陀羅尼能壞一切魔王勢力能令諸天心生歡喜能令阿修羅迦樓羅生大怖畏能令緊陀羅心生歡喜能令摩睺羅伽生怖畏心能壞外道於剎利所能與知足能攝婆羅門令入佛法能令毗舍生大信心能令首陀羅生歡喜心能令女人離諸貪欲能令智人生歡喜心令坐禪人樂阿蘭若能却一切種種惡事及諸鬪諍飢饉疫病夭橫死者能除外賊非時寒熱惡風雨惡獸瀑水苦辛枯澀諸惡觸等能建立法幢光顯佛法令法母久住佛種不滅能安慰生死流轉衆生能生盡智能覺無生智能裂一切無明暗聚能捨一切苦擔能乾一切苦海爾時日行藏菩薩即說如上四諦順忍陀羅尼𡃂絰咃一婆裔婆野波履婆隸二婆醯婆訶波履婆隸三必利洟他地反仳必利洟他地反鼻波履婆隸四阿捭阿跛波履婆隸五低誓低社波履波隸六末隸末邏波履波隸七却偈其隸反却伽其箇反波履婆隸八阿盧翅阿盧迦其可反波履婆隸九薩他迷芒閉反薩他麼波履波隸十曷羅釐可反誓曷羅釐可反社波履婆隸十一徙隸徙邏波履婆隸十二伽迷伽麼波履婆隸十三阿蒱婆波履婆隸十四羅麼羅麼十五羅謎芒閉反羅麼十六曷囉勒可反曷羅邏十七阿囉羅阿囉羅麼十八䏶踏婆蒱麼反攘娜復䫂登我反十九伽邏彌復䫂登我反二十揭邏磨波履婆隸二十一斫芻揭邏醯斫芻揭邏訶波履婆隸二十二輸嚧怛囉揭邏醯輸嚧怛囉揭邏訶波履婆隸二十三伽羅娜揭邏醯伽羅娜揭邏訶波履婆隸二十四什婆揭邏醯什婆揭邏訶波履婆隸二十五迦耶揭邏醯迦耶揭邏訶波履婆隸二十六麼那揭邏醯麼娜揭邏訶波履婆隸二十七馺跛曷利捨揭邏醯馺跛曷利捨揭邏訶波履婆隸二十八鞞䫂娜揭邏醯鞞䫂娜揭邏訶波履婆隸二十九怛履瑟那揭羅醯怛履瑟那揭羅訶波履婆隸三十憂波陀那揭邏醯憂波陀那揭邏訶波履婆隸三十一婆𭒂揭邏醯婆𭒂揭邏訶波履婆隸三十二闍帝揭邏醯闍帝揭邏訶波履婆隸三十三社囉摩囉娜揭邏醯社囉摩囉娜揭邏訶波履婆隸三十四獨佉珊多跛揭邏醯獨佉珊多跛揭邏訶波履婆隸三十五阿囉波囉踏陛社揭邏醯阿囉波囉踏陛社揭邏訶波履婆隸三十六阿跋䫂鞞婆䫂寫三十七阿跋囉摸跛麼婆卸思夜反鞞也三十八毗尼跋䫂三十九阿利耶曷囉捨彌四十薩鞞伽羶帝莎波訶四十一說此呪已白佛言世尊此四諦順忍陀羅尼是彼瞻波迦華色佛所送爾時釋迦牟尼佛聞此呪已讚言善哉善哉乃至一切娑婆世界諸佛剎中十方來衆及此剎衆亦稱善哉除入定者爾時釋迦牟尼佛告日行藏菩薩言善男子我今不起此座於大衆中廣為衆生說此四諦順忍陀羅尼文字及義不增不減善男子汝欲來此彼瞻波迦華色佛為護汝身不怖畏故說身受行陀羅尼乃至說涅槃道日眼蓮華陀羅尼汝今當為一切衆生於此宣說爾時日行藏菩薩即於佛前說所持來日眼蓮華陀羅尼怛絰他一徙阿摩帝二毗盧迦基我反麼帝三隸四羇基離反䫂矣利師五漚制六蘇樓漚制七佛地徒紙反毗佛地徒紙反八摩訶佛地九鬱奴摩提十鬱奴摩爹十一鉢底篩踈皆反達膩十二阿羅伽度蘆婆十三阿囉伽度蘆婆十四鉢底篩達膩十五頻豆頻豆麼底十六質吒質吒鉢底蒒達膩十七頞勒羇居離反十八栴陀羅提十九呵呵虎我反質𢰗竹機反二十訶䫂膩弭二十一訶䫂迦基我反麼鞞祇其利反二十二訶䫂富娜曷囉婆二十三曷囉栘二十四訶䫂斫芻二十五三摩帝二十六訶䫂毗麼地徒祇反二十七訶䫂夜奇離二十八訶䫂毗三麼揭離二十九訶䫂三姥爹囉社裨三十訶䫂鞞麼䫂曷囉誓三十一訶䫂嘻呼旨反㖑呼戒反三十二訶䫂者帝嘲隸反三十三訶䫂達麼曷囉誓三十四訶䫂蒱呼曷囉誓三十五訶䫂跋社麼帝三十六訶䫂噓伽曷囉捨彌三十七訶䫂達麼徙蜜帝三十八訶䫂婆憂波陀娜三十九若如者反茹若如者反四十毗社樹堅四十一毗者社若若四十二娑羅末伽其我反若若四十三娑案䫂四十四婆囉伽其我反四十五獨敧莎呵四十六說此呪已白佛言世尊彼瞻波迦華色佛為護我故說此陀羅尼爾時釋迦牟尼佛告長老耶舍汝可持此日眼蓮華陀羅尼何以故佛出世難聞此陀羅尼亦復甚難若佛如來及弟子衆或阿羅漢須彌山王及於大海其德可說此日眼蓮華陀羅尼非於一劫若百千劫可說其德此陀羅尼如是甚深汝當一心受持讀誦於四衆中廣宣說之彼娑婆界一切衆生聞此呪已一切欲貪色無色貪悉皆除滅乃至能得漏盡智證得涅槃樂爾時香象菩薩復以偈讚唯佛坐於菩提樹能壞衆魔及眷屬獨得無上勝菩提證知一切衆生類佛放勝光蔽外道如日能映諸熒火法母三寶種常住聖集為度諸衆生為求善法及菩提供養佛故同集此唯佛甘露洗衆生演說菩提勝行故能度衆生更不生盡漏盡思盡煩惱安置衆生寂滅城唯佛於世如妙藥能除衆生諸憂愁彼佛使送陀羅尼并復問訊牟尼月多聞智海慈悲行說此偈已白佛言世尊譬如有城方一由旬沙滿其中如是一沙為一佛剎過是數已南方有佛世界名袈裟幢具足五濁佛號山帝釋王如來十號具足今現在說法彼佛如來使我送欲并問訊釋迦牟尼佛少病少惱常安樂不弟子衆等無多患不樂聽法不既聞法已如說行不樂阿蘭若不樂坐禪不佛於此剎破壞魔王及諸惡龍光顯正法轉無障礙清淨法輪但此佛剎諸惡衆生障礙未盡不受法輪者為是等故彼山王如來令我送此日藏法行壞龍境界炎品一切衆生惡業盡陀羅尼欲名空順忍陀羅尼此陀羅尼有大勢力有大利益能却一切欲貪能盡一切色非色貪能盡一切慢增上慢如上所說乃至能捨苦擔爾時香象菩薩即說所送空順忍陀羅尼怛絰他一頭摩帝頭摩帝二惡踦驅置反頭摩帝三鉢囉娑婆頭摩帝四薩婆迦舍頭摩帝五阿鞞却伽其我反六培鞞娜却伽七碎蘇骨反朱叉却伽八阿𭒂摸訶却伽九阿那涅也却伽十毗耶佛履帝却伽十一僧迃嘍者却伽十二阿泥麼却伽十三盧者那却伽十四尸棄却伽十五毗底寐却伽十六郁芻麼却伽十七嗚囉却伽十八惡敧却伽十九耶婆麼娜却伽二十尤嘍跛却伽二十一耶婆毗娘那却伽二十二斫芻陀妬却伽二十三耶婆麼娜毗娘那陀妬却伽二十四必利洟陛陀妬却伽二十五耶婆毗娘娜陀妬却伽二十六靼之結反埵都和反履悉蜜駐跛薩他娜却伽二十七耶婆阿瑟吒達奢阿鞞尼迦佛陀達摩却伽二十八獨佉却伽二十九耶婆磨勒却伽三十毗婆𭒂娜毗敧𭒂三十一阿那娜娜三十二阿陛娜娜三十三三姥陀娜娜三十四薩婆迦囉囉娜娜三十五薩婆僧薩他娜毗瞿跛娜娜三十六阿緊吉因反柘若女我反娜娜三十七叉初詐反婆叉婆三十八伊犁伊儸三十九伊犁伊羅四十寐利蘇波呵四十一說此呪已白佛言世尊此陀羅尼是彼山王如來所送爾時釋迦牟尼佛心大歡喜讚言善哉善哉并及一切娑婆世界諸大集衆皆大歡喜同讚善哉除空靜處入禪定者爾時釋迦牟尼佛語香象菩薩言善男子我今不起此座於大衆中廣為衆生說此空順忍陀羅尼文字及義不增不減善男子汝欲來此彼山王佛為護汝故說無盡根陀羅尼汝可說之何以故能却一切心受行故得平等一切智智故四魔境界壞故法母三寶性不斷故爾時香象菩薩白佛言世尊我今當說即於佛前說所持來無盡根大授記陀羅尼怛絰他一捨囉娜毗夜也二式叉毗夜也三徙寐履帝毗夜也四鉢囉河拏奴下反毗夜也五矣履地毗夜也六因地利毗夜也七囉毗夜也八蒲騰伽毗夜也九三摩地毗夜也十陀羅尼毗夜也十一羼帝都利反毗夜也十二毗梨耶毗夜也十三闍娜毗夜也十四鉢邏若女我反阿霤驢㖃反必也毗夜也十五阿紉奴鄰反社毗夜也十六摩伽毗夜也十七遏鼻娘毗夜也十八鉢囉帝都履反三陛蒲履反爹毗夜也十九步寐莫履反毗夜也二十坒父一反絰耶余歌反毗夜也二十一摩訶梅怛梨毗夜也二十二摩訶迦霤驢㖃反那毗夜也二十三摩訶牟帝多毗夜也二十四摩呼卑叉毗夜也二十五必利洟鼻毗夜也二十六薩埵毗夜也二十七達摩毗夜也二十八答摸毗夜也二十九阿盧迦毗夜也三十鉢囉帝婆娜毗夜也三十一鉢囉帝輸盧得迦毗夜也三十二伽伽那毗夜也三十三摩霤䫂毗夜也三十四鉢囉帝多三姥波爹毗夜也三十五輸娜奴下反多毗夜也三十六阿尼蜜多毗夜也三十七掩鉢囉尼系多毗夜也三十八侯嘍䫂毗夜也三十九瞿沙毗夜也四十緊吉因反柘那毗夜也四十一阿鼻三麼夜毗夜也四十二阿怒娜四十三阿奴娜四十四阿𭒂呵者者四十五者遮囉四十六者遮囉毗姥四十七柘陛蒱履反斫芻者遮囉毗姥四十八毗夜也毗姥四十九察夜毗姥五十阿磨毗夜也毗姥五十一阿三姥阿遮囉毗姥五十二塢眵陀毗姥五十三阿迦舍毗姥五十四驃鉢舍麼毗姥五十五阿那婆婆毗姥五十六阿呵呵毗姥五十七阿囉婆囉毗姥五十八優波舍麼毗姥五十九薩利羅毗姥六十娑波呵六十一說此呪已白佛言世尊此是山王如來所說無盡根授記陀羅尼護我身故爾時釋迦牟尼佛告長老憍陳如汝可受持讀誦此無盡根陀羅尼憍陳如佛出世難聞此陀羅尼者亦復倍難善男子若佛如來或佛弟子大阿羅漢等於百千劫可得數知一切衆生三世心心數法此陀羅尼德非百千劫說能盡其邊以是故憍陳如當受持此無盡根陀羅尼於四衆中如聞廣說若有衆生得聞此法能盡惡業乃至得四無礙不壞辨才能常樂說於三界中得最勝身爾時炎德藏菩薩摩訶薩合掌向釋迦牟尼佛以偈讚曰六道煩惱苦所㵱佛智如船自他度六根所迷魔羂縛佛出世難說實道智人能捨六種家佛為世親除儉法得六神通諸三昧諸佛大聖實語者能解衆生流轉縛我等信心聞佛讚世親使我來此剎唯願世尊聽我說爾時炎德藏菩薩摩訶薩白佛言世尊西方過四十二恆河沙等佛剎有佛世界名堅固幢佛號智德峯王如來十號具足今現在說法彼佛如來使我說欲并問訊釋迦牟尼佛安隱住不起居輕利不弟子衆等無多患不樂聽法不若聽法已能如說行堅固住不樂阿蘭若行不如來於此破壞衆魔及龍眷屬光顯正法最勝無礙轉妙法輪但此世界諸惡衆生障礙未盡於佛法輪不順行者是故彼佛說此日藏法行壞龍境界炎品一切衆生惡業盡陀羅尼欲所謂無願順陀羅尼此陀羅尼有大勢力有大利益能盡一切欲貪色無色貪一切慢增上慢我慢等如前所說能裂一切無明暗聚能捨一切苦擔爾時炎德藏菩薩即說所送無願順陀羅尼怛絰他一舍摩那舍婆二阿婆叉舍婆三斫芻舍婆四輸嚧哆囉舍婆五伽拏舍婆六視婆舍婆七迦耶舍婆八摩那舍婆九叉婆毗陀十斫芻畢利洟鼻叉婆十一輸盧哆囉阿婆叉婆十二伽羅拏帝闍叉婆十三什婆婆喻叉婆十四迦耶羯羅摩叉婆十五摩那烏闍叉婆十六阿盧迦若那叉婆十七毗闍僧羯摩叉婆十八唵句囉呿伽叉婆十九婆摩嘍畢也鼻耶叉婆二十舍摩迦闍叉婆二十一叉耶囉娑叉婆二十二羯哆鼻耶婆叉婆二十三耶耶那二十四泥那都那二十五阿婆泥那都那二十六那耶波那夷那都那二十七伊沙伊婆都度呿𡃂莎呵二十八說此呪已白佛言世尊此無願順陀羅尼是彼智德峯王如來所送爾時釋迦牟尼佛及一切娑婆世界諸大集衆皆讚善哉善哉唯除在定爾時釋迦牟尼佛告炎德藏菩薩摩訶薩言善男子我今不起此座於大衆中廣為一切衆生說此無願順陀羅尼文字句義不增不減善男子汝從彼來智德峯王佛為護汝故說智慧依止陀羅尼汝今當為一切衆生於此宣說若有衆生聞此法已所有上中下結欲有因緣所生煩惱悉皆微薄復能除却恆河沙劫生死之苦一切惡業亦皆除滅一切善根具足圓滿爾時炎德藏菩薩白佛言世尊如是如是我今當說即於佛前說智慧依止陀羅尼怛絰他一佉伽波利眵尺之反提二伽唎婆叉惻檀反三西伽跋梨四鼻也鉢囉婆伽叉惻檀反五叉婆踰岐強子反鉢底呵梨六奢磨那四迦涕七三摩迷伽闍師踈齊反八阿叉夜那低九叉婆跋栘常兮反十禰䭾那闍師十一婆摩娜闍師十二娑摩伽邏闍師十三阿地呵奢夜闍師十四鼻鉢囉婆闍師十五西叉闍師十六西禰夜闍婆闍師娑利囉瞿嘻馨之反夜闍師十七娑利羅瞿嘻夜阿鞞綺婆那鳩世十八薩檀拘帝十九私婆檀那梯二十毗哆鉢囉鼻利低二十一嘔波羯囉磨那梯二十二阿那比地夜跋羅仚羌兮反二十三鉢羅帝羯迷那二十四三迦太夜世二十五薩盧遮那婆迷拘嚧太梨二十六迦摩薩世二十七阿世奢佉岐𨈬豫反二十八那夜軍闍二十九鼻地夜跋泥三十羯羅那跋泥三十一鬱遮跋泥三十二三迷摩迦梨三十三奢利夜跋泥三十四摸伽闍師三十五呵利拘那婆三十六那夜那目仚三十七娑囉叉拘梨三十八那羅延拏樹梨三十九因陀羅婆薩泥四十烏阿四十一阿婆阿四十二阿阿烏可反何羅婆阿婆囉四十三阿婆囉四十四阿羅薩彌伽其我反四十五豆佉禰提都夷反囉四十六涅槃醯四十七莎和呵四十八說此呪已作如是言此是智德峯王佛所說陀羅尼爾時釋迦牟尼佛告長老舍利弗言汝可受持此智慧依止陀羅尼所以者何佛出世難聞此陀羅尼亦復倍難舍利弗若佛如來及佛弟子大阿羅漢於百劫中可得知此四天下微塵等數此智依止陀羅尼德於百千劫說不能盡此陀羅尼如是甚深是故應受持讀誦於此衆中廣為人說若有衆生能聽受者彼人所有下中上欲有因緣所生煩惱及色無色有因緣所生煩惱皆悉微薄復能除却恆河沙劫生死之苦五無間業及於女人舊所造業皆悉除滅乃至漏盡得涅槃道爾時虛空藏菩薩摩訶薩合掌向佛而說偈言如來真實知法界示魔衆生正真道若有真實生信心是則能破三惡道供養如來一香華無量世受無上樂無量世中身具足亦得無上真智慧若能一聞是總持即能摧滅諸煩惱一切人天所供養獲得無生及盡智華德藏佛功德具彼佛使我來問訊爾時虛空藏菩薩白釋迦牟尼佛言北方去此八十恆河沙世界彼有佛剎名一切香上具足五濁佛號德華藏如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊今現在說法彼佛使我送欲并問訊釋迦牟尼佛如來於此降伏衆魔及龍眷屬最勝無礙轉妙法輪但此剎中諸惡衆生於佛法輪不順行者是故彼德華藏佛說此日藏法行壞龍境界炎品一切衆生惡業盡陀羅尼欲所謂奢摩裴多悉致那利陀羅尼此陀羅尼能令衆生得大勢力得大利益得大安隱能除一切病苦能壞一切煩惱一切陰入界能差別知一切法能示一切方便能清淨涅槃道能令一切衆生心生歡喜能入一切法門無有障礙能以正法降伏外道令住佛法能壞一切魔王境界此陀羅尼有大力用善攝一切諸魔外道令失勢力能令諸天生大歡喜能令夜叉心生知足能怖阿修羅能壞金翅鳥能令緊陀羅生大歡喜能令摩睺羅伽不敢回顧能令外道默然無對能令剎利心生歡喜能令婆羅門信入佛法能令毗舍首陀羅等皆大歡喜能令女人不樂多欲能令懷孕女人産生安隱能令多聞人心不失念能令坐禪人樂阿蘭若能除一切患難一切鬪諍飢饉疾疫能除內外姦宄能除非時寒熱風雨暴水苦辛枯澀惡觸等事能光顯法母建立佛法紹三寶種令不斷絶於生死中作大安慰能生盡智能證無生智能壞無明暗聚一切苦擔此名奢摩裴鞞多悉致陀羅尼爾時虛空藏菩薩即於佛前說奢摩裴多悉致那利大授記陀羅尼怛絰他一摩那叉惻我反二阿婆叉三羅伽婆叉四閻羅叉五末摩那叉六阿婆叉七曼陀叉八那荼叉九那荼囉休十鼻薩那吒十一佉伽那吒十二阿吒那吒十三拘那吒十四鉢利鳩薩那吒十五那荼那吒十六富利迦那吒十七鬱怛羅那吒十八迦毗那吒十九軍闍那吒二十蘇目伽那吒二十一遮婆茂囉那吒二十二佉伽凡鉗婆囉那吒二十三富沙迦囉那吒二十四系娑蘇我反鬱盧達囉那吒二十五三摩羅耶那吒二十六失囉鳩三二十七憍怛吒二十八怛羅二十九摩妬佉囉婆三十提畜叉三十一婆帝囉竪三十二豆婆那摩羅竪三十三婆呵呵那否智三十四僧低當梨反囉闍婆三十五阿摩囉闍竪三十六摩呼囉伽闍羅三十七阿禰拏婆囉三十八阿禰拏叉三十九阿婆阿唎伽禰拏叉四十沙婆都豆佉寫四十一莎波呵四十二說此呪已白佛言世尊此陀羅尼有大勢力有大利益彼德華藏佛令我送來爾時釋迦牟尼佛讚言善哉及一切大衆皆讚善哉除坐禪者爾時佛告虛空藏菩薩摩訶薩言善男子我今不起此坐廣為大衆說此陀羅尼文句及義不增不減善男子汝從彼來德華藏佛為護汝故說陀羅尼令惡心者生歡喜心諸不信者悉皆惛睡此陀羅尼從德華藏佛所久修四無量行生汝今當為一切衆生於此宣說若有聞此陀羅尼一切惡人皆生歡喜爾時虛空藏菩薩即說一切惡心衆生生歡喜心不信衆生悉皆惛睡陀羅尼怛絰他一浮呼鼻利呵二浮浮羅三邏囉浮四一邏五娑呵六呵籌七伽籌八伽伽那叉九奢摩奢摩十蜜多囉蜜多羅十一斫迦羅十二跋帝帝隸十三娑伽囉帝隸十四豆利哆哂香指反寐十五哂利呼跋醯十六那羅闍齊吒戒反十七夜婆那蜜低黎十八綺底蜜低梨十九婆利蜜低梨二十始佉蜜低黎二十一摩都囉蜜低黎二十二佉伽蜜低黎二十三薩都闍蜜低黎二十四薩婆羯摩蜜低黎二十五摩那跋利哆蜜低黎二十六陀胝張夷反漯婆囉蜜低黎二十七莎和呵二十八說此持已一切惡龍各還所住悉皆睡眠唯除得忍不退轉者乃至惡夜叉惡阿修羅惡迦樓羅惡緊那羅惡卑離多惡毗舍闍惡富單那惡迦吒富單那彼一切衆各還所住皆悉睡眠唯除得忍不退轉者若復有人惡心麁獷無有慈悲彼此懷恨常不捨離不畏當來墮於惡道造五無間誹謗正法毀呰聖人樂行不善彼惡衆生聞此呪已悉皆惛睡有信心者得慈悲心不鬪諍心得不濁心得念法緣心畏當來世墮三惡道得恭敬三寶心得念法心念寂滅心一切衆生聞此陀羅尼已即得住於如是等心爾時虛空藏菩薩白佛言世尊我欲來此彼德華藏佛為護我故說此陀羅尼爾時釋迦牟尼佛告長老目乾連言汝可受持此陀羅尼目連如來多陀阿伽度阿羅訶三藐三佛陀出世甚難聞此陀羅尼亦復倍難所以者何此陀羅尼從無限齊四梵行生目乾連如來百千劫不行餘業說此陀羅尼義一切天人無有能知者乃至十地菩薩亦不能知唯除諸佛此陀羅尼如是甚深如是大力能與大利益能速滿足阿耨多羅三藐三菩提又能滿足大慈大悲教化衆生是故目連汝當受持讀誦此陀羅尼於大衆中廣為人說若有聞此陀羅尼者得大利益多瞋衆生於未來世應受惡者皆悉盡滅不受果報能知生死多諸過惡修大善根取大福德親近大善知識供給供養是故速得不退阿耨多羅三藐三菩提目連此陀羅尼能然法燈紹三寶種
