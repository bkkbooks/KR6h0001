body:
  text: 北涼天竺三藏曇無讖譯虛空目分第十之二中世間目品第二爾時世尊即放眉間白毫相光悉蔽十方諸佛世界日月星宿珠火燈明所照之處一切石山諸惡刺棘為不復現十方無量恆河沙等世界衆生見是光已各各繫念思惟善事其中諸佛見是光已各告己衆而作是言善男子過於無量恆河沙世界彼有世界名曰娑婆具足五滓有佛出世號釋迦牟尼如來應正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊無量世界無量菩薩無量聲聞悉集彼土坐彼佛前彼佛即為宣説法行法目陀羅尼門為諸聲聞説法行已放大光明將欲演説淨目法門陀羅尼法為中乘者得緣覺果為諸菩薩莊嚴成就阿耨多羅三藐三菩提具足十地如來十八不共之法轉不退輪壞三惡趣令修八聖得無上果爾時十方恆河沙等世界諸衆聞是語已各各白佛言世尊我欲往彼娑婆世界至説法處聽受如是淨目法門爾時無量諸菩薩衆悉共來詣娑婆世界到於佛所頭面禮拜却坐一面時此世界無量梵天往至佛所供養恭敬却坐一面百億魔天百億化自在天百億兜率天百億夜摩天百億帝釋天百億四天王天百億日月天百億自在天百億閻羅王百億地鬼四百億阿修羅四百億龍王如是等衆悉向佛所恭敬供養却坐一面無量沙門及婆羅門悉得神通來向佛所恭敬供養却坐一面諸世界中外道相師見光明時作是思惟如是光者非是日月星宿之明必是異光如是不久七日並出當焦四海須彌山王一切草木其後欲界火災當出或復有言却後不久必當雨毒害於一切或復有言却後不久必當雨刀害諸人物惡時將至誰能救之或復有言瞿曇沙門憐愍一切唯是能救施其壽命爾時一切無量衆生至心念佛念已即見是大寶坊以佛力故即至坊中爾時波斯匿王以佛神力故亦見寶坊以佛力故得到坊中憂填耶那王惡性王輸頭檀王摩醯陀王修陀奢那王頻婆娑羅王如是等王亦因佛力得見寶坊悉至坊中供養禮拜次第而坐各作是念今此衆中有大仙人有佛世尊此光因緣今當問誰當問仙人問佛可耶爾時須陀舍那王言我今有大婆羅門師名曰電髮善知相法能解能説是最可問電髮聞已即作是言我所博覽一切相書都無此事我實不能解此光瑞閻浮提中一切相師其數五百悉不能解爾時頻婆娑羅王語諸王言汝何故狂此大衆中有佛世尊號釋迦牟尼具一切智善知世間出世間相了十二月善相之書大悲憐愍一切衆生實語正語唯佛能説是光報應爾時諸王及諸大衆一切宗仰共白佛言世尊唯願如來為我等説十二月相書佛言大王今此大會不應宣説世間相書頻婆娑羅王白佛言世尊今此會中有諸衆生不信如來所有功德又不信是一切智人唯願破壞如是疑心而宣説之是諸衆生若得聞已心生喜信生信心已乃可為説出世之道如是衆生亦當樂受易可調伏佛言大王至心諦聽我當説之大王往昔雪山有一仙人名婆伽婆食果草根修集慈心而不能除諸煩惱結不能調伏貪欲之心時彼住處有一雌虎即共行欲虎便懷妊日月已滿至此人所産十二子是時仙人心憐愍故即取洗浴而哺養之虎母心愛隨時乳養爾時仙人各為立名一名竭伽二名跋伽婆三名為虎四名師子五名擔重六名婆羅墮闍七名步行八名婆羅奴九名健食十名惡性十一名師子擔十二名健行是十二子年始七歲食草根華果是時父母俱時命終時十二子心懷愁惱仰天號哭如何一旦無所歸依時有樹神聞是聲已作如是言諸童子且莫啼哭有歸依處所謂梵天憐愍衆生汝等應當晝夜六時淨自洗浴向於虛空至心禮拜求哀梵天梵天當以無礙天耳聞汝等聲聞已當來至汝住處以憐愍故來已當壞汝等癡暗施慧光明得智慧已一切諸天當供養汝況世間人時十二子聞是語已如教而行經十二年然後梵天乃聞其聲即來下至三十三天爾時帝釋見梵天來即前供養既供養已即復白言大士欲何所至憍尸迦汝不見彼雪山之中十二仙耶憍尸迦可共往彼時釋提桓因與無量天相隨俱下至雪山中時十二仙見梵天來歡喜踊躍禮拜供養時梵天王告十二童子汝等何故十二年中精勤苦行供養於我欲何所求為求名聲色力財寶聖道智慧諸天身耶時竭伽仙白梵天言大士我今不求如是等事我欲求智慧為衆生故我等孤稚少失覆蔭自隨其心無教告者唯願大士施我智慧令我識知善惡等業及了衆生善惡等業亦知衆生國土城邑剎利婆羅門毗舍首陀男女大小善惡等相受苦樂事諸王貪國無厭足者興兵相伐衰盛等相若我知已當以方便教滅惡相令得受樂大方等大集經虛空目分中彌勒品第三爾時彌勒菩薩即於佛前心念説偈問於如來非有途路而有輪轉如來亦不住一切道非道見道道見非道佛言善男子非道者即是不出不滅不住非智非智境界非明非暗非常非斷非善非惡非是色陰乃至識陰是名實性是名法性名一切行名真實際是名非道如是中道諸佛如來轉於法輪而不貪著如是諸道若有衆生道見非道非道見道如是衆生不能達於道與非道及知三道如來悉能分別解説及以斷道善男子如來世尊於無道中而轉法輪為壞衆生三種道故何等三道一煩惱道二者苦道三者業道業道者所謂行有煩惱道者所謂無明愛取苦道者所謂識名色六入觸受生老死等如是三道何因緣有觸緣故有善男子因眼見色而生愛心愛心者即是無明為愛造業即名為行至心專念名之為識識共色行是名名色六處生貪是名六入因入求受名之為觸貪著心者即名為愛求是等法名之為取如是法生是名為有次第不斷名之為生次第斷故名之為死生死因緣衆苦所逼名之為惱乃至識法因緣生貪亦復如是如是十二因緣一人一念皆悉具足出有三種一者因出二者初出三者道出若有比丘修行法行觀察所有愛心相貌比丘當觀若有愛心即是無明無明之體能出二過一者出行二者出識識亦有二一者出名二者出色名色亦二一者無住二住六入六入亦二一不厭欲二能生觸觸亦有二一生受心二者求受受亦有二一受苦樂二生貪愛愛亦有二一者繫縛堅固二者求取取亦有二一者貪心二者求有有亦有二一者樂住二生因緣生亦有二一者生老二者苦緣老亦有二一壞壯色二作死因死亦有二一壞壽命二愛別離是名出因云何初出若有比丘修集法行觀如是法亦出亦滅是名初出爾時世尊告憍陳如云何道出若比丘見道有二種一者行行二者慧行憍陳如汝頗知是行行慧行耶憍陳如言未知世尊唯願如來為觀十二因緣比丘得大智慧壞諸煩惱分別解説比丘聞已當具受持爾時世尊告寶幢童子善男子汝頗能知息出入不不也世尊善男子法行比丘先觀無明乃至老死云何名為觀於無明先觀中陰於父母所生貪愛心愛因緣故四大和合精血二渧合成一渧大如豆子名歌羅羅是歌羅羅有三事一命二識三暖過去世中業緣果報無有作者及以受者初息出入是名無明歌羅羅時氣息入出有二種道所謂隨母氣息上下七日一變息入出者名為壽命是名風道不臭不爛是名為暖是中心意名之為識善男子若有欲得辟支佛果當觀如是十二因緣後觀三受因緣五陰十二入十八界云何為觀隨於念心觀息出息入觀於內身皮膚肌肉筋骨髓腦如空中雲是身中風亦復如是有風能上有風能下有風能滿有風能焦有能增長是故息之出入名為身行以出入息從覺觀生故名意行和合出聲名為口行以如是等三行因緣故有識生識因緣故則有四陰及以色陰故名名色五陰因緣行六處故名六入情塵相對故名為觸觸因緣故念色至念法是名為受貪著於色乃至於法是名為愛愛因緣故四方求覔故名為取取因緣故受於後身故名為有有因緣故有生老死種種諸苦是名五陰十二入十八界十二因緣之大樹也是故緣出入息能生一切諸苦煩惱是故凡夫生時亦為煩惱繫縛死時亦爾終不能得身心自在不得三昧不盡諸漏若有比丘觀入出息如空中風無我我所無有作者及以受者從緣而生從緣而滅無相無物無有覺觀衆生風者亦復如是共四大行生歌羅羅九孔乃至九萬九千諸孔出入無作無受是風出入如是肉段以是因緣故有無明乃至老死衆苦聚集善男子譬如虛空無物無我出入諸息地水火風壽命暖識無明乃至生老病死亦復如是衆生顛倒於非我中而橫見我於如是等同虛空法作陰界入想一切凡夫因是顛倒輪轉生死無有窮已若法行比丘觀是息冷則舉身冷觀是息暖則舉身暖是身爾時隨意隨風若觀冷時不得禪定不入定聚是人則墮冷地獄中若觀暖時不得禪定不入定聚是人則墮熱地獄中若佛弟子修集法行觀察出入息冷暖等時則得正道法行比丘如實觀察無明乃至生老病死心不顛倒是名淨目陀羅尼也善男子汝若能受是陀羅尼即是真實觀入出息寶幢菩薩白佛言世尊諸佛境界不可思議非是聲聞緣覺所及爾時四天王白佛言世尊隨是經典所流布處我等要當隨侍守護所有惡事悉令消滅大方等大集經虛空目分中四無量心品第四爾時頻婆娑羅王白佛言世尊因諸聲聞辟支佛等修行法行令閻浮提無有疾疫飢饉惡事世尊菩薩摩訶薩修四無量心若有四姓供養恭敬得幾所福佛告大王若有菩薩修四無量隨所住國具八上事一者其土人民供養父母增長慚愧恭敬沙門諸婆羅門耆舊有德受持禁戒大王若諸國土有諸菩薩修四無量其土人民則能成就如是初事復次大王若有菩薩修四無量隨所住國其土人民修集慈心遠離殺害其心調柔無有濁心瞋恚之心平等無二是名為二復次大王若有菩薩修四無量隨所住國其土人民不貪財寶樂為惠施呵責盜竊是名為三復次大王若有菩薩修四無量隨所住國其土人民自足妻色遠離非法呵責欲心是名為四復次大王若有菩薩修四無量隨所住國其土人民真語實語無破壞語常修善語是名為五復次大王若有菩薩修四無量隨所住國其土人民無有嫉妬濁惡之心是名為六復次大王若有菩薩修四無量隨所住國其土人民正見不謬無有邪見是名為七復次大王若有菩薩修四無量隨所住國其土人民一切供養恭敬三寶遠離惡見是名為八大王若有菩薩修四無量隨所住國其土人民具足如是八種功德大王若有菩薩修四無量隨所住國其土無有八怖畏事何等為八一者無內外軍畏二者無諸惡鬼畏三者無惡星宿畏四者無諸惡病畏五者無諸惡獸畏六者無諸惡賊畏七者無諸旱潦畏八者無諸穀難畏大王若有菩薩修四無量隨所住國其土無有如是八畏大王若有菩薩修四無量隨所住國其土具足八大丈夫何等為八一者有諸衆生已於過去無量佛所深種善根如是之人樂生其土二者復有衆生已於過去無量世中修戒多聞如是之人樂生其土三者復有衆生已於過去無量世中供養父母師長和上耆舊有德如是之人樂生其土四者復有衆生已於過去無量世中成就天業當受天身故轉天身來生其土五者復有衆生能壞一切三惡道業如是之人樂生其土六者復有衆生具聲聞乘如是之人樂生其土七者復有衆生樂緣覺乘如是之人來生其土八者復有衆生已於過去無量世中修六波羅蜜如是之人樂生其土大王若有菩薩修四無量隨所住國其土具足如是八人大王若有菩薩修四無量隨所住國其地具足上地水味無上法味衆生之味一切衆生心相親愛如是衆生捨是身已復生天上乃至鳥獸亦復如是大王譬如一筐盛四種香一者沈水二者多伽羅三者牛頭栴檀四者多摩羅葉如是四香合有四兩有四姓人以四種衣置之筐中經數日已各自齎去而是四香銖兩不折然是衣中各各有香大王若有菩薩修四無量隨所住國其土人民各各成就種種功德而於菩薩無所損減爾時頻婆娑羅王白佛言世尊菩薩摩訶薩修四無量心不可思議何以故菩薩摩訶薩自身修集能令無量無邊衆生得大利益爾時會中有一菩薩名曰淨光告無勝菩薩言善男子汝今已得無上利益何以故汝常修集四無量心無勝菩薩言善男子我今云何得大利益如是法中無作無受無覺無見無知無此無彼善男子如人自言能畫虛空瓔珞莊嚴雖有是言真實不能一切諸法亦復如是無出無壞無生無滅無有處所無有覺觀淨三解脫無相無作無願如爾法界無轉無散無合無礙無濁無邊猶如虛空無有和合無欲無性無見無説法性無數無少無多無有境界無二無著無量無色無聲寂靜無變無量猶如虛空無比無勝無常無斷難見難知難可思惟堅固無行無有瞋恚攝諸佛界是名梵行名四無量如來修集心無厭足勤行精進是名佛法大信大念大不放逸至心不忘若菩薩摩訶薩修集如是四無量心即是菩薩修行菩薩甚深法界如是菩薩將欲近入無生法忍行六波羅蜜護諸佛法已近第三如法順忍真見佛身能摧魔衆及壞邪道度生死河入大智海通達一切諸佛境界具足莊嚴諸佛功德諸所有色種姓財物勝諸衆生次第當坐如來法座具足一切三昧總持不為一切聖人所輕為諸緣覺之所讚歎常為諸佛之所護念能解一切國土衆生種種語言於諸法中不見受者及以施者亦無説者及聽法者無有作者及以受者猶如虛空淨光言善男子是故我言汝今成就無量功德何以故已於無量無邊世中勤修集故善男子若佛獲得十力無畏一切佛法出家苦行逮成正覺轉妙法輪示大神通入大涅槃如是等事悉皆因修四無量心如是即是四無量果以是義故諸善男子及善女人應當修集四無量心説是法時二萬衆生得隨慈忍無量衆生具四無量心一切大衆咸供養佛大方等大集經虛空目分中淨目品第五爾時有一菩薩童子名無勝意長跪合掌白佛言世尊慈無量心有何等相有何等體何等因緣何等果報云何具足佛言善哉善哉善男子能問如是甚深之義爾時如來即入三昧其三昧名調伏衆生無所畏懼入三昧已從其肉髻放大光明其光猛盛有種種色遍照無量無邊世界復出妙音而説偈言淤泥之中生芙蓉亦復生於種種華衆生以之供養佛并及一切諸天神一切惡國亦如是生諸聖人大菩薩能調難調不調衆猶如衆生華供養娑婆世界惡土地釋迦住中宣説法若欲獲得無量利應當往彼娑婆界無量世界所有衆生聞是偈已各各供養其土世尊既供養已乘佛神力悉來集會娑婆世界至於佛所頭面禮拜却坐一面爾時此界大寶坊中無量衆生具足彌滿是諸衆生各作是念獨我至此供養如來獨在佛前咨問正法如來獨為我一人説爾時世尊告無勝意童子善男子慈有三種一衆生緣二者法緣三者無緣善男子衆生緣者緣於五有若有法行菩薩欲得具足六波羅蜜大慈大悲菩薩十地速得成就阿耨多羅三藐三菩提轉正法輪調伏無量無邊衆生令度無邊生死大河欲壞無量惡魔伴黨入大涅槃如是菩薩應當修集四無量心應云何修若菩薩摩訶薩為下方衆生乃至上方一切衆生修集是慈視諸衆生如父如母如師和上如佛世尊聲聞緣覺爾時應作如是思惟若有衆生橫於我所起諸惡事菩薩爾時應作是念若我瞋是惡衆生者則為十方諸佛所見是大可恥當見呵責云何是人為阿耨多羅三藐三菩提而自不能調伏其心譬如有人無有腳足而欲趣彼鬱單曰土如無目者而欲讀書如無手者而欲執作遠離慈心而欲獲得阿耨多羅三藐三菩提者亦復如是若不能斷如是瞋心尚不能得聲聞菩提何況阿耨多羅三藐三菩提若我不能調伏自心當為諸佛聲聞緣覺天龍八部之所呵責若我不能調伏自心當得大罪受地獄苦不得現在未來利益是故應當修集慈心復作是念若有於我已作諸惡始作欲作或以惡事加於我親以利養事益於我怨亦復如是如是觀已菩薩先於一方衆生修集慈心二三四方四維上下亦復如是善男子是名菩薩慈緣衆生爾時會中有一天子名曰明星白佛言世尊若菩薩摩訶薩初修慈心如是慈心有何等果為是現在為在未來具足成就幾所福德世尊如是菩薩修集慈心頗復當墮三惡道不佛言善哉善哉善男子汝已於昔供養恭敬無量諸佛是故今能發如是問已種善子善根堅固無量世中修集慈心不與聲聞辟支佛共為欲利益無量衆生是故今者能作是問善男子諦聽諦聽今當為汝分別解説若有菩薩能如我先所説修慈是人則得臥安寤安不見惡夢資生所須無所乏少諸天守護人天樂見不聞惡聲身不惡病常樂寂靜勤行精進樂受正法知見無我常為國主沙門梵志男女大小乃至鳥獸之所供養親近善友所謂聲聞緣覺諸佛菩薩樂行惠施能度衆生所有善心不為三毒之所破壞善名好譽流布四方能療衆生所有惡病能令衆生遠離衆苦能解衆生一切繫縛能調衆生諸惡煩惱能壞一切惡邪異見能與衆生信心念心大智慧心心住大乘無能傾動不隨他語能壞衆生身口意惡能滅衆生三種障業唯除五逆誹謗正法賢聖之人劫招提僧物善男子菩薩若能如是修慈當捨命時面見十方諸佛世尊手摩其頭佛手觸故心則歡喜心歡喜故尋得往生其佛國土亦聞如是善妙之言所謂莫生怖畏莫生怖畏汝是修慈純善之人定當得生淨佛世界覲見無量諸佛世尊離三惡道必入涅槃亦聞法緣無緣之慈亦得具足四無量心乃至獲得阿耨多羅三藐三菩提爾時明星天子聞是法時於諸禪定出入自在無勝意童子白佛言世尊如是天子以何力故於禪定中速入速出佛言善男子是天子者已於無量諸如來所殖諸善根無量世中修法緣慈本願力故生四天處在日天前十千由旬所住宮殿縱廣三萬二千由旬琉璃所成前後左右滿十由旬諸天男女而共圍繞是人在中離其眷屬三由旬所獨坐寶床出入禪定一日一夜此四天下有八十天處六十龍處四阿修羅處四迦樓羅處五十二緊那羅處四十六摩睺羅伽處八拘辦荼處三十富餓鬼處三十毗舍遮處於如是處悉能調伏如是衆生以本願力故往昔發願此閻浮提夜五分過餘一分在當在日前十千由旬先當破壞閻浮提暗而作明相若閻浮提諸善衆生欲度生死修禪定者當為是人除去睡眠施其念力若欲見我我當於夢現作和上師長父母若有凡夫修集外道我當破壞其人邪心示以正道若有衆生於世間事及出世事生懈怠者覩見我已除去懈怠勤修事業若有衆生迷失正路得見我時則還見道若有衆生身遇重病得見我者苦痛休息身得安眠受大快樂若有老人身受衆苦心多忘誤得見我者還得念心然我出時能令衆生繫心念善若有衆生命將欲盡最後一念我當為説大乘經典彼既聞已面見佛像捨身得生淨佛世界若有欲求辟支佛者我當為説辟支佛乘若有欲求聲聞乘者我亦當為説聲聞乘若有衆生有三惡業聞我説法惡業即滅世尊我先行於閻浮提國然後次行於瞿陀尼瞿陀尼後次鬱單曰鬱單曰後次弗婆提以如是等本願力故常得修行六波羅蜜乃至得成阿耨多羅三藐三菩提爾時明星天子白佛言世尊我今為欲利益一切衆生故説此陀羅尼盧遮羅一盧遮羅二盧遮那三娑羅叉婆四娑羅叉婆五娑羅叉𭒂六阿𭒂呵呵七阿𭒂特荼八阿婆闍婆九阿婆叉那十阿叉叉叉十一富羅婆邏十二阿婆叉叉十三闍婆闍婆十四摩呵迦波十五阿婆阿婆十六摩呵娑摩十七頻豆十八莎闍羯波十九阿鞾二十阿鞾二十一呵呵尼摩二十二沫邏莎律闍二十三迦留那闍邏二十四莎呵世尊若有比丘比丘尼優婆塞優婆夷若男若女若大若小若有至心念我事者是人則得淨於諸業神通施戒忍辱精進禪定智慧解脫佛土四無礙智如是諸人不得成就如是事者我則欺誑十方諸佛於未來世亦莫令我得阿耨多羅三藐三菩提爾時無勝意童子白佛言世尊他方佛土所有人民常作是言娑婆世界雜穢不淨然我今者常見清淨佛言如是如是善男子如汝所説又此世界諸菩薩等或作天像調伏衆生或作龍像或作鬼像或阿修羅像或迦樓羅像或緊那羅像或摩睺羅像或夜叉像或拘辦荼像毗舍闍像薜荔陀像人像畜生像鳥獸之像遊閻浮提教化如是種類衆生善男子若為人天調伏衆生是不為難若為畜生調伏衆生是乃為難善男子閻浮提外南方海中有琉璃山名之為潮高二十由旬具種種寶其山有窟名種種色是昔菩薩所住之處縱廣一由旬高六由旬有一毒蛇在中而住修聲聞慈復有一窟名曰無死縱廣高下亦復如是亦是菩薩昔所住處中有一馬修聲聞慈復有一窟名曰善住縱廣高下亦復如是亦是菩薩昔所住處中有一羊修聲聞慈其山樹神名曰無勝有羅剎女名曰善行各有五百眷屬圍繞是二女人常共供養如是三獸善男子閻浮提外西方海中有頗梨山高二十由旬其山有窟名曰上色縱廣高下亦復如是亦是菩薩昔所住處有一獼猴修聲聞慈復有一窟名曰誓願縱廣高下亦復如是亦是菩薩昔所住處中有一雞修聲聞慈復有一窟名曰法床縱廣高下亦復如是亦是菩薩昔所住處中有一犬修聲聞慈中有火神有羅剎女名曰眼見各有五百眷屬圍繞是二女人常共供養是三鳥獸善男子閻浮提外北方海中有一銀山名菩提月高二十由旬中有一窟名曰金剛縱廣高下亦復如是亦是菩薩昔所住處中有一豬修聲聞慈復有一窟名香功德縱廣高下亦復如是亦是菩薩昔所住處中有一鼠修聲聞慈復有一窟名高功德縱廣高下亦復如是亦是菩薩本所住處中有一牛修聲聞慈山有風神名曰動風有羅剎女名曰天護各有五百眷屬圍繞是二女人常共供養如是三獸善男子閻浮提外東方海中有一金山名功德相高二十由旬中有一窟名曰明星縱廣高下亦復如是亦是菩薩昔所住處有一師子修聲聞慈復有一窟名曰淨道縱廣高下亦復如是亦是菩薩昔所住處中有一兔修聲聞慈復有一窟名曰喜樂縱廣高下亦復如是亦是菩薩昔所住處中有一龍修聲聞慈山有水神名曰水天有羅剎女名修慚愧各有五百眷屬圍繞是二女人常共供養如是三獸是十二獸晝夜常行閻浮提內天人恭敬功德成就已於諸佛所發深重願一日一夜常令一獸遊行教化餘十一獸安住修慈周而復始七月一日鼠初遊行以聲聞乘教化一切鼠身衆生令離惡業勸修善事如是次第至十三日鼠復還行如是乃至盡十二月至十二歲亦復如是常為調伏諸衆生故善男子是故此土多有功德乃至畜生亦能教化演説無上菩提之道是故他方諸菩薩等常應恭敬此佛世界爾時會中有一優婆塞名曰淨德白佛言世尊我今可得覩見如是十二獸不善男子若有比丘比丘尼優婆塞優婆夷欲得覩見是十二獸欲得大智大念大定大神通力欲受一切所有典籍四無量心欲行正道得奢摩他欲得寂靜欲增善法是人當以白土作山縱廣七尺高十二尺種種香塗金薄薄之四邊周匝二十尺所散瞻婆華當以銅器盛諸種種非時之漿置之四面清淨持戒日三洗浴敬信三寶離山三丈正東向立誦如是呪戰陀羅呵一修利蛇比摩二其羅𣍦三沸己牟邏四若蛇牟邏五阿呵希六娑呵囉希七若蛇呵希八薩婆復多呵九梨蛇婆呵休十摩莎車婆牟梨十一迦𭒂浮十二邏奢浮十三修邏蛇牟十四呿迦那十五摩希叉婆十六迦婆摩訶十七阿叉比婆邏十八多波比莎十九沙持因持利蛇鞞莎二十阿闍牟他婆二十一婆盧婆叉二十二槃陀哆二十三遮羅叉婆希二十四呵迦比牟二十五哆比勒搜二十六散遮勒搜二十七𭒂婆浮二十八娑邏𭒂叉搜二十九沸己遮三十哆莎賴莎三十一陀叉邏莎三十二波利波遮三十三修羅修三十四搜婆莎彌三十五希邏莎三十六𭒂邏牟莎邏莎三十七牟莎邏私三十八邏婆邏娑三十九頻婆思邏莎四十𭒂𭒂邏娑四十一陀摩盧遮那邏娑四十二富囊挫蘭呵邏娑四十三首陀盧遮那邏娑四十四𭒂摩摩邏娑四十五比摩盧遮那呿伽四十六薩顛摩邏娑四十七阿利耶盧遮那耨耨四十八比摩牟四十九婆羅呵芒𭒂呵邏私䨲䨲五十阿由比目猛五十一牟尼邏提致汦五十二莎呵住十五日當於山上見初月像爾時則知見十二獸見已所願隨意即得善男子若能如是修行苦行即得眼見是十二獸爾時淨德優婆塞語明星菩薩言善男子汝能教化調伏衆生云何調伏為以身耶口耶意耶善男子我非身口唯以心業善男子若是心業為過去耶未來耶現在乎善男子亦非去來唯是現在制現在心不令作惡善男子汝猶不能令現在心獲得解脫云何而能調伏衆生明星答言我今受持四無礙智淨目持力故能調伏一切衆生淨德言四無礙智淨目持者亦復不能調伏衆生何以故無覺觀故云何而言能調衆生善男子我今問汝隨意見答善男子攝入繫縛解脫清淨道及寂靜雖復平等亦不平等如是平等及不平等何因緣生何因緣出何因緣增長汝寧不知乎淨德答言善男子如是等事因我我所生出增長明星菩薩言善男子是我我所何因緣生善男子是我我所風因緣生明星菩薩言風住何處善男子風住虛空又問虛空為何所住答言虛空住於至處又問至處復何所住答言至處何處住者不可宣説何以故遠離一切諸處所故一切處所所不攝故非數非稱不可量故非覺非觀非有非無非行非生非出非滅非有增長非字非念非作非受非暗非明非增非減非壯非老真實之性是一切法無罣礙門是故至處無有住處明星菩薩言善男子如是即是四無礙智淨目陀羅尼若有菩薩修集如是陀羅尼者一切煩惱則為爛敗入法緣慈一切法中無有疑心説是法時十方世界無量衆生得法緣慈無量衆生得近四無礙智淨目陀羅尼爾時世尊讚是二人善哉善哉善男子能如法問能如法答是陀羅尼因緣力故四天王等於我滅後能守護法戰阿羅呵一修利蛇比摩二其羅貶三佛已牟邏四若蛇牟邏五阿呵希六婆呵囉希七若蛇呵希八薩婆復多呵希九梨咃婆呵休十摩沙車婆牟梨十一迦𭒂浮十二邏奢浮十三修邏蛇牟十四呿迦那十五摩希叉婆十六迦婆摩呵十七阿叉比婆邏十八多波比婆十九沙持因持利蛇鞞婆二十阿闍牟他婆二十一婆盧婆叉二十二槃陀哆二十三遮羅叉婆希二十四呵迦比牟二十五哆比勒搜二十六散遮勒搜二十七嘙嘙浮二十八婆羅婆叉搜二十九佛已遮三十哆紗賴沙三十一陀叉邏娑三十二波利波遮三十三修邏修三十四搜婆娑彌三十五希邏三十六嘙羅牟娑羅娑三十七牟娑邏私三十八羅婆邏婆三十九頻婆思邏娑四十嘙嘙邏娑四十一陀摩盧遮那邏娑四十二富囊挫蘭呵邏婆四十三首陀盧遮那邏娑四十四嘙摩摩邏娑四十五比摩盧遮那呿伽四十六薩顛摩邏娑四十七阿利那遮那褥褥四十八比摩牟四十九婆遮呵芒嘙呵邏私葂葂五十阿由比目醯五十一牟尼邏提致沙五十二娑呵五十三
