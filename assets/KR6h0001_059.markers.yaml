  - {type: variant, offset: 3481, length: 1, content: 不, 聖: 不習。自言我無罪。如是生死無數劫顛倒。意轉作識識。所多識生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒轉入眼。眼所多視好色生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒。眼多視中色生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒。眼所多視惡色生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒。轉入耳。耳所多聞好聲生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒。耳所多聞中聲生死罪。中有五陰中有習。自言我無罪。如是生死無數劫為顛倒。耳多所聞惡聲生死罪。中有五陰中有習。自言我無罪。如是生死無數劫是為顛倒。轉入鼻。鼻所多聞好香生死罪。中有五陰中有習。自言我無罪。如是生死無數劫是為顛倒。鼻所多聞中香生死罪。中有五陰中有習。自言我無罪。如是生死無數劫是為顛倒。鼻所多聞惡臭生死罪。中有五陰中有習。自言我無罪。如是生死無數劫是為顛倒。轉入口。口所多得美味好語言生死罪。中有五陰中有習。自言我無罪。如是生死無數劫是為顛倒。口}
