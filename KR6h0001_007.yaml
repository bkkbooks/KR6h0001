body:
  text: 北涼天竺三藏曇無讖於姑臧譯不眴菩薩品第四爾時世尊故在欲色二界中間大寶坊中與諸大衆圍繞説法爾時衆中有金色光其光明淨遍照三千大千世界悉蔽一切日月四天釋梵光明照已即滅一切大衆瞻覩如來目未曾眴當爾之時寂然無聲亦無謦咳出入氣息爾時大德須菩提白佛言世尊今何因緣有是光明一切大衆瞻覩如來目未曾眴爾時佛告須菩提言東方過於無量世界彼有菩薩名曰不眴與萬菩薩俱共發來欲聽如來微妙方等大集經典是其光明所言未訖不眴菩薩已至佛所大寶坊中齎持種種香花伎樂供養於佛頭面禮足恭敬右繞却坐一面寶蓮華上爾時須菩提復白佛言世尊不眴菩薩所來世界去此遠近國土何名佛號何等佛言須菩提東方去此七萬二千恆河沙等諸佛世界土名不眴佛號普賢如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊不眴菩薩從彼而來爾時不眴菩薩摩訶薩長跪合掌説偈讚佛如來世尊衆寶聚具足一切波羅蜜無上法師天中天為衆生故我敬禮寂靜戒定不可動無上智慧調諸根為諸衆生説大集故我歸依師子王樂施天人諸安樂衆生喜見如滿月具足力勢破魔衆我今歸依大藥樹成就善根施甘露能度衆生生死海我今歸依無上尊具足妙相三十二世尊莊嚴此大衆猶如須彌顯四域名稱無礙遍十方人中象王我敬禮如來智慧如虛空通達三世無障礙隨衆生根而説法我今敬禮自在王過無量劫勤精進超勝同業諸菩薩所得佛法如先佛我今敬禮一切覺十方諸佛悉讚歎精進殊勝無邊量無量衆生得聞已悉皆同發菩提心於正法中無厭足兼以勸化諸衆生能説清淨法之性我今稽首大法王爾時不眴菩薩偈讚佛已白佛言世尊我等於此大集經中欲少發問唯願如來垂哀聽許佛言善哉善哉善男子隨意發問吾當為汝分別宣説除却汝等疑網之心不眴菩薩既蒙聽許心大歡喜白佛言世尊菩薩摩訶薩修何三昧速得成就阿耨多羅三藐三菩提得大念心大智大意慚愧勇健修施教戒被忍辱鎧建精進幢遊戲神通莊嚴慈悲深樂法喜登陟捨山能説能答摧伏魔怨壞諸邪見不離諸佛菩薩善友常得化身不失念心深信大乘樂施衆生無上智光不為世法之所染污同於四大如地利益一切衆生如水能洗一切垢穢如火能熟衆生善根如風能於戒聞慧等無所障礙修集慈悲猶如虛空慧眼無量猶如帝釋心得自在如自在天正法化世如轉輪王聚大福德如須彌山於善無厭聚衆珍寶猶如大海思惟十二因緣深義亦復如是無所畏懼如師子王具善法財猶如商主一切依止如大醫王能作光明猶如庭燎破暗如日清涼如月煩惱不污猶如蓮華具足一切諸佛妙法猶如滿月佛言善哉善哉善男子能以此義咨啓如來至心諦聽吾當為汝分別解説善男子有三昧名一切法自在菩薩修集是三昧者則能獲得如是等事亦得無量無邊福德疾成阿耨多羅三藐三菩提成佛之時世界所有一切具足善男子一切法自在三昧者所謂信佛法僧苦集滅道陰入界等空無相願出生滅沒十二因緣內外因果業及果報信於開塞觀一切法如幻如化如焰如響如水中月龜毛兔角空中之花石女之子如著影衣夢乘白象若有若無及以有無非有非無非常非斷非生非滅非內非外非見非斷信如是等則能信佛菩薩大事而不自輕菩薩事業雖復廣大我亦能知心得自在能大惠施護持禁戒不妨外事憐愍衆生常修忍辱為不退故勤行精進為令衆生離煩惱故修集智慧為壞一切分別想故修集三昧得妙音聲一切樂聞修於念佛觀諸如來平等無二修於念法觀一切法同一性相修於念僧觀一切僧無有退轉修於念捨捨諸煩惱修於念戒常念佛戒修於念天念後邊身淨身口意不隨他人戒定智慧清淨施已能得具足三十二相施種種物具足成就八十種好為欲莊嚴出世智慧具四念處為欲遠離一切煩惱故具四正勤為令其心得自在故具四如意為欲壞破諸魔怨故修集信根為不顛倒一切法故修精進根勸令憶念諸罪過故修集念根為諸衆生心清淨故修集定根為於一切諸法頂故修集慧根為無壞故修集五力為真實知一切法故修七覺分為真實知道非道故修八正道樂於寂靜少欲知足遠離惡友雖復通達一切事業終不於中生獨師想於諸煩惱心不貪著不瞋衆生不疑諸見於我我所心不生著常修欲度衆生之心於師和上父母善友生念恩心常思報答往昔之恩見毀禁者不生譏刺捨棄重擔真觀陰故不競不諍護法持戒攝取持戒及護法者聽法念法供養於法於正法中心無疑網凡所演説不為飲食至心演説説時不輕亦不自高為出善芽所聞不失瞻病所須供給走使供養法師不説其短不觀種姓戒與非戒常樂聞法至心不忘不失時節常請法師敷揚道化有所講説不生憍慢聞已解義亦不自大不觀他人所有過失所可聽法為知足故為不斷絶三寶種故為得無礙宿命智故為得真實見法性故為發無上菩提心故為護如來真實法故為得上族好種姓故為見佛法比丘僧故為得堅固不退心故為行聖行入聖數故為得無盡大財寶故為得無邊大功德故為得清淨梵音聲故為得具足佛功德故為得具足菩薩法故為欲受持讀誦書寫菩薩法藏及摩夷故為欲受持如是等法廣宣説故善男子菩薩摩訶薩獲得一切法自在三昧者於一切事無能教者爾時世尊即説頌曰其心敬信佛法僧亦復明信四真諦若得智慧無罣礙是名諸法自在定能知於苦第一諦亦能遠離於集因證獲第三真滅諦修集無上聖道諦具足成就大念心真實觀陰如虛空其身威儀大寂靜是名諸法自在定能觀六入性相空亦能調柔於諸根能壞衆生疑網心是名諸法自在定能修集空無相願破壞一切諸憍慢所行諸行無黑暗是名諸法自在定遠離斷見及我見令身口意業寂靜其心不著有無法是名諸法自在定所説正義無顛倒調伏一切衆生心既説法已無憍慢是名諸法自在定修集一切諸善根不為煩惱之所污其心無熱亦無濁是名諸法自在定不為他喜求菩提亦不虛誑修善法十方諸佛觀其心是名諸法自在定常樂惠施護持戒憐愍心故忍諸惡精進修定及智慧是名諸法自在定為諸衆生修慈心亦無分別怨親想樂施衆生無上樂是名諸法自在定調伏衆生於菩提修捨離欲得安樂常樂修集五神通是名諸法自在定所説正法衆樂聞其義難盡如大海真實了知於法性是名諸法自在定觀察佛身如諸法佛性法性無差別護法之心無退轉是名諸法自在定身口意業得寂靜具足戒定心無為遠離一切煩惱習是名諸法自在定能證無上真解脫亦能獲得實知見修集定慧無有邊是名諸法自在定不淨之物不以施不受一切不淨戒三十二相具足成是名諸法自在定修行種種諸惠施是故獲得八十好於佛法中得自在是名諸法自在定修集具足四念處正勤能壞諸煩惱為調衆生修如意是名諸法自在定為入佛法修信根為壞魔衆修五力為知諸法修七覺是名諸法自在定修八正道破邪徑施於衆生無上樂心無憍慢一師想是名諸法自在定若得修集自在定是人則能離煩惱親近諸佛菩薩等樂修少欲知足行為在無上聖人數以衆生故修大悲不為飲食演説法是名諸法自在定為法不惜於身命護持正法不吝財常樂修行二種施是名諸法自在定常勸衆生令聽法如其未解心不輕不為勝他護持戒是名諸法自在定無量世中所聞法至心受持為他説無上法師大名稱不觀時節戒非戒演説不休亦不息不失時節隨意説所説諸法如幻相是名諸法自在定所言真實甘樂聞聞已如説而安住其心無貪無妬嫉是名諸法自在定有問無瞋無輕慢常修憐愍無二相能自淨除諸過失是名諸法自在定具足七種無上財成就壽命無上命具足十力四無畏是名諸法自在定常樂聞法善思惟善思惟已如法住如法住已為衆説是名諸法自在定不忘菩提上種性供養三寶得化身勸化大衆具菩提是名諸法自在定其目清淨見諸佛得梵音聲無上邊其音遍滿十方界是名諸法自在定財寶惠施無有盡智慧演説無窮竭供養父母師和上是名諸法自在定成就具足宿命智不失無上菩提心六波羅蜜無厭足是名諸法自在定為欲利益衆生故受菩薩藏及摩夷樂為衆生廣分別是名諸法自在定遠離一切惡思惟了了覩見十方界一心能知無量心是名諸法自在定一心了知三世事修集無量諸神通得後邊身智無礙是名諸法自在定憐愍衆生修大悲觀察諸根隨意説一切佛法得自在是名諸法自在定若有得聞如是事至心受持生信順即能獲得無上道亦如往世諸世尊爾時不眴菩薩白佛言世尊菩薩摩訶薩成就何法獲得如是一切諸法自在三昧佛言善男子菩薩摩訶薩具足一法則能獲得如是三昧所謂不著一切諸法復有一法不著於戒何以故若不著戒則能不著一切善法具足戒故則能成就一切佛法得大利益無上大道是故我言戒是一切善法根本戒名大燈若著戒者是人則於菩提障礙非菩提道若於諸法生貪著者去菩提道則為大遠若不貪著則為鄰近復有二法菩薩具足則能獲得如是三昧一者為於菩提方便修集舍摩他二者為於善法方便修集毗婆舍那復有三法菩薩具足得是三昧何等為三一者不捨衆生修空三昧二者不捨於法修無相三昧三者求於諸有修無願三昧爾時世尊即説頌曰調伏衆生修集空護持法故修無相不捨諸有修無願是人則得是三昧復次善男子復有四法菩薩具足則能獲得如是三昧何等為四一者具足四諦方便二者具足四無量心三者具足四無礙智四者具足四攝之法復有五法菩薩具足得是三昧何等為五一者具足五神通二者具足五根三者具足五力四者具足真智觀於五陰五者具足五眼復有六法菩薩具足得是三昧何等為六一者具足六波羅蜜二者具足六念三者具足智慧觀於六入四者具足遠離六道五者具足六通六者具足六和敬法復有七法菩薩具足得是三昧何等為七一者無貪遠離煩惱二者於衆生所無有瞋恚三者於諸法中無有疑心四者具無礙智無有五蓋五者觀十二因緣無有疑網六者成就無上智慧七者成就無上三昧復有八法菩薩具足得是三昧何等為八一者修集八正道分二者離八邪道三者遠離八難四者具足八大人覺五者具八解脫六者具八勝處七者專念菩提八者斷煩惱習復有九法菩薩具足得是三昧何等為九一者不失念心二者解甚深義三者破壞魔業四者具佛三昧五者淨身口意六者具足方便七者威儀純善八者勤行精進具六波羅蜜九者遠離聲聞辟支佛道復有十法菩薩具足得是三昧何等為十一者具足佛智二者具足法界無分別智三者於真實性無有動轉四者具足三世平等智慧五者具足衆生心平等智六者具知諸根上中下智七者具足四無礙智八者具足三解脫門九者具足諸法同一味智十者具足諸法無生滅智説是法時三萬二千菩薩摩訶薩得是三昧爾時須菩提語不眴菩薩言是大衆中三萬二千諸菩薩等皆悉獲得如是三昧善男子汝今得耶不眴菩薩言大德乃至無有一法可得名為三昧我云何得凡言得者即是顛倒夫顛倒者即我我所菩薩若著我我所者則不能得如是三昧須菩提言菩薩摩訶薩住於何處得是三昧不眴菩薩言如須菩提所住之法得解脫者我如是住得是三昧須菩提言我實不住一切法中而得解脫大德菩薩摩訶薩亦復如是不住諸法得是三昧須菩提言善男子菩薩摩訶薩將不住於空無相願得三昧耶不眴菩薩言空無相願可得住耶不也善男子大德是故空無相願所住之處得是三昧善男子如是三昧住在何處不眴菩薩言如一切法真實性住住是三昧者亦如是住一切諸法真實性者名聖解脫聖解脫者名無所住無住之住住一切法一切諸法不住煩惱不住解脫大德得解脫者為具煩惱不具煩惱善男子我亦不具非不具也大德若仁不具非不具者為何所得言解脫也須菩提言善男子若使法界有縛繫者我則解脫而法界性無縛解相非相非非相非種種相非一相非多相如法界相解脫亦爾時須菩提説是法時八千比丘得阿羅漢果須菩提語不眴菩薩言善男子如佛所説若能具足如是等法得是三昧汝今具足是三昧不不眴菩薩言大德一切諸法無有根住若法無根即是無住夫無住者名為無作若無作者云何可住須菩提言若無住者何故如來常作是言住如是法得無生忍不眴菩薩言大德無所住者亦名為住是故如來亦説住貪而得解脫而智慧性不能壞貪住於解脫若有菩薩能知如是不住之住是名無生智慧住是無生智慧中已則能獲得無生法忍復次大德若有菩薩不離凡夫能知聖法以凡夫心觀察聖法以聖法性觀察於忍忍性觀忍復以是忍觀一切法知如是等名無生忍復次大德若有菩薩觀二種界一衆生界二者法界以法界性觀衆生性以衆生性觀法界性若離法界無衆生界法界衆生界無生無滅若能如是通達知者名無生智無生智者即無生忍復次大德菩薩摩訶薩知從十二因緣生法從六境界作六因緣若善不善是善不善即無生滅何以故境界之性不能生法六入亦爾不能生法何以故無生性故如其六入能生法者則應常生不須外緣若外境界性能生者亦應常生不假於內若俱生者則有二相二相之法性無真實通達了知如是等者名無生忍若得如是真智慧者是名菩薩得無生忍復次大德若有菩薩具足成就二種莊嚴功德智慧觀是二事平等無二雖如是知不言我知亦於此知不生貪著是名無生忍復次大德菩薩摩訶薩身意寂靜觀法寂靜法寂靜已觀菩提靜菩提靜已觀忍寂靜亦不隨他不著內外是名菩薩無生法忍説是法時不眴菩薩等五百菩薩得無生法忍爾時世尊讚不眴菩薩言善哉善哉善男子汝所演説無生法忍即是真實如先佛説復次善男子菩薩若得心自在者即得諸法自在三昧云何名為心自在耶善男子若有菩薩遠離貪愛得帝釋身或轉輪王身雖為無量諸衆生等説五欲樂而其內心實不貪著是名菩薩心得自在復次善男子若有菩薩修集三昧四無量心求諸有時不以有心以智慧心雖生欲界不因欲心其心常不遠離三寶修集莊嚴諸波羅蜜以四攝法攝取衆生調伏衆生修三十七助道之法是名菩薩心得自在復次善男子若有菩薩修空無相願自不證於空無相願亦為衆生説如是法為調聲聞辟支佛等入於無生正定之聚而為説法彼既聞已即得解脫自不證之亦令衆生不捨菩提是名菩薩心得自在復次善男子若有菩薩為調聲聞辟支佛故入無生滅正定之聚亦得滅定又能通達一切三昧出入相行雖得如是通達自在亦不證於滅盡三昧何以故未具佛法故是名菩薩心得自在復次善男子若有菩薩以平等智觀於法界種種世間種種衆生種種説法種種方便是名菩薩心得自在復次善男子若有菩薩生長壽天未盡天壽其身亦生短命之中為欲調伏諸衆生故是名菩薩心得自在復次善男子若有菩薩具足快樂捨是樂已為諸衆生受大苦惱護衆生故護菩提故是名菩薩心得自在復次善男子若有菩薩同於聲聞辟支佛行而心護念菩提之道亦修菩提微妙之行為諸聲聞緣覺之人隨意説法而亦不證是名菩薩心得自在復次善男子若有菩薩解八萬四千法門亦復通達煩惱行處為斷衆生諸煩惱故處中説法亦不為諸煩惱所污是名菩薩心得自在復次善男子若有菩薩具足神通若有衆生盲聾跛躄菩薩摩訶薩自變其身亦同其像而為説法是名菩薩心得自在復次善男子若有菩薩具足智慧通達外典善解邪論而其內心不為邪見為欲調伏諸衆生故修集其道是名菩薩心得自在善男子菩薩具足如是等事名心自在亦名得一切法自在三昧須菩提言世尊不眴菩薩得是三昧為久近耶佛言過去無量阿僧祇劫爾時有佛號自在王如來應正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名淨劫亦名淨其佛國土地平如掌金銀琉璃頗梨莊嚴常有幡蓋如兜率天多饒飲食爾時衆生所有貪欲瞋恚愚癡無有勢力多有利智能解佛語一切悉樂無上大乘爾時世尊與八萬四千大菩薩衆三萬二千聲聞大衆爾時世有轉輪聖王名曰廣持號曰法士成就七寶輪寶象寶馬寶女寶珠寶兵寶主藏之臣千子具足王四天下治以正法不加刀杖憐愍衆生教以十善一切衆生亦樂受之爾時千子悉發阿耨多羅三藐三菩提心爾時聖王供養如來菩薩聲聞一切大衆衣服飲食臥具湯藥房舍資生經萬歲已發阿耨多羅三藐三菩提心為無上道修三十七助道之法爾時彼佛壽命滿足八萬四千歲王有一子名曰法語於彼佛法信心出家勤行精進清淨持戒為得無上菩提道故爾時法語比丘二萬年中無有睡眠如彈指頃不生貪心瞋心癡心不善覺觀不念父母宗親眷屬飲食衣服房舍臥具資生之物亦不覺知晝夜之相二萬年中常修念佛須菩提法語比丘勤精進故獲得四禪四無量心四無色定過二萬年已往詣佛所頭面禮敬右繞三匝却住一面白佛言世尊我發阿耨多羅三藐三菩提心為施一切衆生安樂為欲調伏一切衆生唯願世尊哀愍示導云何令我化諸衆生宣説正法佛言比丘有八陀羅尼門若成就者得無礙語則能為諸衆生説法何等為八一者念佛知法身故二者念法知淨法故三者念僧知無礙故四者真實思惟破惡覺觀故五者知字不可説故六者修舍摩他為知諸法同一味故七者修毗婆舍那為知諸法本性淨故八者修方便智為得忍故比丘具如是八陀羅尼門則能堪任宣説正法化諸衆生比丘復有八精進菩薩具者能宣説法化諸衆生一者求法勤行精進二者持法勤行精進三者觀法勤行精進四者説法勤行精進五者護法勤行精進六者供養法師勤行精進七者護受法者勤行精進八者如法而住勤行精進是名為八復有八法菩薩具足能化衆生何等為八一者修慈等觀衆生故二者修悲調伏衆生故三者觀法得無上法故四者觀智破憍慢故五者護諸衆生施安樂故六者善思惟壞諸煩惱故七者修助道法莊嚴菩提故八者護法具足六度故須菩提菩薩摩訶薩若能具足如是等法則能教化一切衆生爾時比丘聞是法已於十千年繫心思惟勤行精進為得是法以精進故即得無盡器陀羅尼善解一切衆生語言隨語為説得是持已復有無盡辨才成就如是陀羅尼已周遍城國村邑聚落化無量衆於三乘道為其父母兄弟眷屬宗族説法悉令獲得隨順法忍須菩提爾時比丘復往佛所頭面敬禮右繞三匝却住一面白佛言世尊如佛先説我已證得佛神力故得聖智慧世尊頗有三昧菩薩修已心不退轉增長善法佛言比丘有三昧名一切法自在菩薩修已其心不退亦得增長無量善法爾時比丘聞三昧名即白佛言世尊菩薩云何行云何修云何學而能獲得如是三昧比丘有八法八莊嚴八發心菩薩具已得是三昧何等為八一者淨心二者至心三者施心四者離煩惱心五者觀六界六者修忍七者勤精進八者修定身心寂靜是名八法八莊嚴者一者捨二者戒三者功德四者智五者舍摩他六者毗婆舍那七者發菩提心八者莊嚴一切佛法是名八莊嚴八發心者一者發心無有衆生壽命士夫一切諸法亦復如是二者發心一切諸法無常苦無我三者發心一切諸法空無相願四者發心未來之法無有住處五者發心現在之法無有住處六者發心一切諸法無業果報七者發心一切諸法無有作者無有受者八者發心一切諸法無有繫屬菩薩具足如是等法得是三昧比丘聞已進修不久即得如是一切法自在三昧得三昧已即放光明遍照三千大千世界爾時比丘即往佛所頭面作禮右繞三匝上升虛空一多羅樹結加趺坐滿一千年不動不搖法喜為食獲得比智樂説無礙令三萬六千億衆生得不退心無量衆生安住三乘爾時法語比丘過千年已從座而起作如是言如來世尊勤精進故得阿耨多羅三藐三菩提非懈怠也善男子汝於無量無邊世中成就無量無邊功德故能速得如是神通善男子汝已於往七萬六千億佛所種諸善根淨修梵行是故因此過去善根獲得如是現在善果佛告須菩提汝知爾時法語比丘得三昧者豈異人乎即是今之不眴菩薩成就如是無量功德爾時世尊為須菩提説是菩薩往因緣時三萬二千衆生發阿耨多羅三藐三菩提心虛空之中諸天龍神乾闥婆等雨諸華香以用供養不眴菩薩而作是言我等今日見此菩薩得大利益爾時須菩提語不眴菩薩言善男子汝已久修清淨梵行不眴菩薩言大德夫梵行者非是過去未來現在若非過去未來現在即是無作若無作者即名為行如是行者名為無生名為無諍無有言説及以威儀大德非眼行故名為梵行非耳鼻舌身意行故名為梵行非色聲香味觸法行故名為梵行亦非色受想行識行故名為梵行非相非緣非見非聞非知非覺大德如是等法無去來住無牽無挽無有數量無上無下是名梵行須菩提言善男子夫梵行者名八正道不眴菩薩言大德云何八正道名為梵行若以正見為梵行者不見諸法名為正見等見諸法名為正見不見之見乃名正見若不見者云何得名為正見耶若無正見云何得名為梵行乎無有思惟名正思惟夫思惟者名為顛倒若顛倒者云何得言正思惟耶一切音聲皆悉平等若善若惡若一若二若過去若未來若現在若一切字若一切聲是名為響若是響者云何得言為正語耶聲平等者一切行法皆悉無常是苦無我涅槃寂靜若能等觀一切諸法如涅槃相及演説者是名正語無身無身業無口無口業無意無意業何以故無業處故若有業處則有我我所若無我我所則無業果若如是觀名為正業若為壽命行於邪命遠離邪命故名正命若觀是等無我我所無有衆生壽命士夫如其無者何故得名為正命耶於眼識色不生染著眼識性空以識性空故眼色亦空若眼色識空至意識法亦復如是若如是觀是名正命無有顛倒斷諸精進名正精進無精進法無精進者無有具足成就精進無有精進為利益者若能觀察如是等法是名正精進若能等念一切諸法平等如空一切諸法亦復如是如一切法陰入界等亦復如是若能觀於如是等法是名正念觀一切法皆悉平等無我我所若能如是平等觀者是名正定大德若能如是觀一切法性平等者名八正道是名梵行非以數故名八正道非八正道名為梵行非世道故名為梵行非著心故名為梵行非二相故名為梵行非作相故名為梵行若見諸法無有住處乃名梵行爾時不眴菩薩為諸大衆説如是等梵行法時五百比丘離諸煩惱得阿羅漢果須菩提言善哉善哉善男子快説是法如離煩惱阿羅漢人其所宣説等無有異大德我今亦是遠離煩惱亦是阿羅漢我亦遠離聲聞緣覺煩惱諸法我如法住故名阿羅漢爾時須菩提白佛言世尊是不眴菩薩樂説無礙不可思議辨才利智隨問而答佛言須菩提不眴菩薩得一切法自在三昧以是故能隨問而答若有菩薩得是三昧一切世間人天魔梵不能障其樂説無礙爾時帝釋白佛言世尊若有人於無量世中具足功德乃能得見不眴菩薩聞其所説世尊若有比丘比丘尼優婆塞優婆夷受持是經讀誦書寫為人解説及聞法者悉發阿耨多羅三藐三菩提心當知是輩一切皆當如不眴菩薩作師子吼世尊我當擁護如是等人佛言善哉善哉憍尸迦汝今至心護持正法爾時梵王復白佛言世尊我當樂修捨定三昧捨禪定樂來護佛法及説法者令離病苦隨何國土有説法處我當往彼至心聽受若有國土信受此經供養三寶我亦當為除滅惡相令其土境清淨安怗正法治化佛言善哉善哉梵王汝真護法若有人能如是護法當知是人終不遠離三寶之寶爾時四天王復白佛言世尊我亦能護受持讀誦書寫解説如是法者佛言善哉善哉善男子若知法者是人乃能擁護是法汝於我所得聞法已即獲法眼斷諸惡道若復至心護持正法不久當斷一切諸有爾時世尊告阿難言汝當受持如是經典為四部衆廣説其義阿難白佛言世尊我能受持如是經典如佛所説等無有異廣為四衆宣釋分別爾時人天阿修羅乾闥婆一切大衆聞經歡喜讚歎善哉
