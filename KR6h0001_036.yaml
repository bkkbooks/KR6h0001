body:
  text: 爾時西方去此佛剎四十二恆河沙等諸佛國土過是數已有佛世界名堅固幢其國有佛號智德峯王如來應供正遍知於五濁世與諸四衆眷屬圍繞而為説法時彼衆中有菩薩摩訶薩名炎德藏在大衆中聽佛説法仰觀虛空見無量無數阿僧祇菩薩摩訶薩衆從西方來而往東方復見東方有大光明覩是事已即白智德峯王佛言世尊以何因緣有如是事爾時智德峯王佛告炎德藏菩薩摩訶薩言善男子東方去此四十二恆河沙等諸佛世界有世界名曰娑婆佛號釋迦牟尼如來應供正遍知現處五濁為無量無邊衆生説三乘法欲令法母三寶種久住故法行不斷故破魔界故為欲建立佛法幢故十方一切諸如來等皆悉至彼娑婆世界共説寶幢陀羅尼説已各還本剎今釋迦牟尼佛復為菩薩摩訶薩及聲聞衆更大集會以四無礙智説三解脫門清淨梵行娑婆世界地及虛空皆悉充滿是諸大衆皆悉樂聞釋迦如來所説法門心無厭足爾時智德峯王佛告炎德藏菩薩摩訶薩言善男子汝可持我語往娑婆世界問訊釋迦牟尼佛彼佛今説日藏法行壞龍境界名曰炎品能盡一切衆生惡業善男子我有陀羅尼欲名無願順汝可送往此陀羅尼有大勢力有大利益能盡一切欲貪色貪無色貪能盡一切我慢慢慢增上慢能破一切無明暗聚能捨一切諸苦重擔乃至能得盡智無生智得阿耨多羅三藐三菩提時彼世尊而説呪曰怛絰他一舍那舍婆二奢摩那舍婆三阿婆叉舍婆四斫芻舍婆五輸嚧哆羅舍婆六伽拏舍婆七什婆舍婆八迦耶舍婆九摩那舍婆十叉婆毗陀十一斫芻畢利洟鼻叉婆十二輸嚧哆囉阿婆叉婆十三伽囉拏帝闍叉婆十四視婆婆喻叉婆十五迦耶羶囉摩叉婆十六摩那烏闍叉婆十七阿盧迦若那叉婆十八毗闍僧羯摩叉婆十九唵句囉呿伽叉婆二十婆摩嘍畢也鼻耶叉婆二十一舍摩迦闍叉婆二十二叉耶囉娑叉婆二十三羶哆鼻耶婆叉婆二十四那都那二十五泥那都那二十六阿婆泥那都那二十七那耶波那夷那都那二十八伊沙伊婆都度呿𡃂二十九莎呵三十善男子汝可持此無願順陀羅尼往彼娑婆世界如我辭曰智德峯王如來問訊釋迦牟尼佛起居輕利氣力安樂不轉正法輪無障礙不彼惡衆生樂聽所説日藏法行壞龍境界炎品不爾時炎德藏菩薩白智德峯王佛言世尊我今已受持此陀羅尼今雖欲往娑婆世界而懷怖畏何以故我親從佛聞彼佛世界五濁熾盛彼諸衆生衆苦逼迫貪欲瞋恚愚癡邪見貪著女色於須臾間能成阿鼻地獄惡業以是義故我甚怖畏爾時智德峯王佛告炎德藏菩薩言善男子汝飛於彼娑婆世界四天下中二十一日化作金翅鳥王令彼大海六十四萬億諸龍見汝形故皆生怖畏以是因緣受三歸依乃至發阿耨多羅三藐三菩提心不炎德藏菩薩言如是世尊實如聖説爾時智德峯王佛復告炎德藏菩薩言善男子汝往於彼娑婆世界四天下中亢旱之處於七日中化作象頭馬頭大龍王身令舊住龍心生怖畏不安本處悉騰虛空七日之中澍大甘雨耶炎德藏菩薩言世尊實如聖説佛言善男子汝於如是諸惡龍中尚不怖畏又汝過去發弘誓願在在處處利益衆生何故今者忽生恐畏汝受我使莫生驚怖爾時智德峯王佛告炎德藏菩薩言善男子我復教汝智慧依止大授記陀羅尼汝持往彼得無怖畏爾時炎德藏菩薩白佛言世尊譬如智人坐伏藏上以手把土忽得一寶得已歡喜復更重把如是漸漸得寶轉多我亦如是重問如來望得如來無價法寶得是寶已為欲教化諸衆生故若蒙如來開大法印以法印力如來力故則能教化一切衆生爾時智德峯王佛即説呪曰怛絰他一珊提多夷反囉那奢摩二三摸他那奢摩三阿跋闍那奢摩四莎凌楞伽奢摩五僧逾伽奢摩六拔馱那奢摩七三摩毗沙摩奢摩八婆多那奢摩九三摩羯嵐摩奢摩十遏毗馱奢摩十一耶婆闍羅摩羅拏奢摩十二耶婆薩婆摩奴闍奢摩十三耶婆薩婆怛利陀都十四三斯羯利哆奢摩十五阿邏波羅奢摩十六佛言善男子此智慧依止授記陀羅尼彼土衆生若有聞者皆能輕薄下中上結色無色有亦復如是恆河沙等劫生死過惡皆悉散滅過去五有身口意業生於有中受不愛果所在生處障修善根四大衰惡所愛之財求不能得舊所親愛悉皆離散所不樂事而悉和合身受諸苦心多濁亂不樂修習一切善根樂著一切諸不善法如是等業悉滅無餘善男子若有一聞此陀羅尼一心聽受七日七夜專精修習如上所説諸惡罪業皆得消滅除五無間誹謗正法毀呰聖人犯四重禁此四種人失陀羅尼力畢定受罪若復有人無是四罪樂修善根修行檀波羅蜜種種布施是人則為一切諸佛諸菩薩衆聲聞緣覺之所加護以聖加故得無盡物亦樂持戒忍辱精進禪定智慧一切天人阿修羅等不能沮壞常為一切天王人王見者恭敬供養禮拜聞者歡喜心常憶念讚歎守護臨命終時得見十方曾所念佛皆來授手作如是言善男子來我今將汝向我世界令汝安住十地位中彼人見佛心大歡喜以歡喜故得生清淨有佛國中速住十地是人不久當得阿耨多羅三藐三菩提善男子此智慧依止大授記陀羅尼有如是大力有大利益善男子彼娑婆世界有諸衆生不到涅槃道何以故造五無間誹謗正法毀呰聖人犯四重禁如是衆生十方淨土所不容者皆生彼國是諸衆生於三惡道長夜受於種種諸苦彼衆生等雖出三塗已無清淨業因緣故釋迦如來本願力故還復生於彼娑婆界若諸衆生過去所有信根乃至慧根曾修布施乃至智慧曾修願行不樂流轉學涅槃道淨修梵行如是人等生彼世界惡業衆生得醜陋身諸根缺減其心暗鈍衣服飲食臥具湯藥資生乏少壽命短促癡無智慧睡眠不安薄善根少福德諸適意事而不從心復無悲心樂行惡行樂著惡見樂習惡論樂起惡願樂受惡法不信正法多諸病苦多散亂心多樂惡事造三惡業虛妄憶想非吉為吉心不樂忍其心麁獷常樂修習十不善業誹謗三寶趣三惡道善男子彼佛剎中如是衆生聞此智慧依止授記陀羅尼至心一聽者彼諸衆生生厭離心度三惡道復有衆生曾修信根乃至慧根亦曾修習六波羅蜜不樂流轉淨修梵行若得聞此陀羅尼已增益壽命身少病苦智慧增益資財無損長善根海增善知識乃至增益一切善業皆悉成就成就正見具足十善種三善根樂三自歸樂起諸願樂阿蘭若光顯三寶復能於此智慧依止大授記陀羅尼至心聽受專精修習讀誦受持乃至七日七夜憶念不捨成就如是無量功德除五無間誹謗正法毀呰賢聖犯四重禁如是衆生墮於惡趣於彼命終而來生此娑婆世界以彼業氣習未盡故於未來世應受惡報由得聞此智慧依止大授記陀羅尼於現在身雖不能得勝妙果報以陀羅尼力故於當來世無量惡報悉滅無餘彼諸衆生為滅如是諸惡業故應當書寫此陀羅尼門復應造作七佛形像於釋迦牟尼佛法之中建立寺舍供養供給法行比丘亦當數數受八戒齋勤行精進樂聽正法如説修行此諸衆生於三寶中得決定信生歡喜心因緣故能滅無量百千萬億那由他劫在在處處應受惡道種種諸苦於現在世多諸病苦受身形殘資生減失眷屬離散為人奴僕受諸撾打惡口麁獷不得自在為人誹謗已受如是種種苦故過去惡業皆悉滅無如是善男子此智慧依止授記大陀羅尼於諸衆生有大勢力我今更説爾時世尊即説呪曰怛絰他一佉伽波利眵尺之反提二伽唎婆叉惻檀反西三伽跛利四鼻陀鉢囉婆伽叉惻檀反五叉婆踰岐強豫反六鉢底呵黎七奢摩那四迦涕八三摩迷伽闍師踈齋反九阿叉夜那低十叉婆跋栘常兮反十一禰馱那闍師十二娑摩娜闍師十三娑摩伽邏闍師十四阿地呵奢夜闍師十五鼻鉢囉婆闍師十六西叉闍師十七西禰夜闍婆闍師十八娑利羅瞿嘻馨指反夜闍師十九娑利羅瞿嘻夜阿阿鞞綺婆那鳩世二十薩檀拘帝二十一私婆檀那梯二十二毗哆鉢囉鼻利低二十三嘔波羶囉磨娜梯二十四阿那叱地夜跋羅企羌豫反二十五鉢羅帝羯迷那二十六三迦太夜世二十七薩盧遮那婆迷二十八拘嚧太黎二十九迦摩薩世三十阿世奢佉岐軀豫反三十一那夜軍闍三十二鼻地夜跋泥三十三羯羅那跋泥三十四鬱遮跋泥三十五三迷摩迦黎三十六奢利夜跋泥三十七摸伽闍師三十八呵利拘那婆三十九那夜那目企四十娑囉叉拘黎四十一那邏延拏樹黎四十二因陀羅婆薩泥四十三烏阿四十四阿婆阿四十五阿阿四十六何羅婆阿四十七婆囉四十八阿婆囉四十九何羅薩彌伽其我反五十豆佉禰提都夷反羅五十一涅槃醯莎和呵五十二善男子此大授記陀羅尼有大功德有大勢力有大利益能盡一切惡業憐愍救護一切衆生悉能洗除諸罪垢穢身心光潔能與念力與寂滅力若有衆生一心聽受如説修行一切如來一切菩薩一切辟支佛一切阿羅漢悉皆加護乃至天王人王亦常護念敬愛禮拜供養供給彼人臨終得見過去曾所誦念十方諸佛皆悉授手作如是言善男子來我今將汝生淨佛土汝生我國速住十地彼人見佛得大歡喜大歡喜故命終得生淨佛國土既生彼已得住十地不久得成阿耨多羅三藐三菩提善男子此智慧依止大陀羅尼有如是力能淨惡業成就淨心證涅槃道爾時智德峯王佛告炎藏菩薩言善男子持此陀羅尼往詣娑婆世界至釋迦牟尼佛所如我辭曰智德峯王佛問訊世尊炎藏菩薩摩訶薩言唯然受教時彼衆中無量無邊阿僧祇菩薩摩訶薩異口同聲作如是言我等今者樂欲見彼娑婆世界釋迦牟尼佛禮拜供養及見大衆聽受日藏壞龍境界能盡諸惡業陀羅尼門我等昔來初未曾往彼娑婆界今從定起欲往彼土惟願世尊聽我等往爾時智德峯王如來告衆菩薩摩訶薩言善男子欲往隨意應當攝心以遊彼國汝等各自變身如那羅延具足莊嚴時炎藏菩薩與諸菩薩摩訶薩衆一切皆作那羅延身莊嚴示現頂禮佛足右繞三匝即從彼發如一念頃至娑婆界四天下中摩伽陀國釋迦牟尼佛所到已以閻浮金末而散佛上既供養已頂禮白佛言世尊智德峯王如來問訊世尊少病少惱起居輕利氣力安不轉正法輪無障礙不作是語已却住一面爾時北方去此娑婆世界八十恆河沙佛剎過是數已有佛世界名普上香五濁充滿彼國有佛號德華藏如來應供正遍知現在説法彼佛衆中有菩薩摩訶薩名虛空藏在會聽法爾時虛空藏菩薩摩訶薩仰觀虛空見虛空中無量無邊阿僧祇菩薩摩訶薩從北方來往詣南方復見南方有大光明見是事已即白佛言世尊我始從定起在會聽法見虛空中無量無邊阿僧祇菩薩摩訶薩從北方來往詣南方復見南方有大光明以何因緣有如是事爾時德華藏佛告虛空藏菩薩言善男子於此南方過八十恆河沙佛剎有佛世界名曰娑婆亦如我剎五濁充滿彼中有佛號釋迦牟尼如來應供正遍知今現在世為諸衆生説三乘法欲令法母久住世故令三寶種不斷絶故建大法幢壞魔網故十方諸佛皆集彼國説寶幢陀羅尼説已各還本土釋迦牟尼佛為諸菩薩摩訶薩大聲聞衆作大集會以四無礙智説三解脫門彼佛土中地及虛空大衆充滿如來處於師子之座放大光明説深妙法清淨梵行及以四攝日藏法門壞龍境界炎品除諸衆生不善惡業陀羅尼門一切樂聞無有厭足常作是念若有十方一切剎中菩薩摩訶薩億百千劫行菩薩行欲得逮於一生補處乃至十八不共之法自具足得無障礙智不隨他教者彼諸菩薩悉應來集娑婆世界以自善根入種種三昧令此世界大地得大利益令諸衆生不失念力布施持戒忍辱精進得大智慧亦如他方清淨佛土具諸功德今此娑婆世界亦有十方諸大菩薩摩訶薩衆悉來集會彼菩薩衆於娑婆世界隨自分力各入三昧從於身邊而放光明或如大燈或如百千萬億無量無邊日月光明彼諸菩薩摩訶薩皆大集會彼娑婆界以是因緣有大光明彼十方佛剎諸菩薩衆未至彼者從三昧起趣於南方往娑婆世界欲見釋迦牟尼佛及諸大衆欲聞破壞一切惡業陀羅尼門結加趺坐各各入於奮迅遊戲諸深禪定善男子汝今可往彼娑婆世界善男子彼中衆生短命多病少智慧少善根少福德於三惡道心無怖畏乏少資生多貪愛欲行不淨行無慚無愧樂行十惡如是衆生捨此身已墮於惡道復有生於惡夜叉中迦吒富單那中乃至阿迦富單那中既生彼已收地精氣及種種穀華果草木一切等味其有食者身力減損彼諸惡鬼增益勢力常伺人便住胎出胎隨其成長乃至奪命是故彼諸衆生多病短命無念慧力不畏未來三惡道苦乃至樂行十不善業墮於惡道善男子我於過去行菩薩時作如是願牢固勇猛勤無休息供養諸佛如説修行咨問彼佛何等陀羅尼呪能護胎藏及以母身令得安隱令諸惡龍夜叉羅剎阿修羅迦樓羅緊陀羅摩睺羅伽鳩槃茶裨黎多毗舍闍富單那迦吒富單那烏摩羅阿跋思摩羅或一日瘧乃至四日或毒藥惡呪或行惡藥能令身心逼迫苦者令是諸惡悉不得便或在母胎乃至出胎乳哺長養種種飲食吸其精氣身心濁亂悉不得便令彼衆生安隱住胎乃至乳哺長養身心不濁無病長命增益智慧乃至能行十善業道樂行布施樂持禁戒怖畏未來三惡道苦何等陀羅尼能得如是唯願大慈為我宣説我得聞已於當來世教化衆生爾時彼佛即為我説奢摩裴多悉致蔓多羅大授記陀羅尼我聞此呪受持流布無量億劫常以此呪化導衆生令得修行六波羅蜜牢固精進復以此呪護諸母人及護胎藏若天若烏摩羅阿跋娑摩囉人非人等於彼婦人及以胎藏不能令彼四大不調身心濁亂奪人精氣惡呪惡藥乃至阿修羅及餘世間壞胎藏者亦不得便胎藏安隱産生無難諸根滿足身體清淨顏貌端正具足智慧不失念力大力諸天百千萬億及諸眷屬無量衆數常隨衛護能令彼得宿命智慧怖畏惡道生慈悲心樂行布施持戒忍辱精進禪定樂善知識易得聖智能得盡苦具足智慧樂空寂處滅諸煩惱天龍夜叉諸鬼神等供養供給厭惡生死志求涅槃乃至能發阿耨多羅三藐三菩提心在在生處終不忘失菩提之心速得成就菩薩三昧若生辟支佛心現得順忍於未來世成辟支佛若發聲聞心得四諦順忍不墮三惡生天人中善男子我於過去行菩薩行時以無量方便教化衆生令住阿耨多羅三藐三菩提善男子此陀羅尼如是大力有大利益善男子若諸衆生遇重癩病應以此陀羅尼呪師子乳與病者服一切諸病悉皆除愈若不能得師子乳者取祭死尸邊食以此陀羅尼呪之與病者服一切諸病亦悉除愈若無此食應取塵棄藥持此陀羅尼呪之與病者服一切諸病亦得除愈善男子我於過去行菩薩行時如是勤求方便教化衆生乃至令住阿耨多羅三藐三菩提若見諸樹無華果者我時即以此呪用呪雨水澆灌樹根彼樹華果即得滋茂乃至蒱桃種種穀草皆令茂盛若天無雨取溝瀆中諸不淨汁安龜甲中以呪呪之以瞻波迦樹葉裹此龜甲置龍池中即時大雨若天多雨損敗苗實當取阿闍迦羅蛇頭中珠以呪呪之置龍泉中雨即便止若非時黑風大寒大熱日月星宿失其常度年節四時變異災怪應愍衆生七日七夜淨修梵行澡浴身體服食乳糜若但食菜一心專念更無異想七日七夜諷誦受持此陀羅尼復以此陀羅尼呪呪淨葵菜裹摩陀那果安天廟中即除非時風雨寒熱種種災惡日月星宿還依常度善男子我於過去修菩提時欲令衆生所在安隱若見虛妄憶想倒見衆生我於爾時為彼説此陀羅尼呪彼諸衆生聞此呪已虛妄顛倒皆悉捨離修十善業起於善願淫欲薄少善男子我於過去以方便力教化衆生令住六波羅蜜亦自具行六波羅蜜乃至得阿耨多羅三藐三菩提善男子此陀羅尼能與衆生如是大力與大利益能除一切諸病苦惱能護懷妊婦人及以胎藏能壞一切煩惱諸結能知四大五陰十二入十八界示方便道能覺安隱快樂涅槃能令衆生信心清淨能入諸法差別法門攝諸外道壞魔境界善男子此陀羅尼力能令一切諸天歡喜夜叉惡鬼心生知足諸阿修羅極大怖畏迦樓羅緊陀羅等亦皆歡喜摩睺羅伽不能反顧摧伏邪論能令剎利婆羅門毗舍首陀信心歡喜能令女人薄少淫欲於多聞者益其念力修禪定者樂阿蘭若能却一切盜賊鬪諍飢饉疫病旱潦寒熱麁澀惡觸如是等事皆悉除滅法母增長佛法流布三寶不斷除生死畏破無明聚棄捨苦簷能得盡智及無生智爾時世尊即説呪曰怛絰他一摩那叉惻我反二阿婆叉三羅伽娑叉四闍羅叉五末磨那叉六阿婆叉七曼陀叉八那茶叉九那茶羅休十鼻薩那吒十一佉伽那吒十二阿吒那吒十三拘那吒十四鉢利鳩薩那吒十五那茶那吒十六富利迦那吒十七鬱怛羅那吒十八迦毗那吒十九軍闍那吒二十蘇目伽那吒二十一遮婆茂婆羅那吒二十二佉伽凡鉗婆囉那吒二十三富沙迦囉那吒二十四系娑蘇我反鬱盧達囉那吒二十五三摩羅耶那吒二十六失囉鳩三二十七憍怛吒二十八怛羅二十九摩妬佉囉婆三十提畜叉三十一婆帝囉竪三十二豆婆那摩囉竪三十三婆呵那否智三十四僧低囉闍婆三十五阿摩囉闍婆三十六摩呼囉伽闍羅三十七阿禰拏婆囉三十八阿禰拏叉三十九阿婆呵摩唎伽禰拏叉四十沙婆都豆佉寫四十一娑和呵四十二爾時世尊説此陀羅尼時彼大衆中六萬億人得柔順忍復有六十頻婆羅人得須陀洹果斯陀含果阿那含果阿羅漢果善男子汝可持我此陀羅尼往娑婆界如我辭曰北方去此八十恆河沙佛剎過是數已有佛世界名普上香亦具五濁彼中有佛號德花藏如來應供正遍知現在説法問訊釋迦牟尼佛少病少惱氣力安不諸弟子衆樂聽法如説行不能摧四魔諸惡龍不佛轉法輪無障礙不善男子於彼釋迦牟尼佛所説日藏法門能壞魔王龍王境界滅除惡業説此奢摩裴多悉致大授記陀羅尼欲令此陀羅尼有大勢力大利益能令衆生安隱快樂滅諸煩惱乃至棄捨苦擔爾時德華藏佛諸弟子衆咸共讚言善哉善哉希有世尊希有世尊如來智慧一切法中無障無礙我等從昔已來初未得聞如是甚深大陀羅尼能與衆生安隱快樂聽此陀羅尼已悉發勇猛讀誦受持何以故此陀羅尼有如是無量無邊大功德故爾時虛空藏菩薩摩訶薩白佛言世尊若有衆生怖畏生死欣樂涅槃一心稱名禮拜供養德華藏佛并誦此陀羅尼生希有心彼諸衆生增長善根獲大利益爾時德華藏佛告虛空藏菩薩摩訶薩言善男子如是如是如汝所説善男子我於往昔修菩提時勤求方便作如是願我得阿耨多羅三藐三菩提時若有十方諸佛國土其中衆生樂行布施乃至智慧若能至心稱我名號禮拜供養令彼衆生無有天人阿修羅等能加惡者亦無有能障礙修行六波羅蜜者又能增益無量善根唯除過去造極惡業者若此願不成我誓不取成等正覺善男子若有婦人欲求子者若復不願有多子者若有懷妊怖畏産難彼諸人等應當至心稱我名號禮拜供養若人非人無能得便亦無惡呪毒藥能令身心受逼迫苦乃至一念能加惡者我誓不取阿耨多羅三藐三菩提善男子我於往昔求菩提時作如是願覆護利益一切衆生是故衆生應當至心稱我名號禮拜供養一切諸惡皆悉除滅決定無疑唯除過去極重惡業現受報者爾時虛空藏菩薩白佛言希有世尊不可思議我今欲往娑婆世界見釋迦牟尼佛但彼衆生弊惡嫉妬無慈悲心不知報恩言常麁獷多行邪見無惱我耶我今往彼或無利益佛言善男子無如是事誰是成就四無量心而能加惡假使百千諸魔眷屬亦無障礙者善男子汝於往昔無量劫來而常修行四無量心汝莫怖畏善男子我有陀羅尼從四無量梵行中生能滅諸惡乃至惡夢汝可受持此陀羅尼若有多瞋衆生聞此呪者皆生慈心若不生者或便惛睡爾時世尊即説呪曰怛絰他一浮呼鼻利呵二浮浮囉三羅囉婆四一邏五娑呵六呵籌七伽籌八伽伽那叉九奢摩奢摩十蜜多囉蜜多囉十一斫迦囉十二跋帝帝隸十三娑伽囉帝隸十四豆利哆哂香指反𮄆十五哂黎呵跋醯十六那邏闍嚌十七夜婆那蜜低黎十八綺底蜜低黎十九婆利蜜低黎二十始佉蜜低黎二十一摩都囉蜜低黎二十二佉伽蜜低黎二十三薩都闍蜜低黎二十四薩婆羯摩蜜低黎二十五摩那跋利哆蜜低黎二十六陀胝張夷反濕婆囉蜜低黎二十七莎和呵二十八善男子此陀羅尼名滅一切惡及諸惡夢其有誦持者應以瞻蔔油呪之七遍用塗兩手及用塗面諸惡心人覩見之者皆生歡喜乃至惡龍夜叉迦吒富單那等乃至千萬諸魔眷屬不起惡心況加惡事假使滿四天下諸惡衆生呪一合水而以散之令彼衆生皆生信心乃至不起一念之惡若有濁水滿四大海取一合水以此呪呪之投彼大海能令濁水悉變澄清善男子汝可持此陀羅尼往娑婆界爾時無量阿僧祇菩薩摩訶薩異口同聲作如是言我等今者渴仰欲見大德世尊釋迦牟尼佛禮拜供養尊重讚歎亦欲觀彼大衆集會聽日藏法門壞龍境界炎品為除一切衆生諸惡業故惟願世尊聽我往彼佛言善男子欲往隨意應當一心以遊彼國汝等皆可變作轉輪聖王七寶成就千子具足莊嚴其身如轉輪王法即時八十千萬菩薩摩訶薩與虛空藏菩薩恭敬圍繞德華藏佛繞三匝已上升虛空是諸菩薩摩訶薩衆各自化作轉輪王身七寶成就千子具足象兵馬兵車兵步兵如是種種莊嚴如輪王法即從彼發一念之頃至娑婆世界以閻浮提金末散娑婆世界佛及菩薩聲聞大衆如是金末皆悉遍滿娑婆世界復以龍栴檀香末而以散之復以真珠亦以散之復以真珠金瓔珞具亦以散之復以頸珠而用散之復以種種瓔珞種種衣服而以散之復以種種幢幡寶蓋亦以散之其諸菩薩摩訶薩衆皆為供養釋迦牟尼多陀阿伽度阿羅呵三藐三佛陀彼諸菩薩摩訶薩衆作是供養已恭敬圍繞右繞娑婆世界繞三匝已而來至此四天下中摩伽陀國釋迦牟尼佛所到已恭敬禮拜繞佛三匝却住一面
