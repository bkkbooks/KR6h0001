body:
  text: 高齊天竺三藏那連提耶舍譯月藏分第十二星宿攝受品第十八爾時佛告娑婆世界主大梵天王釋提桓因四天王言過去天仙云何布置諸宿曜辰攝護國土養育衆生娑婆世界主大梵天王釋提桓因四天王等而白佛言過去天仙分布安置諸宿曜辰攝護國土養育衆生於四方中各有所主東方七宿一者角宿主於衆鳥二者亢宿主於出家求聖道者三者氏宿主水生衆生四者房宿主行車求利五者心宿主於女人六者尾宿主洲渚衆生七者箕宿主於陶師南方七宿一者井宿主於金師二者鬼宿主於一切國王大臣三者柳宿主雪山龍四者星宿主巨富者五者張宿主於盜賊六者翼宿主於貴人七者軫宿主須羅吒國西方七宿一者奎宿主行船人二者婁宿主於商人三者胃宿主婆樓迦國四者昴宿主於水牛五者畢宿主一切衆生六者觜宿主鞞提訶國七者參宿主於剎利北方七宿一者斗宿主澆部沙國二者牛宿主於剎利及安多鉢竭那國三者女宿主鴦伽摩伽陀國四者虛宿主般遮羅國五者危宿主著花冠者六者室宿主乾陀羅國輸盧那國及諸龍蛇腹行之類七者壁宿主乾闥婆善音樂者大德婆伽婆過去天仙如是布置四方諸宿攝護國土養育衆生爾時佛告梵王等言汝等諦聽我於世間天人仙中一切知見最為殊勝亦使諸宿曜辰攝護國土養育衆生汝等宣告令彼得知如我所分國土衆生各各隨分攝護養育大梵王等而白佛言如是大德婆伽婆唯然受教爾時佛告梵王等言我今以彼于摩國陀樓國悉支那國奈摩陀國陀羅陀國佉沙國羅佉國賖摩國侯羅婆國舍頭迦國頞闍婆國沒遮波國此十二國付囑角宿攝護養育亦護角宿日建立國土城邑聚落及角宿日所生衆生汝等宣告令彼得知梵王等言如是大德婆伽婆唯然受教爾時佛告梵王等言我今以彼阿羅荼國訶利那國叔迦羅國波盧羅國弗利賒國那摩帝國俱致娑國蘇那婆國賒摩國跋陀婆國如是十國付囑亢宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼佉搜迦國信頭婆遲國阿摩利國餘尼目佉國難陀婆國伽沙國跋使俱闍國由婆迦國婆佉羅國沙婆羅國伽樓荼國鳩籌迦國婆遮利婆國此十三國付囑氐宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼波頭摩國弗色迦羅國目帝國嵩伽摩國耆利國不摩婆國南耆利國遮波羅國修帝達賒國提婆那國奚周迦國此十一國付囑房宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼睺羅婆國鳩羅婆國牟羅婆國能伽婆國蘇提闥國鳩知迦國天王國毗那婆國波搜多國奚迦國如是十國付囑心宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼伽闍弗國迦羅婆國迦迦波他國悉陀叉國鬱瑟吒羅婆國帝羅南國阿羅毗國那婆國弗色迦羅婆國摩兜利國迦鄰伽跋帝國摩于達利國畢姜闍國鉢利犀羅婆國此十四國付囑尾箕二宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼婆蹉國憂禪尼國憂樓頻螺國輸尼般多國摩荼婆國毗使拏提波國遮羅羯波國婆羅斫迦羅國羅摩伽摩國迦尸弗國鳩樓沙國陀修國盧醯多國阿婆陀荼國帝拏槃那國遮達那國毗伽闍國此十七國付囑井宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼波吒利弗國摩尼藍婆國婆樓那國那遮羅國羯那國北般遮羅國帝跋拏國娑羅蹉國瞻波國蘇都那國鳩樓差多國西地國富樓沙富羅國侯彌單國藍摩婆國瞿羅國奚摩國闍耶波梯國婆求彌國恆河門國頭婆羅婆帝國旃達羅跋帝國婆樓迦車國蘇尼棄國瞿沙跋帝國此二十五國付囑鬼宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼寄薩梨國摩訶尼梯國烏場國須尼棄國波羅婆國憂羅婆國區荼國尼佉國乾荼波羅婆國婆寄多國如是十國付囑柳宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼阿鞞遮國蘇跋拏國闍吒國金性國摩兜羅國毗摩尸利國檢婆樓遮國蘇梨國婆求遮國頻頭羅婆國婆羅那國般遮囊伽羅國此十二國付囑星宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼波斯國訶利陀國敕勤國阿摩羅國婆羅婆國蘇摩尼棄國叵耶那國三牟遮國尸梨沙國婆利國伽菟娑國摩遮國兜佉羅國摩頭師利國此十四國付囑張翼二宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼伽羅婆羅國憂羅賒國罽使拏國婆耆國檀多摩利國婆樓遮國陀荼國達拏國藪牟寄賒國鳩論遮差國呿羅婆羅國阿疏俱迦國此十二國付囑軫宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼鳩賒弗利國緊那羅國迦卑羅摩利國三謨師國羅尼國時婆利國奚闍尼國摩兜褰遲國般荼梨國蜜拏梨國修羅毗國侯摩多尼國此十二國付囑奎宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼提帝賒婆國蘇摩跋羅國多羅比尼國阿賒若國俱薩羅斯國悉都那國娑羅瞬遲國緊拏多利國濕婆尼利國羅婆師飢國佉吒梨毗國佉娑利國白馬國此十三國付囑婁宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼阿斯那棄國軍陀羅毗國安尼師國遮俱波國兜伽帝國逋支國支多毗悉帝國憂篩帝國槃頭波羅國毗羅梨迦國摩陀羅毗國迦拏波帝國達婆娑梨國此十三國付囑胃宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼波羅耽羅國只叔迦國婆樓遮國輸盧那國迦毗羅婆國奢耶國馬面國伽樓荼國憍羅跋陀國吳地國闍婆跋帝國鞞樓國伽樓訶國于填國伽頗羅國狗面國尼婆羅國俱那娑國此十八國付囑昴宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼摩伽陀國鞞提訶國薩羅國奚浮迦國牟尼奢耶國羅羅國餘尼迦國拘薩羅國跋沙伽國阿荼國鞞訶迦國頞那婆國伽耶國尼婆國槃羅婆國跋知尼國陀樓國尸利曼多國彌伽頗羅國摩醯首羅膩羅耶國罽賓國婆盧師多國沙勒國憶尼國篩堤國此二十五國付囑畢宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼尼娑國迦尸國奢鳩尼國阿吒摩闍國緊陀國摩婆摩國達毗迦國八城國殊提沙國婆毗迦國婆求荼國摩訶羅吒國乾陀羅國迦婆摩國般遮羅國多荼沙國首婆迦國摩師跋那國兜羅婆國蘇摩國婆求國摩多摩利國摩羅婆國鳩留國瞿沙國此二十五國付囑觜宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼阿濕婆國奢跋那國摩偷羅國鴦伽吒婆國摩頭曼多國俱周羅國曼遮國婆求摩國俱闍婆國震旦國首羅犀那國阿那牟佉國佉羅婆羅國犀摩娑國那㝹邏婆跋陀國曼遲羅婆國奚周迦國此十七國付囑參宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼辛頭鳩羅國瞿那悉鬚國迦羅差國娑羅差國達羅膩鉢帝國海果國阿樓瑟拏羅婆國那婆弗使波羅婆國摩那兜利國民陀羅跋帝國如是十國付囑斗宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼剎利天祠如是二處付囑牛宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼阿樓那國鳩私娑羅闍利國瞻波兜篩國龜茲國摩藍浮沙國舍迦國物陀羅多國篩提國瞿師國婆羅彌國如是十國付囑女宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼難提跋彌國波羅尸國滿福國憂羅奢國藍浮沙國娑婆國摩陀羅婆國篩提國佉沙國娑羅斯國師子國訶波他國訶利鳩時國憂婆毗羅國多羅尼國毗舍離國憂迦利國此十七國付囑虛宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼迦車鞞帝國波利支國龍花國鳩荼婆國難提跋檀那國婆樓迦國乾陀俱致國娑彌利國夜瑟吒俱利國如是九國付囑危宿攝護養育乃至唯然受教爾時佛告梵王等言我今以彼侯曼陀國奢曼陀國頭摩迦國酬摩迦國犍沙婆國鳩支國博叉利國德叉尸羅國婆彌婆利國跋陀跋帝國憂摩差國跋娑多牟利摩國婆樓迦車國婆羅跋帝國此十四國付囑室壁二宿攝護養育亦護二宿日建立國土城邑聚落及二宿日所生衆生汝等宣告令彼得知梵王等言如是大德婆伽婆唯然受教爾時佛告梵王等言所言曜者有於七種一者日二者月三者熒惑星四者歲星五者鎮星六者辰星七者太白星所言辰者有十二種一名彌沙二名毗利沙三名彌偷那四名羯迦吒迦五名𦂅呵六名迦若七名兜邏八名毗梨支迦九名檀尼毗十名摩伽羅十一名鳩槃十二名彌那我今令此諸曜辰等攝護國土城邑聚落養育衆生汝等宣告令彼得知梵王等言如是大德婆伽婆唯然受教爾時娑婆世界主大梵天王釋提桓因護世四王及諸眷屬而白佛言大德婆伽婆若有世尊聲聞弟子不得畜養奴婢畜生園林田宅俗人資具及不交往除四方僧物起發精進三業相應常懷慚愧獨住間林集諸善法我於彼時令宿曜辰正行於世遮惡衆生觸惱鬪諍兩國兵仗疾病飢饉非節風雨失時寒熱悉令休息護佛正法久住熾然紹三寶種使不斷絶三種精氣增長安住亦使世尊聲聞弟子身口意業清淨相應發大勇猛循法而住爾時佛告阿若憍陳如言為令我法得久住故成熟衆生故閻浮提中一切諸國一名諸國多名諸國同名諸國及不列名國分布與彼天龍夜叉乃至迦吒富單那等令作護持及宿曜辰亦付諸國令作護持乃至令三寶種不斷絶故所有諸國多名同名於彼諸國同名夜叉同名羅剎有國無鬼神名有鬼神住還付彼等令作護持於閻浮提有餘鬼神不列名者亦使護持憍陳如一切鬼神皆悉發心護持養育乃至隨我聲聞弟子三業相應常無聚積循法而住於一切時護持養育憍陳如汝等應當常不聚積住阿蘭若三業相應背捨生死趣向涅槃成熟衆生應如是學爾時世尊欲重明此義而說偈言成熟衆生故我問諸天王云何昔天仙配宿攝諸國梵天答我言過去天仙等安置諸宿曜護如法衆生今付汝國土應當加養育亦付鬼神等而令作護持及彼宿曜辰各令攝國土護持養育故熾然正法眼護不畜田宅清淨聲聞衆遮諸惡衆生及息諸濁惡不絶三寶種增長三精氣汝告宿曜等令彼作護持我告諸聲聞令住正法眼應當捨憍慢精勤住蘭若背捨於生死趣向於涅槃樂住禪境界成熟億衆生大集經月藏分第十二建立塔寺品第十九爾時娑婆世界主大梵天王釋提桓因四天王等及諸眷屬從座而起合掌向佛一心敬禮而作是言佛說於此四天下中所有過去諸佛如來之所建立住持大塔牟尼諸仙所依住處於現在世及未來世而常不空佛為菩薩摩訶薩等降大法雨皆悉充滿初名衆仙所興次名德積次名金剛焰次名香室次名睒婆梨次名賢城次名須質多羅次名水光次名香薰次名善建立次名遮波羅次名金燈次名樂依次名牟真鄰陀次名金剛地次名慈窟次名那羅延窟次名渠摩娑羅香次名慧頂次名大德窟次名善現次名青鬱茂窟次名虛空子次名牛頭栴檀室次名難勝此是過去諸佛建立住持大塔常為菩薩摩訶薩等之所加護是於我等常所供養世尊所有聲聞弟子於現在世及未來世復有幾所塔寺住處令我等輩護持養育爾時世尊熙怡微笑從其面門放種種光照曜諸方即時於此四天下中而有無量百千諸佛處處而現東弗婆提八萬佛現北鬱單越百千佛現西瞿陀尼五萬佛現諸海島國百千佛現此閻浮提二百五十千佛處處而現波羅奈國六十佛現迦毗羅婆國二十佛現摩伽陀國三十佛現鴦伽摩伽陀國二十佛現拘薩羅國五十佛現須羅吒國二十佛現摩訶羅吒國三十佛現乾陀羅國十佛而現阿槃提國二十六佛現般遮羅國二十五佛現蘇摩國十二佛