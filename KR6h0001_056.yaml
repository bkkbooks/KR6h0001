賣以自活樂作諸田業又復喜鬪諍見諸善比丘梵行多聞者嫉妬復瞋罵不容彼坐臥而作麁獷語誹謗及毀呰於諸俗人邊稱揚不善業言此詐比丘是賊最惡人若有供養者多得惡名聞於彼不獲福亦莫信彼說諸寺惡比丘盜說梵行者種種不善事是以剎利瞋彼諸惡比丘雜以外文頌稱讚彼剎利能令剎利喜毗舍婆羅門利喜亦如是以是得供養持戒被欺𣣋剎利婆羅門嫌恨持戒者嫌恨持戒故致使諸天瞋棄捨彼國土剎利輔相臣向於寶國土在彼而安住輕賤持戒故菩薩亦捨離諸天捨離後其國大可畏惡龍惡夜叉羅剎鳩槃荼入國奪精氣及食其肉血惡王婆羅門毗舍首陀等共護國城邑及以諸村落宮舍國園林惡鬼遍充滿常奪彼精氣觸惱諸剎利婆羅毗舍陀男女等皆瞋復令心變惡互共相鬪諍彼等鬪諍故布薩行檀絶其國水枯涸非時風雨起飢饉極儉短乏少資生具果苗不成熟地味衆生味法味及精氣一切皆損減興動諸兵仗互共相劫奪如是慳貪國惡比丘往返復以佛僧物飲食諸果藥持用與俗人因此得供養奴婢及田宅與彼令攝受不善比丘等以之為尊長少智詐多聞不喜禪戒者禪戒者去後為財共鬪諍剎利聞生瞋打害惡比丘還俗捨法服繫閉於牢獄以是諸天瞋迭共相告語如是國土中旃陀羅王治朋黨惡比丘毀破袈裟服自壞己國土不久當敗亡墮在阿鼻獄受苦極長遠於是賢劫中無脫地獄時是旃陀羅王衆聖所厭賤聽讀檀尸法諂曲虛詐現是王多詐僞速滅己國土苗稼不成熟亢旱及水潦鼨鼠惡象暴自他國兵起曜入非常宿大地普震動白虹妖星墮時氣多疫病焚燒諸聚落速壞國城邑剃頭著袈裟諸佛所加護一人出家者天人所供養唯除諸如來無有自在者彼旃陀羅王謫罰惡比丘毀壞三世佛二種淨法身煩惱瘡深重難得值諸佛諸天皆捨離彼旃陀羅王如是國土壞法眼當散滅諸天捨離故如是國土壞三種精氣減毀滅天宮殿白法善朋少黑法惡黨增於彼濁惡世無有明智人所住阿蘭若樂法安隱住彼持我正法能令多衆信鬼神敬信故遮障諸怖畏增長三精氣熾然我正法彼以禪定樂充滿天宮殿是故以我法付諸鬼神王遮障惡剎利莫惱我聲聞國王於持戒親近常供養破戒不親供捨離各隨住國王不惱彼持戒及毀禁剎利淨持戒彼此皆信敬毗舍婆羅門不惱諸天神正法得久住白法常增長汝等於此土隨意而安住汝等若發心此土常安住乃至我法盡莫向諸餘國以檀尸羅法令多衆歸信智者能成熟彼非是希有於彼惡世時熾然我正法遮障惡剎利此事為希有慈心常相應莫打我聲聞彼二說正法能救地獄苦比丘不護戒國王莫謫罰汝諸剎利王莫共沙門鬪俗人作諸惡速趣於地獄軟語向彼二遮除諸惡業莫以麁獷語亦莫打治罰以是國不壞增長三精氣正法得久住佛法久熾然多有說法者能閉三惡趣休息世間惡增益諸天衆涅槃門得開無漏者則入菩薩得增長猶如明分月能以於六度充滿諸佛法是故諸智者所來諸菩薩當住於此土熾然我正法盲冥失道者當與正法眼衆生以六度成熟於菩提汝等則成供三世諸如來速證菩提果淨國作導師大衆皆默然唯有賢劫衆彌勒為上首一切皆悉起合掌而白佛咸作如是言我不詣餘方護持佛正法盡我精進力成熟大菩提隨於彼時中應機而說法欲有留難時我等不能遮法欲滅盡時我亦不能遮爾時世尊告彼白智童真菩薩摩訶薩而說偈言觀此諸菩薩勇猛執智炬無量阿僧祇他方佛土來種種善根寶歸依諸佛海慈悲方便力於佛法不動於此無有一能持我法者賢劫諸菩薩堪能持我法於我滅度後佛法欲滅時所有出家者而無有慚恥遠離功德智懈怠不精進捨道學世業不樂持禁戒愚癡與俗交多言復無羞貪取佛僧物染著五欲樂如是比丘等資生與俗同疑惑多貪財邪淫怒嫉妬見住蘭若者說其諸過惡不樂讀誦經嗜睡多喜鬪如是等沙門厭賤禪蘭若堅著於惡事自高輕蔑他沙門及俗人慳貪不捨施噉食佛僧物多遭種種病無有慈愍心少力惡喜鬪以是天不雨潤澤悉枯涸飢饉遍世間果實無滋味乏少於飲食瞋諍相侵奪造十不善業少福無供養法味不純厚行法心亦薄迭共作麁想殺害無慈愍不孝於父母亦不供尊長多修世俗行疑惑復嫉妬貪染於邪法非法無厭足貪求無厭故是以久流轉如是諸國王及以輔相臣沙門婆羅門毗舍首陀羅樂鬪憎持戒互共相謗毀南方邊夷國王名波羅帝百千諸軍衆士將共圍繞西方邊夷國有王名百祀亦將百千軍前後共圍繞北方邊夷王名善意釋迦士將諸營從圍繞亦百千東方睒彌國王名為大軍眷屬百千衆圍繞而侍衛大軍王有子名之為難看生時身著鎧把刀血塗身大力身堅固而從母胎生是時長者等大臣五百人同時俱生子身亦著鎧甲執刀血塗身皆從母胎生是日於其國天龍降血雨五百長者子難看同處養難看年七歲父王授其位邊夷三惡王又至北天竺破國殺害人怨讐妬女色積財以火燒瞋怒向中國邊夷王等來毀破佛塔寺殺害諸衆僧劫奪佛僧物病瘦諸比丘不能走逃避少壯強力者散走於諸方諸餘比丘等少年初出家未善學戒者威儀法不具處處走逃避隨至被欺𣣋毀辱而打罵恆受諸苦惱彼三邊夷王及與諸軍衆漸詣拘睒彌十二年中鬪三王及眷屬難看王殺盡統領閻浮提而作一蓋王於後大悔恨我獲無量罪頗有明比丘當與我懺悔說言有三藏父名為火施種姓常清淨是大婆羅門子名失師迦高才智勇博釋子中大名今住波梨國時王即遣使請彼三藏來為王演正法令王生敬信我於十二年戰鬪大作罪三王及眷屬軍衆我殺盡我亦十二年具設般遮會普告閻浮提釋子皆來集所有諸比丘住在閻浮提願各悉來此受我等供養比丘等悉集睒彌般遮會在路有餓死或病在道傍中有遭水毒或值賊虎傷或復墜山㵎比丘死無數餘殘到睒彌威儀法則壞百千皆來集設大般遮會初起般遮日大雲皆悉起普遍閻浮提降澍於大雨時王甚歡喜此是衆僧力比丘既集已互共相借問頗見我和上及問阿闍梨知識諸等侶同學何處去我今得來此彼或道路亡高聲大悲哭相戀而嘷啼失師三藏起少時靜默住比丘大嘷哭惆悵不自抑王見彼嘷哭曉諭亦不止時王自思惟此有羅漢不天神夜告王還於波梨弗善財長者子名曰涑羅多是大阿羅漢恆在香山中三明解脫具而來安住此今於此大月十五日布薩由此布薩故百千衆集會中有一三藏復有阿羅漢于時諸天衆皆來聽布薩今是最後集當作無上護法幢當摧折法炬當散滅法山欲崩頽法海當枯涸八種功德水最後當亦竭比丘衆聲亂三藏于時起高聲言寂靜諦聽戒律儀所有諸釋子一切皆來集我於此衆中多聞到彼岸學戒猶不淨何況於餘人若有一比丘能持此禁戒威儀無缺者今當為布薩若於毗尼戒威儀無缺犯於此大衆前有者今當現為學戒律者今當作布薩羅漢涑羅多即起師子吼依如經中說我學戒清淨決定無有疑布薩我當聽如佛之所說禁戒我善學三藏有弟子名曰鴦伽多懆惡即瞋罵咄彼涑羅多經中未見汝是學戒律者大德如是說云何故違反鴦伽瞋極盛兩手執大棒打殺阿羅漢淨戒可敬者諸善比丘等大哭而嘷啼各各相瞋怒毀破身衣服時有大夜叉名目佉檀提於佛深生信敬重佛正法即以金剛杵殺害彼鴦伽由殺阿羅漢無著涑羅多復有惡比丘名曰雞多羅兩手亦執棒復殺彼三藏比丘皆悉起各各共相殺百千諸比丘存活者無幾是時須臾頃大地普震動於其虛空中出大惡音聲四方起大惡火爨數百千火幢大可畏現住在空中彗星及妖星四方而流墮千億諸天神皆作如是言釋迦所集法今日當隱沒色界諸天子一切欲界天正法隱沒已大聲悲嘷哭見佛諸夜叉墮地而宛轉從今於世間更無有佛法律儀木叉戒一切悉空無暗冥遍世間無救無歸趣諸人等不久無異於麞鹿法幢當摧折法鼓聲亦絶甘露門閉塞法師亦喪亡法炬當散滅法輪更不轉正法橋破壞法足不復行法水止不流法河永枯涸法山欲崩頽法海當復竭住林阿蘭若所有諸天子于時大怖畏悲嘷而自撲有諸魔眷屬邪見諸惡黨歌舞皆歡喜踊躍弄衣服釋迦所說法趣彼甘露者隱沒是其宜我法得熾盛難看王既知正法隱沒已從初至後夜出城往詣彼見諸比丘尸墮地即悶絶良久乃得穌而復更悲啼見殺阿羅漢三藏失師迦無量比丘死我亦不久活收拾阿羅漢別取三藏尸及諸比丘喪種種而闍維餘殘在比丘召喚集一處肴饌衆美味種種而供養復捨千萬寶一寶直百千以此衆寶物擬造五百寺一一諸比丘各施百千物師等在此住我等當養育為我說正法我當至心聽一切皆默然無有說法者其王三勸請白諸比丘已亦皆默然住一切無說者王白諸比丘可不知法耶語已袈裟白染色不復現從床皆墮落宛轉在於地咸皆稱佛言佛法寶隱沒鬚髮爪皆長諸法亦忘失當時虛空中大聲震於地一切皆遍動猶如水上輪城壁碎落下屋宇悉圮坼樹林根枝葉花葉果藥盡唯除淨居天欲界一切處七味三精氣損減無有餘解脫諸善論當時一切盡所生花果味希少亦不美諸有井泉池一切盡枯涸土地悉鹹鹵剖裂成丘㵎諸山皆焦然天龍不降雨苗稼皆枯死甘蔗劫貝藥生者皆死盡餘草更不生雨土皆昏暗日月不現明四方皆亢旱數現諸惡瑞十不善業道貪瞋癡倍增衆生於父母視之如麞鹿衆生及壽命色力威樂減遠離人天樂皆悉墮惡道如是不善業惡王惡比丘毀壞我正法損減天人道諸天善神王悲愍衆生者棄此濁惡國皆悉向餘方先佛不作者我今為衆生棄捨身壽命為增三精氣悲愍衆生故捨壽第三分令我法海滿洗浴諸天人過去諸如來依壽而滅度彼於七日後正法皆隱沒今我涅槃後正法五百年住在於世間衆生煩惱盡精進諸菩薩得滿於六度行者速能入無漏安隱城像法住於世限滿一千年剃頭著袈裟持戒及毀禁天人所供養常令無所乏如是供養彼則為供養我若有為我法歸依而剃頭身著袈裟衣說彼是我子假使破禁戒悉住不退地若有撾打彼則為打我身若有罵辱彼則為毀辱我是人心欲滅正法大明燈故為器非器捨壽第三分為衆得安樂饒益諸天人我昔行苦行為諸衆生故捨已自身樂令法久熾然我昔捨身命為諸病人故亦為貧衆生令法久熾然我昔為菩提捨財及妻子寶象馬車乘令法久熾然我昔供諸佛緣覺及聲聞父母諸師長令法久熾然為聞菩提故無量阿僧祇備受種種苦令法久熾然我修戒律儀長夜常勤行十方佛為證令法久熾然我昔常忍辱忍諸惡衆生為衆除煩惱令法久熾然我昔勤精進堅固常伏他度脫諸衆生令法久熾然我修禪解脫無色三摩提恆沙不可數令法久熾然我昔為般若住在於間林演說無量論令法久熾然我昔常憐愍捨已身血肉及捨身支節為增正法眼我愍惡衆生以慈而成熟安置於三乘增長正法施我昔智方便度脫諸惡見安置於正慧法雨令不絶我昔以四攝救度諸衆生滅惡煩惱火令四衆久住我昔除外道諸惡邪見網安置於正路四衆得供養我為彼捨命慈愍度衆生不令世間暗而有所歸趣如是於後時欲令法不壞是故囑法眼饒益諸衆生於我滅度後菩薩向餘方為欲不滅壞一切賢聖法故我今說呪令法久熾然金剛密無缺解脫味所依所有十方佛當與我說欲在此所來者大衆亦與欲爾時世尊為令正法得久住故說大陀羅尼呪哆地夜他阿婆牟寄婆牟寄質闍牟寄佉羅牟寄遮羅摩兮阿兮阿兮達囉婆帝摩呵地唎滯悉耽婆羅兮闍迦利磨什婆隸達囉牟駛能伽咩什婆隸什婆囉摩涅婆波蘇婆呵爾時世尊說此金剛堅固深密解脫味體陀羅尼句時遍此三千大千世界六種震動天降花雨一切樂器不鼓自鳴諸來大衆遍滿大地皆悉悲泣流淚讚歎而作是言釋迦牟尼如來應正遍知甚為奇特未曾有法大悲具足隨彼衆生為成熟故安置顯現未來法故捨第三分壽說是語時在會衆生依煩惱身者心得敬信盡虛空量諸衆生等未發無上菩提心者皆悉發心九十二那由他衆生得柔順忍八那由他衆生得首楞嚴三昧聖燈三昧十萬諸夜叉見四真諦二千菩薩得共行測量毗尼三昧六十四百千阿修羅得殊勝行那羅延三昧八那由他百千諸天得清淨行三昧三十那由他百千鳩槃茶得勝幢上燈三昧二十那由他百千諸龍得不欺𣣋力行三昧二萬比丘盡諸有漏心得解脫爾時智炬童真菩薩摩訶薩白文殊師利菩薩摩訶薩言了知清淨士觀此釋迦牟尼如來以大名稱充滿十方諸佛國土云何充滿謂釋迦牟尼佛從初發心求阿耨多羅三藐三菩提已來於一切衆生平等安置以福田心種種勤修而行布施於一切菩薩道修最勝行成熟一切諸衆生故發最勝願捨清淨國至此五濁衆苦世界於阿耨多羅三藐三菩提而成正覺以大慈悲因緣力故為無間業誹謗正法毀呰賢聖一切不善惡業纏縛十方一切清淨佛土所棄衆生為諸煩惱之所縛者成熟如是諸衆生故於此娑婆世界求阿耨多羅三藐三菩提於一切菩薩道修最勝行是人今於五濁世界於阿耨多羅三藐三菩提而成正覺此無間業諸衆生等種種罵辱誹謗如來輕賤毀呰勤加逼惱彼等以嫉妬因緣故種種方便心欲殺害復以種種兵仗刀箭𥎞鉾鉞斧崩大石山毒藥水火復放狂象師子虎豹惡牛惡狗勤加害佛爾時如來猶於彼等諸衆生所以大慈悲哀憐覆護踰於父母視其一子於諸苦海方便拔濟是以今佛釋迦如來於十方佛土名稱普聞今復為此諸衆生故以一切法付囑天龍諸鬼神等為令法眼久住熾然復為衆生捨第三分壽亦為法眼久住熾然一切聲聞器以非器及諸剃頭著袈裟者為護持故不惱害故增長三精氣故以是釋迦如來於此十方一切佛土一切如來一切菩薩摩訶薩一切大智諸天人所極得名稱充滿十方是故一切諸來菩薩摩訶薩等各各相與隨力所堪皆設第一最上供具供養如來尊重恭敬爾時一切諸來大衆菩薩摩訶薩等從座而起口眼微笑彼諸菩薩於此娑婆世界遍雨種種寶供養具供養世尊有雨碎金有雨碎銀有雨碎毗琉璃有雨碎頗梨有雨赤真珠有雨碎馬瑙有雨碎車𤦲有雨龍蛇所愛重者碎栴檀香有雨牛頭栴檀香有雨多摩羅跋香有雨黑堅沈水香有雨種種衆妙寶花有雨七寶蓋七寶幢七寶幡金縷真珠瓔珞環釧有持劫波如意寶樹有持寶衣樹有持寶花樹有持寶器樹有持寶香樹供養世尊復有菩薩於娑婆土所有樹林花葉果實一切草木變成七寶而供養佛復有菩薩於娑婆土一切所有山石磚瓦變成七寶而供養佛復有菩薩於娑婆土一切所有大地界分變為微妙諸天寶香而供養佛一切衆生依地住者彼等七日七夜身心快樂猶若諸天復有菩薩於娑婆土一切所有大水界分變為諸天第一微妙甘露美味香潔醇具水界衆生七日七夜身心快樂猶若諸天復有菩薩以一切風變為微妙清淨香風而供養佛於三惡道所有衆生一切無餘香風觸故七日七夜身心快樂猶若諸天爾時上至阿迦膩吒天下至四天王身天及諸天女一切無餘而以種種微妙音聲讚歎世尊復以種種歌舞音樂而供養佛一切夜叉一切羅剎一切鳩槃茶一切乾闥婆一切阿修羅一切緊那羅餓鬼毗舍遮富單那迦吒富單那人非人等彼等一切隨力所堪作種種讚歎乃至種種供養世尊爾時世尊告上首彌勒及賢劫中一切菩薩摩訶薩言諸善男子我昔行菩薩道時曾於過去諸佛如來作是供養以此善根與我作於三菩提因我今憐愍諸衆生故以此報果分作三分留一分自受第二分者於我滅後與禪解脫三昧堅固相應聲聞令無所乏第三分者與彼破戒讀誦經典相應聲聞正法像法剃頭著袈裟者令無所乏彌勒我今復以三業相應諸聲聞衆比丘比丘尼優婆塞優婆夷寄付汝手勿令乏少孤獨而終及以正法像法毀破禁戒著袈裟者寄付汝手勿令彼等於諸資具乏少而終亦勿令有旃陀羅王共相惱害身心受苦我今復以彼諸施主寄付汝手我今所有器以非器為我出家而供養者汝等亦當護持養育彌勒若於現在及未來世讀誦受持此法門者彼等當得十種清淨功德何等為十身清淨故離殺生離偷盜離邪行口清淨故不妄語不惡口不兩舌不綺語心清淨故離貪欲離瞋恚離邪見是為十從是已後百千萬生常得如是十種清淨功德若有至心聽此法門者是人住如實際得於八種清淨功德何等為八一者長壽二者端正三者富貴四者名稱五者常為諸天守護六者所須常無所乏七者盡諸業障八者命欲終時有十方佛及諸大衆放大光明照其眼目令其人見得生善處於百千萬生常得如是八種功德我今更復略說是人當得十三種清淨功德何謂十三一者生死流轉終不更起顛倒惡見二者不生五濁無佛國土三者常得見佛四者常聞正法五者常得供養衆僧六者值善知識七者常與六波羅蜜相應八者不墮小乘九者常以大慈大悲大方便力成熟衆生十者常發勝願十一者乃至菩提而常不離如上等法十二者速能滿足六波羅蜜十三者於阿耨多羅三藐三菩提而成正覺若有受持書寫讀誦為他解說如說修行此月藏法門者所得功德如前所說作是語時月藏菩薩摩訶薩尊者阿若憍陳如及於一切諸來大衆天人阿修羅乾闥婆等一切衆生聞佛所說皆悉歡喜頂戴奉行
